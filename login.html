<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATHENA — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#fff;font-family:'Inter',sans-serif;min-height:100vh;overflow:hidden}
.hex-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:0.15}
.hex-bg svg{width:100%;height:100%}
.container{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.owl-wrap{width:160px;height:160px;margin-bottom:16px;opacity:0;animation:logoReveal 1.8s cubic-bezier(0.16,1,0.3,1) 0.3s forwards}
.owl-wrap img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 0 12px rgba(232,96,10,0.8)) drop-shadow(0 0 40px rgba(232,96,10,0.4));animation:owlGlow 4s ease-in-out infinite alternate}
@keyframes logoReveal{0%{opacity:0;transform:scale(0.6) translateY(20px);filter:blur(20px)}100%{opacity:1;transform:scale(1) translateY(0);filter:blur(0)}}
@keyframes owlGlow{0%{filter:drop-shadow(0 0 10px rgba(232,96,10,0.7)) drop-shadow(0 0 35px rgba(232,96,10,0.35))}100%{filter:drop-shadow(0 0 18px rgba(232,96,10,1)) drop-shadow(0 0 50px rgba(232,96,10,0.5))}}
.title{font-family:'Orbitron',monospace;font-size:52px;font-weight:900;color:#e8600a;letter-spacing:16px;text-indent:16px;margin-bottom:6px}
.tagline{font-family:'Orbitron',monospace;font-size:13px;letter-spacing:6px;text-indent:6px;color:rgba(255,255,255,0.4);margin-bottom:32px}
.card{background:rgba(20,20,20,0.9);border:1px solid rgba(232,96,10,0.2);border-radius:12px;padding:36px;width:400px;max-width:90vw;backdrop-filter:blur(20px)}
.card-title{font-family:'Orbitron',monospace;font-size:14px;letter-spacing:3px;color:#e8600a;text-align:center;margin-bottom:24px}
.input-group{margin-bottom:16px}
.input-group label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,0.4);margin-bottom:6px;font-weight:600}
.input-group input{width:100%;padding:12px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#fff;font-size:15px;font-family:'Inter',sans-serif;outline:none;transition:border-color 0.2s}
.input-group input:focus{border-color:#e8600a}
.btn{width:100%;padding:14px;background:#e8600a;color:#fff;border:none;border-radius:8px;font-family:'Orbitron',monospace;font-size:13px;letter-spacing:3px;cursor:pointer;transition:all 0.2s;font-weight:700;margin-top:8px}
.btn:hover{background:#ff7a1a;transform:translateY(-1px)}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.btn-outline{background:transparent;border:1px solid rgba(232,96,10,0.4);color:#e8600a;margin-top:12px}
.btn-outline:hover{background:rgba(232,96,10,0.1)}
.switch{text-align:center;margin-top:20px;font-size:13px;color:rgba(255,255,255,0.4)}
.switch a{color:#e8600a;cursor:pointer;text-decoration:none;font-weight:600}
.switch a:hover{text-decoration:underline}
.error{background:rgba(212,32,48,0.15);border:1px solid rgba(212,32,48,0.3);color:#ff6b6b;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
.success{background:rgba(26,143,63,0.15);border:1px solid rgba(26,143,63,0.3);color:#6bff8a;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
.pending-box{text-align:center;padding:24px 16px}
.pending-box .icon{font-size:48px;margin-bottom:12px}
.pending-box .msg{font-size:15px;color:rgba(255,255,255,0.7);line-height:1.6;margin-bottom:20px}
.pending-box .email{color:#e8600a;font-weight:600}
.forgot{text-align:right;margin-bottom:12px}
.forgot a{color:rgba(255,255,255,0.3);font-size:12px;cursor:pointer;text-decoration:none}
.forgot a:hover{color:#e8600a}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
@media(max-width:640px){.owl-wrap{width:120px;height:120px}.title{font-size:36px;letter-spacing:10px}.tagline{font-size:10px;letter-spacing:4px}.card{padding:24px}}
</style>
</head>
<body>
<div class="hex-bg"><svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%"><defs><pattern id="hex" width="56" height="100" patternUnits="userSpaceOnUse" patternTransform="scale(2)"><path d="M28 66L0 50L0 16L28 0L56 16L56 50L28 66L28 100" fill="none" stroke="rgba(232,96,10,0.12)" stroke-width="0.5"/><path d="M28 0L28 -34L0 -50L0 -16" fill="none" stroke="rgba(232,96,10,0.12)" stroke-width="0.5"/></pattern></defs><rect width="100%" height="100%" fill="url(#hex)"/></svg></div>

<div class="container">
  <div class="owl-wrap"><img id="owl-logo" src="images/athena-owl-outline.png" alt="ATHENA"/></div>
  <div class="title">ATHENA</div>
  <div class="tagline">INSIGHT. PRECISION. EDGE.</div>

  <!-- LOGIN -->
  <div class="card" id="loginView">
    <div class="card-title">SECURE ACCESS</div>
    <div class="error" id="loginError"></div>
    <div class="input-group"><label>Email</label><input type="email" id="loginEmail" placeholder="you@company.com" autocomplete="email"/></div>
    <div class="input-group"><label>Password</label><input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password"/></div>
    <div class="forgot"><a onclick="showReset()">Forgot password?</a></div>
    <button class="btn" id="loginBtn" onclick="handleLogin()">ENTER</button>
    <div class="switch">Don't have access? <a onclick="showSignup()">Request Access</a></div>
  </div>

  <!-- SIGNUP -->
  <div class="card" id="signupView" style="display:none">
    <div class="card-title">REQUEST ACCESS</div>
    <div class="error" id="signupError"></div>
    <div class="input-group"><label>Full Name</label><input type="text" id="signupName" placeholder="John Smith" autocomplete="name"/></div>
    <div class="input-group"><label>Company</label><input type="text" id="signupCompany" placeholder="Your dispensary or company"/></div>
    <div class="input-group"><label>Email</label><input type="email" id="signupEmail" placeholder="you@company.com" autocomplete="email"/></div>
    <div class="input-group"><label>Password</label><input type="password" id="signupPass" placeholder="Min 8 characters" autocomplete="new-password"/></div>
    <button class="btn" id="signupBtn" onclick="handleSignup()">REQUEST ACCESS</button>
    <div class="switch">Already have access? <a onclick="showLogin()">Sign in</a></div>
  </div>

  <!-- PENDING -->
  <div class="card" id="pendingView" style="display:none">
    <div class="pending-box">
      <div class="icon">⏳</div>
      <div class="card-title">PENDING APPROVAL</div>
      <div class="msg">Your account <span class="email" id="pendingEmail"></span> has been registered.<br><br>An administrator will review and approve your access shortly.</div>
      <button class="btn btn-outline" onclick="handleLogout()">SIGN OUT</button>
    </div>
  </div>

  <!-- RESET PASSWORD -->
  <div class="card" id="resetView" style="display:none">
    <div class="card-title">RESET PASSWORD</div>
    <div class="error" id="resetError"></div>
    <div class="success" id="resetSuccess"></div>
    <div class="input-group"><label>Email</label><input type="email" id="resetEmail" placeholder="you@company.com"/></div>
    <button class="btn" onclick="handleReset()">SEND RESET LINK</button>
    <div class="switch"><a onclick="showLogin()">Back to login</a></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyB5OYjVJQkXZI-JrDXKqsYK1ofRlrv_3mw",
  authDomain:"athena-dashboard-d5c35.firebaseapp.com",
  projectId:"athena-dashboard-d5c35",
  storageBucket:"athena-dashboard-d5c35.firebasestorage.app",
  messagingSenderId:"1007126745571",
  appId:"1:1007126745571:web:0ae59f27a92690920bd0d6"
});
var auth=firebase.auth();
var db=firebase.firestore();

function hideAll(){['loginView','signupView','pendingView','resetView'].forEach(function(id){document.getElementById(id).style.display='none'});document.querySelectorAll('.error,.success').forEach(function(el){el.style.display='none'})}
function showLogin(){hideAll();document.getElementById('loginView').style.display='block'}
function showSignup(){hideAll();document.getElementById('signupView').style.display='block'}
function showPending(email){hideAll();document.getElementById('pendingView').style.display='block';document.getElementById('pendingEmail').textContent=email}
function showReset(){hideAll();document.getElementById('resetView').style.display='block'}
function showError(id,msg){var el=document.getElementById(id);el.textContent=msg;el.style.display='block'}
function showSuccess(id,msg){var el=document.getElementById(id);el.textContent=msg;el.style.display='block'}

async function handleLogin(){
  var email=document.getElementById('loginEmail').value.trim();
  var pass=document.getElementById('loginPass').value;
  if(!email||!pass){showError('loginError','Please enter your email and password.');return}
  var btn=document.getElementById('loginBtn');btn.disabled=true;btn.textContent='AUTHENTICATING...';
  try{
    var cred=await auth.signInWithEmailAndPassword(email,pass);
    var doc=await db.collection('users').doc(cred.user.uid).get();
    if(!doc.exists){showError('loginError','Account not set up. Please request access first.');btn.disabled=false;btn.textContent='ENTER';return}
    var d=doc.data();
    if(d.status!=='approved'){showPending(email);btn.disabled=false;btn.textContent='ENTER';return}
    sessionStorage.setItem('athena_auth','true');
    sessionStorage.setItem('athena_uid',cred.user.uid);
    sessionStorage.setItem('athena_email',email);
    sessionStorage.setItem('athena_role',d.role||'user');
    sessionStorage.removeItem('athena_intro_seen');
    window.location.replace('index.html');
  }catch(err){
    var msg='Login failed.';
    if(err.code==='auth/user-not-found')msg='No account found with this email.';
    else if(err.code==='auth/wrong-password'||err.code==='auth/invalid-credential')msg='Incorrect password.';
    else if(err.code==='auth/too-many-requests')msg='Too many attempts. Please try again later.';
    else if(err.code==='auth/invalid-email')msg='Invalid email address.';
    showError('loginError',msg);btn.disabled=false;btn.textContent='ENTER';
  }
}

async function handleSignup(){
  var name=document.getElementById('signupName').value.trim();
  var company=document.getElementById('signupCompany').value.trim();
  var email=document.getElementById('signupEmail').value.trim();
  var pass=document.getElementById('signupPass').value;
  if(!name||!email||!pass){showError('signupError','Please fill in all required fields.');return}
  if(pass.length<8){showError('signupError','Password must be at least 8 characters.');return}
  var btn=document.getElementById('signupBtn');btn.disabled=true;btn.textContent='SUBMITTING...';
  try{
    var cred=await auth.createUserWithEmailAndPassword(email,pass);
    await cred.user.updateProfile({displayName:name});
    // Check if this is the first user — auto-approve as admin
    var usersSnap=await db.collection('users').limit(1).get();
    var isFirst=usersSnap.empty;
    await db.collection('users').doc(cred.user.uid).set({email:email,name:name,company:company,status:isFirst?'approved':'pending',role:isFirst?'admin':'user',createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    if(isFirst){sessionStorage.setItem('athena_auth','true');sessionStorage.setItem('athena_uid',cred.user.uid);sessionStorage.setItem('athena_email',email);sessionStorage.setItem('athena_role','admin');sessionStorage.removeItem('athena_intro_seen');window.location.replace('index.html')}
    else{showPending(email)};
  }catch(err){
    var msg='Signup failed.';
    if(err.code==='auth/email-already-in-use')msg='This email already has an account. Try logging in.';
    else if(err.code==='auth/invalid-email')msg='Invalid email address.';
    else if(err.code==='auth/weak-password')msg='Password is too weak. Use at least 8 characters.';
    showError('signupError',msg);btn.disabled=false;btn.textContent='REQUEST ACCESS';
  }
}

async function handleReset(){
  var email=document.getElementById('resetEmail').value.trim();
  if(!email){showError('resetError','Please enter your email.');return}
  try{await auth.sendPasswordResetEmail(email);showSuccess('resetSuccess','Password reset email sent. Check your inbox.')}
  catch(err){showError('resetError','Could not send reset email. Check the address and try again.')}
}

function handleLogout(){auth.signOut();sessionStorage.clear();showLogin()}

auth.onAuthStateChanged(async function(user){
  if(user){try{var doc=await db.collection('users').doc(user.uid).get();if(doc.exists&&doc.data().status==='approved'){sessionStorage.setItem('athena_auth','true');sessionStorage.setItem('athena_uid',user.uid);sessionStorage.setItem('athena_email',user.email);sessionStorage.setItem('athena_role',doc.data().role||'user');window.location.replace('index.html')}else if(doc.exists){showPending(user.email)}}catch(e){}}
});

document.addEventListener('keydown',function(e){if(e.key==='Enter'){if(document.getElementById('loginView').style.display!=='none')handleLogin();else if(document.getElementById('signupView').style.display!=='none')handleSignup()}});
</script>
</body>
</html>
