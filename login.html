<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATHENA</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a0a;
  --accent: #e8600a;
  --accent-light: #ff8533;
  --accent-dim: rgba(232, 96, 10, 0.15);
  --accent-glow: rgba(232, 96, 10, 0.4);
  --text: #e0d8d0;
  --text-dim: rgba(255,255,255,0.4);
}

html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  font-family: 'Rajdhani', sans-serif;
  color: var(--text);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* ── Hexagonal background pattern ── */
.hex-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}

.hex-bg svg {
  width: 100%;
  height: 100%;
  opacity: 0.18;
}

/* Subtle radial glow behind logo */
.hex-bg::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -55%);
  width: 700px;
  height: 700px;
  background: radial-gradient(circle, rgba(232, 96, 10, 0.18) 0%, transparent 70%);
  pointer-events: none;
}

/* ── Main content ── */
.main {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}

/* ── Owl logo ── */
.owl-container {
  width: 320px;
  height: 320px;
  margin-bottom: 30px;
  opacity: 0;
  animation: logoReveal 1.5s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
}

.owl-container img {
  mix-blend-mode: screen;
  width: 100%;
  height: 100%;
  object-fit: contain;
  filter: drop-shadow(0 0 20px rgba(232, 96, 10, 0.7)) drop-shadow(0 0 50px rgba(232, 96, 10, 0.3)) drop-shadow(0 0 100px rgba(232, 96, 10, 0.15));
  animation: owlPulse 4s ease-in-out infinite alternate;
}

@keyframes logoReveal {
  0% { opacity: 0; transform: scale(0.6) translateY(20px); filter: blur(20px); }
  100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
}

@keyframes owlPulse {
  0% { filter: drop-shadow(0 0 15px rgba(232, 96, 10, 0.6)) drop-shadow(0 0 40px rgba(232, 96, 10, 0.3)) drop-shadow(0 0 80px rgba(232, 96, 10, 0.15)); }
  100% { filter: drop-shadow(0 0 25px rgba(232, 96, 10, 0.9)) drop-shadow(0 0 60px rgba(232, 96, 10, 0.5)) drop-shadow(0 0 120px rgba(232, 96, 10, 0.25)); }
}

/* ── Title ── */
.title {
  font-family: 'Orbitron', sans-serif;
  font-size: 72px;
  font-weight: 700;
  letter-spacing: 24px;
  text-indent: 24px;
  color: var(--accent);
  text-shadow: 0 0 40px rgba(232, 96, 10, 0.3);
  margin-bottom: 16px;
  opacity: 0;
  animation: textReveal 1.2s ease-out 0.8s forwards;
}

/* ── Tagline ── */
.tagline {
  font-family: 'Rajdhani', sans-serif;
  font-size: 18px;
  font-weight: 400;
  letter-spacing: 8px;
  text-indent: 8px;
  color: var(--text-dim);
  margin-bottom: 50px;
  opacity: 0;
  animation: textReveal 1.2s ease-out 1.1s forwards;
}

@keyframes textReveal {
  0% { opacity: 0; transform: translateY(15px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* ── GET STARTED button ── */
.cta-btn {
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 4px;
  color: var(--accent);
  background: transparent;
  border: 1.5px solid rgba(232, 96, 10, 0.5);
  padding: 16px 60px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  opacity: 0;
  animation: textReveal 1.2s ease-out 1.4s forwards;
  transition: all 0.4s ease;
}

.cta-btn:hover {
  background: rgba(232, 96, 10, 0.1);
  border-color: var(--accent);
  box-shadow: 0 0 30px rgba(232, 96, 10, 0.2), inset 0 0 30px rgba(232, 96, 10, 0.05);
  transform: scale(1.02);
}

.cta-btn:active { transform: scale(0.98); }

/* ── Login overlay ── */
.login-overlay {
  position: fixed;
  inset: 0;
  z-index: 10;
  background: rgba(10, 10, 10, 0.95);
  backdrop-filter: blur(20px);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s ease;
}

.login-overlay.active {
  opacity: 1;
  pointer-events: all;
}

.login-card {
  width: 380px;
  padding: 40px;
  text-align: center;
}

.login-card .card-logo {
  width: 60px;
  height: 60px;
  margin: 0 auto 12px;
  filter: drop-shadow(0 0 15px rgba(232, 96, 10, 0.4));
}

.login-card h2 {
  font-family: 'Orbitron', sans-serif;
  font-size: 24px;
  font-weight: 600;
  letter-spacing: 6px;
  color: var(--accent);
  margin-bottom: 8px;
}

.login-card .login-sub {
  font-size: 13px;
  letter-spacing: 3px;
  color: var(--text-dim);
  margin-bottom: 36px;
}

.input-group {
  margin-bottom: 20px;
  text-align: left;
}

.input-group label {
  display: block;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 8px;
  font-weight: 500;
}

.input-group input {
  width: 100%;
  padding: 14px 16px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(232, 96, 10, 0.2);
  border-radius: 2px;
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  font-size: 16px;
  outline: none;
  transition: border-color 0.3s;
}

.input-group input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 15px rgba(232, 96, 10, 0.1);
}

.login-btn {
  width: 100%;
  padding: 16px;
  margin-top: 12px;
  background: transparent;
  border: 1.5px solid rgba(232, 96, 10, 0.5);
  color: var(--accent);
  font-family: 'Orbitron', sans-serif;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 4px;
  cursor: pointer;
  transition: all 0.3s;
}

.login-btn:hover {
  background: rgba(232, 96, 10, 0.1);
  border-color: var(--accent);
  box-shadow: 0 0 20px rgba(232, 96, 10, 0.15);
}

.back-btn {
  margin-top: 24px;
  background: none;
  border: none;
  color: var(--text-dim);
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  letter-spacing: 2px;
  cursor: pointer;
  transition: color 0.3s;
}

.back-btn:hover { color: var(--text); }

/* ── Shake animation ── */
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}

/* ── Responsive ── */
@media (max-width: 640px) {
  .owl-container { width: 220px; height: 220px; }
  .title { font-size: 40px; letter-spacing: 12px; text-indent: 12px; }
  .tagline { font-size: 12px; letter-spacing: 4px; }
  .cta-btn { padding: 14px 40px; font-size: 13px; }
  .login-card { width: 320px; padding: 30px; }
}
</style>
</head>
<body>

<!-- Hexagonal background -->
<div class="hex-bg">
  <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
    <defs>
      <pattern id="hex" width="56" height="100" patternUnits="userSpaceOnUse" patternTransform="scale(1.2)">
        <path d="M28 66L0 50L0 16L28 0L56 16L56 50L28 66L28 100" fill="none" stroke="#e8600a" stroke-width="0.7"/>
        <path d="M28 0L28 -34L0 -50L-28 -34L-28 0" fill="none" stroke="#e8600a" stroke-width="0.7"/>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#hex)"/>
  </svg>
</div>

<!-- Main landing -->
<div class="main" id="landing">
  <div class="owl-container">
    <img id="owl-logo" alt="ATHENA" />
  </div>
  <div class="title">ATHENA</div>
  <div class="tagline">INTELLIGENCE. PRECISION. DOMINANCE.</div>
  <button class="cta-btn" onclick="showLogin()">GET STARTED</button>
</div>

<!-- Login overlay -->
<div class="login-overlay" id="login-overlay">
  <div class="login-card">
    <img id="card-logo" class="card-logo" alt="" />
    <h2>ATHENA</h2>
    <div class="login-sub">SECURE ACCESS</div>
    <div class="input-group">
      <label>Email</label>
      <input type="email" id="email" autocomplete="email" />
    </div>
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="password" />
    </div>
    <button class="login-btn" onclick="handleLogin()">ENTER</button>
    <button class="back-btn" onclick="hideLogin()">BACK</button>
  </div>
</div>

document.getElementById('owl-logo').src = LOGO;
document.getElementById('card-logo').src = LOGO;

function showLogin() {
  document.getElementById('login-overlay').classList.add('active');
  setTimeout(function() { document.getElementById('email').focus(); }, 500);
}

function hideLogin() {
  document.getElementById('login-overlay').classList.remove('active');
}

function handleLogin() {
  var email = document.getElementById('email').value;
  var pass = document.getElementById('password').value;
  if (!email || !pass) {
    var card = document.querySelector('.login-card');
    card.style.animation = 'shake 0.4s ease';
    setTimeout(function() { card.style.animation = ''; }, 400);
    return;
  }
  var btn = document.querySelector('.login-btn');
  btn.textContent = 'AUTHENTICATING...';
  sessionStorage.setItem('athena_auth', 'true');
  setTimeout(function() { window.location.href = 'index.html'; }, 1200);
}

document.getElementById('password').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') handleLogin();
});

// ESC to close login
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') hideLogin();
});
</script>
