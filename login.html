<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATHENA</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body { height: 100%; overflow: hidden; }

body {
  background: #0a0908;
  font-family: 'Rajdhani', sans-serif;
  color: #e0d8d0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* ── Hexagonal background ── */
.hex-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}

.hex-bg svg { width: 100%; height: 100%; }

/* Fade/vignette overlay - hourglass dark strip behind owl + random dark patches */
.hex-bg::before {
  content: '';
  position: absolute;
  inset: 0;
  z-index: 1;
  background:
    /* Narrow dark strip behind owl - widens toward top */
    radial-gradient(ellipse 235px 260px at 50% 38%, rgba(10,9,8,1) 0%, rgba(10,9,8,1) 40%, rgba(10,9,8,0.5) 70%, transparent 100%),
    /* Widening dark toward top */
    radial-gradient(ellipse 650px 390px at 50% 0%, rgba(10,9,8,1) 0%, rgba(10,9,8,1) 40%, rgba(10,9,8,0.4) 65%, transparent 88%),
    /* Widening dark toward bottom */
    radial-gradient(ellipse 650px 390px at 50% 100%, rgba(10,9,8,1) 0%, rgba(10,9,8,1) 40%, rgba(10,9,8,0.4) 65%, transparent 88%),
    /* Random dark patch - top left */
    radial-gradient(ellipse 365px 286px at 12% 22%, rgba(10,9,8,1) 0%, rgba(10,9,8,1) 35%, rgba(10,9,8,0.4) 55%, transparent 75%),
    /* Random dark patch - right middle */
    radial-gradient(ellipse 325px 390px at 90% 50%, rgba(10,9,8,1) 0%, rgba(10,9,8,1) 35%, rgba(10,9,8,0.4) 55%, transparent 70%),
    /* Random dark patch - bottom left */
    radial-gradient(ellipse 390px 260px at 25% 80%, rgba(10,9,8,1) 0%, rgba(10,9,8,1) 35%, rgba(10,9,8,0.4) 55%, transparent 70%),
    /* Random dark patch - top right area */
    radial-gradient(ellipse 260px 234px at 78% 18%, rgba(10,9,8,1) 0%, rgba(10,9,8,1) 35%, rgba(10,9,8,0.4) 55%, transparent 65%);
  pointer-events: none;
}

/* Warm radial glow behind owl */
.hex-bg::after {
  content: '';
  position: absolute;
  top: 38%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 700px;
  height: 600px;
  z-index: 2;
  background: radial-gradient(ellipse, rgba(232, 96, 10, 0.12) 0%, rgba(232, 96, 10, 0.04) 45%, transparent 70%);
  pointer-events: none;
}

/* ── Main content ── */
.main {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}

/* ── Owl logo ── */
.owl-wrap {
  width: 360px;
  height: 360px;
  margin-bottom: 24px;
  opacity: 0;
  animation: logoReveal 1.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
  position: relative;
}

.owl-wrap img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  filter: drop-shadow(0 0 12px rgba(232, 96, 10, 0.8)) drop-shadow(0 0 40px rgba(232, 96, 10, 0.4)) drop-shadow(0 0 80px rgba(232, 96, 10, 0.2));
  animation: owlGlow 4s ease-in-out infinite alternate;
}

@keyframes logoReveal {
  0% { opacity: 0; transform: scale(0.6) translateY(20px); filter: blur(20px); }
  100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
}

@keyframes owlGlow {
  0% { filter: drop-shadow(0 0 10px rgba(232, 96, 10, 0.7)) drop-shadow(0 0 35px rgba(232, 96, 10, 0.35)) drop-shadow(0 0 70px rgba(232, 96, 10, 0.15)); }
  100% { filter: drop-shadow(0 0 18px rgba(232, 96, 10, 1)) drop-shadow(0 0 50px rgba(232, 96, 10, 0.5)) drop-shadow(0 0 100px rgba(232, 96, 10, 0.25)); }
}

/* ── Title ── */
.title {
  font-family: 'Orbitron', sans-serif;
  font-size: 72px;
  font-weight: 700;
  letter-spacing: 22px;
  text-indent: 22px;
  color: #e8600a;
  text-shadow: 0 0 30px rgba(232, 96, 10, 0.25);
  margin-bottom: 14px;
  opacity: 0;
  animation: fadeUp 1.2s ease-out 0.9s forwards;
}

/* ── Tagline ── */
.tagline {
  font-family: 'Rajdhani', sans-serif;
  font-size: 17px;
  font-weight: 400;
  letter-spacing: 10px;
  text-indent: 10px;
  color: rgba(255,255,255,0.35);
  margin-bottom: 48px;
  opacity: 0;
  animation: fadeUp 1.2s ease-out 1.15s forwards;
}

@keyframes fadeUp {
  0% { opacity: 0; transform: translateY(12px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* ── GET STARTED button ── */
.cta-btn {
  font-family: 'Orbitron', sans-serif;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 5px;
  color: #e8600a;
  background: transparent;
  border: 1.5px solid rgba(232, 96, 10, 0.45);
  padding: 18px 64px;
  cursor: pointer;
  opacity: 0;
  animation: fadeUp 1.2s ease-out 1.4s forwards;
  transition: all 0.4s ease;
}

.cta-btn:hover {
  background: rgba(232, 96, 10, 0.08);
  border-color: rgba(232, 96, 10, 0.8);
  box-shadow: 0 0 30px rgba(232, 96, 10, 0.15), inset 0 0 30px rgba(232, 96, 10, 0.04);
}

.cta-btn:active { transform: scale(0.97); }

/* ── Login overlay ── */
.login-overlay {
  position: fixed;
  inset: 0;
  z-index: 10;
  background: rgba(10, 9, 8, 0.92);
  backdrop-filter: blur(30px);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s ease;
}

.login-overlay.active { opacity: 1; pointer-events: all; }

.login-card {
  width: 380px;
  padding: 40px;
  text-align: center;
}

.login-card .card-logo {
  width: 60px;
  height: 60px;
  margin: 0 auto 14px;
  filter: drop-shadow(0 0 12px rgba(232, 96, 10, 0.5));
}

.login-card h2 {
  font-family: 'Orbitron', sans-serif;
  font-size: 22px;
  font-weight: 600;
  letter-spacing: 6px;
  color: #e8600a;
  margin-bottom: 6px;
}

.login-card .login-sub {
  font-size: 12px;
  letter-spacing: 4px;
  color: rgba(255,255,255,0.3);
  margin-bottom: 36px;
}

.input-group { margin-bottom: 20px; text-align: left; }

.input-group label {
  display: block;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  margin-bottom: 8px;
  font-weight: 500;
}

.input-group input {
  width: 100%;
  padding: 14px 16px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(232, 96, 10, 0.2);
  border-radius: 2px;
  color: #e0d8d0;
  font-family: 'Rajdhani', sans-serif;
  font-size: 16px;
  outline: none;
  transition: border-color 0.3s, box-shadow 0.3s;
}

.input-group input:focus {
  border-color: rgba(232, 96, 10, 0.6);
  box-shadow: 0 0 12px rgba(232, 96, 10, 0.08);
}

.login-btn {
  width: 100%;
  padding: 16px;
  margin-top: 12px;
  background: transparent;
  border: 1.5px solid rgba(232, 96, 10, 0.45);
  color: #e8600a;
  font-family: 'Orbitron', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 5px;
  cursor: pointer;
  transition: all 0.3s;
}

.login-btn:hover {
  background: rgba(232, 96, 10, 0.08);
  border-color: rgba(232, 96, 10, 0.8);
  box-shadow: 0 0 20px rgba(232, 96, 10, 0.1);
}

.back-btn {
  margin-top: 24px;
  background: none;
  border: none;
  color: rgba(255,255,255,0.3);
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  letter-spacing: 2px;
  cursor: pointer;
  transition: color 0.3s;
}

.back-btn:hover { color: rgba(255,255,255,0.6); }

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}

@media (max-width: 640px) {
  .owl-wrap { width: 240px; height: 240px; }
  .title { font-size: 38px; letter-spacing: 12px; text-indent: 12px; }
  .tagline { font-size: 11px; letter-spacing: 4px; text-indent: 4px; }
  .cta-btn { padding: 14px 40px; font-size: 12px; letter-spacing: 3px; }
  .login-card { width: 320px; padding: 28px; }
}

/* Login animation sequence */
@keyframes owlTriplePulse {
  0% { filter: drop-shadow(0 0 10px rgba(232,96,10,0.7)) drop-shadow(0 0 35px rgba(232,96,10,0.35)) drop-shadow(0 0 70px rgba(232,96,10,0.15)); }
  100% { filter: drop-shadow(0 0 50px rgba(232,96,10,1)) drop-shadow(0 0 100px rgba(232,96,10,0.5)) drop-shadow(0 0 140px rgba(232,96,10,0.3)); }
}
.owl-glow-anim { animation: owlTriplePulse 4s ease-in-out forwards !important; }
</style>
</head>
<body>

<div class="hex-bg">
  <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
    <defs>
      <pattern id="hex" width="56" height="100" patternUnits="userSpaceOnUse" patternTransform="scale(1.4)">
        <path d="M28 66L0 50L0 16L28 0L56 16L56 50L28 66L28 100" fill="none" stroke="rgba(200,130,60,0.35)" stroke-width="0.6"/>
        <path d="M28 0L28 -34L0 -50L-28 -34L-28 0" fill="none" stroke="rgba(200,130,60,0.35)" stroke-width="0.6"/>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#hex)"/>
  </svg>
</div>

<div class="main" id="landing">
  <div class="owl-wrap">
    <img id="owl-logo" alt="ATHENA" />
  </div>
  <div class="title">ATHENA</div>
  <div class="tagline">INSIGHT.&ensp;PRECISION.&ensp;EDGE.</div>
  <button class="cta-btn" onclick="showLogin()">GET STARTED</button>
</div>

<div class="login-overlay" id="login-overlay">
  <div class="login-card">
    <img id="card-logo" class="card-logo" alt="" />
    <h2>ATHENA</h2>
    <div class="login-sub">SECURE ACCESS</div>
    <div class="input-group">
      <label>Email</label>
      <input type="email" id="email" autocomplete="email" />
    </div>
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="password" />
    </div>
    <button class="login-btn" onclick="handleLogin()">ENTER</button>
    <button class="back-btn" onclick="hideLogin()">&#8592; BACK</button>
  </div>
</div>

document.getElementById('owl-logo').src = OWL_LARGE;
document.getElementById('card-logo').src = OWL_SMALL;

function showLogin() {
  document.getElementById('login-overlay').classList.add('active');
  setTimeout(function() { document.getElementById('email').focus(); }, 500);
}

function hideLogin() {
  document.getElementById('login-overlay').classList.remove('active');
}

function handleLogin() {
  var email = document.getElementById('email').value;
  var pass = document.getElementById('password').value;
  if (!email || !pass) {
    var card = document.querySelector('.login-card');
    card.style.animation = 'shake 0.4s ease';
    setTimeout(function() { card.style.animation = ''; }, 400);
    return;
  }
  var btn = document.querySelector('.login-btn');
  btn.textContent = 'AUTHENTICATING...';
  sessionStorage.setItem('athena_auth', 'true');
  setTimeout(function() {
    document.getElementById('login-overlay').classList.remove('active');
    document.querySelector('.cta-btn').style.display = 'none';
    setTimeout(function() {
      document.getElementById('owl-logo').classList.add('owl-glow-anim');
      setTimeout(function() { window.location.href = 'index.html'; }, 4200);
    }, 400);
  }, 800);
}

document.getElementById('password').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') handleLogin();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') hideLogin();
});
</script>
