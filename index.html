<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATHENA — Competitive Intel</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--bg:#f5f6f8;--bg2:#ffffff;--sf:#ffffff;--sf2:#f0f1f3;--bd:rgba(0,0,0,.1);--bd2:rgba(0,0,0,.18);--tx:#1a1a1a;--tx2:#5a6370;--tx3:#a0a8b4;--cy:#e8600a;--cy2:#d45500;--cydim:rgba(232,96,10,.05);--gn:#1a8f3f;--rd:#d42030;--am:#e8600a;--f:'Outfit',sans-serif;--m:'IBM Plex Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--f);background:var(--bg);color:var(--tx);min-height:100vh}
::selection{background:var(--cy);color:#fff}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#eee}::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
.app{max-width:1520px;margin:0 auto;padding:14px 22px}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:12px}
.ftr{text-align:center;padding:16px 0 8px;font-family:var(--m);font-size:10px;color:var(--tx3);letter-spacing:1px}
.logo{display:flex;align-items:center;gap:14px}
.lt{display:flex;flex-direction:column}.lt h1{font-size:28px;font-weight:800;letter-spacing:4px;color:var(--cy2);line-height:1}.lt span{font-size:10px;letter-spacing:2px;color:var(--tx2);font-family:var(--m);margin-top:2px}
.glow{height:1px;background:linear-gradient(90deg,transparent,var(--cy),transparent);margin:10px 0;opacity:.2}
.tabs{display:flex;gap:2px;margin-bottom:14px;background:var(--sf);border-radius:8px;padding:3px;border:1px solid var(--bd);overflow-x:auto}
.tab{padding:11px 22px;border-radius:6px;font-size:15px;font-weight:600;cursor:pointer;color:var(--tx2);transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--tx)}.tab.on{background:rgba(232,96,10,.08);color:var(--cy);border-bottom:2px solid var(--cy)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:14px}
.st{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:12px 14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.st-l{font-family:var(--m);font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--tx2);margin-bottom:3px}
.st-v{font-family:var(--m);font-size:26px;font-weight:600;color:var(--cy)}.st-v.gn{color:var(--gn)}.st-v.am{color:var(--am)}.st-v.rd{color:var(--rd)}
.pnl{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:14px 16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.pnl-t{font-family:var(--m);font-size:13px;text-transform:uppercase;letter-spacing:1.2px;color:var(--tx2);margin-bottom:10px}
.pnl-d{font-size:13px;color:var(--tx2);margin-bottom:10px;line-height:1.4}
.map-w{height:320px;border-radius:8px;overflow:hidden;border:1px solid var(--bd)}
.leaflet-container{background:#e8e8e8!important}
.leaflet-control-zoom a{background:#fff!important;color:var(--cy)!important;border-color:#ddd!important}
.leaflet-popup-content-wrapper{background:#fff!important;color:var(--tx)!important;border:1px solid #ddd!important;border-radius:8px!important;box-shadow:0 2px 8px rgba(0,0,0,.1)!important}
.leaflet-popup-tip{background:#fff!important}
.leaflet-popup-content{font-family:var(--f)!important;font-size:12px!important;margin:8px 12px!important}
.srch{position:relative}.srch input{width:100%;background:var(--bg2);border:1px solid var(--bd);color:var(--tx);font-family:var(--f);font-size:13px;padding:9px 14px 9px 36px;border-radius:7px;outline:none}
.srch input:focus{border-color:var(--cy)}.srch input::placeholder{color:var(--tx3)}
.srch-ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:14px;pointer-events:none}
.btn{padding:5px 12px;border-radius:5px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:var(--bg2);color:var(--tx2);font-family:var(--f);transition:all .15s;text-transform:uppercase}
.btn:hover{border-color:var(--cy);color:var(--cy)}.btn.pri{background:rgba(232,96,10,.08);border-color:var(--cy);color:var(--cy)}
.cats{display:flex;gap:3px;margin-bottom:10px;flex-wrap:wrap}
.ct{padding:7px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:var(--tx2);border:1px solid transparent;transition:all .15s}
.ct:hover{color:var(--tx);background:var(--sf)}.ct.on{background:var(--cydim);color:var(--cy);border-color:rgba(232,96,10,.2)}
.tw{background:var(--sf);border:1px solid var(--bd);border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.ts{overflow-x:auto;max-height:580px;overflow-y:auto}
.inf{padding:9px 14px;font-family:var(--m);font-size:10px;color:var(--tx2);border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px;align-items:center}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--bg2);padding:9px 10px;text-align:left;font-family:var(--m);font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--tx2);font-weight:600;border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:2;white-space:nowrap}
thead th.yc{color:var(--cy);background:rgba(232,96,10,.04)}
tbody tr{border-bottom:1px solid rgba(0,0,0,.06)}tbody tr:hover{background:rgba(232,96,10,.03)}
td{padding:7px 10px;white-space:nowrap}td.pn{font-weight:500;color:var(--tx);max-width:240px;white-space:normal;word-break:break-word;font-size:13px}
td.dm{color:var(--tx2);font-size:12px}td.pr{font-family:var(--m);font-weight:600;font-size:13px}
td.pr.yp{color:var(--cy);background:rgba(232,96,10,.04);font-weight:700}td.pr.hi{color:var(--gn)}td.pr.lo{color:var(--rd)}
.df{display:inline-block;font-size:8px;padding:1px 4px;border-radius:3px;margin-left:3px;font-weight:600;font-family:var(--m)}
.df.up{background:rgba(26,143,63,.1);color:var(--gn)}.df.dn{background:rgba(212,32,48,.1);color:var(--rd)}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:600;font-family:var(--m)}
.badge.gn{background:rgba(26,143,63,.1);color:var(--gn)}.badge.rd{background:rgba(212,32,48,.1);color:var(--rd)}
.badge.am{background:rgba(232,96,10,.1);color:var(--am)}.badge.cy{background:rgba(232,96,10,.08);color:var(--cy)}
.dlist{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px}
.dcard{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 3px rgba(0,0,0,.06);gap:8px}
.dcard.you{border-color:rgba(232,96,10,.3);background:rgba(232,96,10,.04)}
.dcard-n{font-size:12px;font-weight:500;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dcard-c{font-size:10px;color:var(--tx2);margin-top:2px}.dcard-v{font-family:var(--m);font-size:18px;font-weight:600;color:var(--cy)}
.empty{padding:40px 20px;text-align:center;color:var(--tx2)}.empty h3{font-size:15px;margin-bottom:5px;color:var(--tx);font-weight:500}
.ld{display:flex;align-items:center;justify-content:center;padding:80px 20px;flex-direction:column;gap:12px}
.sp{width:28px;height:28px;border:2px solid #ddd;border-top-color:var(--cy);border-radius:50%;animation:s .7s linear infinite}@keyframes s{to{transform:rotate(360deg)}}
.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.radius-ctrl{display:flex;align-items:center;gap:10px;padding:8px 0}
.radius-ctrl input[type=range]{flex:1;accent-color:var(--cy)}.radius-ctrl label{font-family:var(--m);font-size:11px;color:var(--tx2);white-space:nowrap}
.radius-ctrl .rv{font-family:var(--m);font-size:12px;color:var(--cy);font-weight:600;min-width:50px;text-align:right}
.dsel{max-height:340px;overflow-y:auto}
.dsel-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid rgba(0,0,0,.06);cursor:pointer;transition:background .1s}
.dsel-item:hover{background:rgba(232,96,10,.04)}
.dsel-item.on{background:rgba(232,96,10,.06)}
.dsel-item.you{border-left:3px solid var(--cy)}
.dsel-left{display:flex;align-items:center;gap:8px}
.dsel-dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--tx3);flex-shrink:0;transition:all .15s}
.dsel-item.on .dsel-dot{background:var(--cy);border-color:var(--cy);box-shadow:0 0 4px rgba(232,96,10,.3)}
.dsel-name{font-size:13px;font-weight:500;color:var(--tx)}
.dsel-item.you .dsel-name{color:var(--cy2)}
.dsel-count{font-family:var(--m);font-size:11px;color:var(--tx2)}
.dsel-grp{font-size:11px;font-weight:600;color:var(--tx2);padding:10px 12px 4px;text-transform:uppercase;letter-spacing:1px;border-top:1px solid rgba(0,0,0,.08)}
.detail-card{background:var(--sf);border:2px solid var(--cy);border-radius:10px;padding:16px;margin-bottom:14px;box-shadow:0 4px 20px rgba(232,96,10,.1)}
.detail-card h3{font-size:14px;font-weight:600;color:var(--cy2);margin-bottom:8px}
.detail-card .detail-brand{font-size:11px;color:var(--tx2);margin-bottom:10px;font-family:var(--m)}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;border-bottom:1px solid rgba(0,0,0,.06);font-size:13px}
.detail-row:last-child{border-bottom:none}
.detail-row.you-row{background:rgba(232,96,10,.06);border-left:3px solid var(--cy)}
.detail-row .dr-name{font-weight:500;flex:1}
.detail-row .dr-price{font-family:var(--m);font-weight:600;min-width:70px;text-align:right}
.detail-row .dr-price.cheapest{color:var(--gn)}.detail-row .dr-price.priciest{color:var(--rd)}
@media(max-width:900px){.g2{grid-template-columns:1fr}}
@media(max-width:640px){.hdr{flex-direction:column;align-items:flex-start}.stats{grid-template-columns:repeat(2,1fr)}.tabs{flex-wrap:wrap}}

/* ═══ TERMINAL BOOT SEQUENCE ═══ */
.boot{background:#0d0d0d;position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;justify-content:center;padding:40px 60px;font-family:'IBM Plex Mono',monospace;overflow:hidden}
.boot::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);pointer-events:none;z-index:1}
.boot-logo{font-size:42px;font-weight:700;letter-spacing:16px;color:#e8600a;margin-bottom:8px;opacity:0;animation:bootIn .4s ease forwards}
.boot-sub{font-size:11px;letter-spacing:4px;color:#5a4a3a;margin-bottom:32px;opacity:0;animation:bootIn .4s ease .2s forwards}
.boot-line{font-size:12px;color:#3a6a3a;margin:3px 0;opacity:0;animation:bootIn .3s ease forwards;display:flex;align-items:center;gap:8px}
.boot-line.ok{color:#1a8f3f}.boot-line.warn{color:#e8600a}.boot-line.info{color:#5a6370}
.boot-line .bl-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.boot-line .bl-val{color:#e8600a;font-weight:600}
.boot-bar{margin-top:20px;height:2px;background:#1a1a1a;border-radius:1px;overflow:hidden;opacity:0;animation:bootIn .3s ease 1.5s forwards}
.boot-bar-fill{height:100%;background:linear-gradient(90deg,#e8600a,#ff9a40);width:0;animation:barFill 1.2s ease 1.7s forwards;border-radius:1px}
.boot-ready{font-size:13px;color:#e8600a;margin-top:16px;opacity:0;animation:bootIn .4s ease 2.8s forwards;font-weight:600;letter-spacing:2px}
@keyframes bootIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes barFill{to{width:100%}}
.boot.done{opacity:0;transition:opacity .5s ease;pointer-events:none}

/* ═══ SKELETON SHIMMER ═══ */
.skel{position:relative;overflow:hidden;background:#e8e8ec;border-radius:4px}
.skel::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.6),transparent);animation:shimmer 1.4s ease infinite}
@keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
.skel-row{display:flex;gap:10px;padding:8px 14px;border-bottom:1px solid rgba(0,0,0,.04)}
.skel-row .skel{height:14px}
.skel-card{border-radius:8px;padding:14px;border:1px solid var(--bd);background:var(--bg2)}
.skel-card .skel{margin-bottom:8px}
.skel-card .skel:last-child{margin-bottom:0}

/* ═══ DETAILED VIEW MODAL ═══ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--sf);border-radius:14px;max-width:720px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);border:1px solid var(--bd);animation:modalIn .25s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;border-bottom:1px solid var(--bd)}
.modal-hdr h2{font-size:18px;font-weight:700;color:var(--tx);margin:0}
.modal-hdr .modal-close{width:32px;height:32px;border-radius:8px;border:1px solid var(--bd);background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--tx2);transition:all .15s}
.modal-hdr .modal-close:hover{border-color:var(--rd);color:var(--rd);background:rgba(212,32,48,.05)}
.modal-body{padding:22px}
.modal-stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.modal-stat{background:var(--bg);border-radius:8px;padding:12px;text-align:center;border:1px solid var(--bd)}
.modal-stat .ms-val{font-family:var(--m);font-size:24px;font-weight:700;color:var(--cy)}
.modal-stat .ms-lbl{font-family:var(--m);font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--tx2);margin-top:2px}
.modal-section{margin-bottom:20px}
.modal-section h3{font-family:var(--m);font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--tx2);margin-bottom:12px}
.cat-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.cat-bar-label{font-size:12px;font-weight:600;color:var(--tx);min-width:90px;text-align:right}
.cat-bar-track{flex:1;height:24px;background:var(--bg);border-radius:4px;overflow:hidden;border:1px solid var(--bd)}
.cat-bar-fill{height:100%;border-radius:3px;transition:width .6s ease;display:flex;align-items:center;padding:0 8px}
.cat-bar-fill span{font-family:var(--m);font-size:10px;font-weight:600;color:#fff;white-space:nowrap}
.cat-bar-count{font-family:var(--m);font-size:12px;color:var(--tx2);min-width:30px}
.trend-placeholder{background:var(--bg);border:1px dashed var(--bd2);border-radius:8px;padding:24px;text-align:center}
.trend-placeholder .tp-icon{font-size:28px;margin-bottom:8px;opacity:.4}
.trend-placeholder p{font-size:12px;color:var(--tx2);line-height:1.5}
.trend-placeholder .tp-label{font-family:var(--m);font-size:10px;color:var(--tx3);letter-spacing:1px;text-transform:uppercase;margin-top:8px}
.dcard-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}
.btn-detail{padding:5px 10px;border-radius:5px;font-size:9px;font-weight:700;cursor:pointer;border:none;background:var(--cy);color:#000;font-family:var(--m);transition:all .15s;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.btn-detail:hover{background:var(--cy2);color:#fff}

/* ═══ HIGHS/LOWS TAB ═══ */
.hl-section{margin-bottom:16px}
.hl-section-title{font-family:var(--m);font-size:14px;text-transform:uppercase;letter-spacing:1.5px;color:var(--tx);font-weight:700;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--cy)}
.hl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
.hl-card{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.hl-card-title{font-family:var(--m);font-size:12px;font-weight:700;color:var(--tx);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.hl-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(0,0,0,.05)}
.hl-row:last-child{border-bottom:none}
.hl-label{font-size:11px;color:var(--tx2);font-family:var(--m);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.hl-val{display:flex;flex-direction:column;align-items:flex-end}
.hl-price{font-family:var(--m);font-size:14px;font-weight:700}
.hl-price.lo{color:var(--gn)}.hl-price.hi{color:var(--rd)}
.hl-disp{font-size:9px;color:var(--tx3);max-width:180px;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hl-empty{font-size:11px;color:var(--tx3);text-align:center;padding:12px 8px}
.hl-count{font-family:var(--m);font-size:10px;color:var(--tx3);margin-left:6px}

/* ═══ DEALS TAB ═══ */
.deal-promo{background:linear-gradient(135deg,rgba(232,96,10,.06),rgba(232,96,10,.02));border:1px solid rgba(232,96,10,.15);border-radius:10px;padding:16px;margin-bottom:12px}
.deal-promo-title{font-family:var(--m);font-size:14px;font-weight:700;color:var(--cy2);margin-bottom:4px}
.deal-promo-desc{font-size:12px;color:var(--tx2);line-height:1.5}
.deal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px;margin-top:12px}
.deal-card{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.deal-card-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.deal-card-disp{font-family:var(--m);font-size:11px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px}
.deal-card-badge{font-family:var(--m);font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;background:rgba(26,143,63,.1);color:var(--gn)}
.deal-card-product{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:4px;line-height:1.3}
.deal-card-brand{font-size:10px;color:var(--tx3);margin-bottom:6px}
.deal-card-prices{display:flex;align-items:center;gap:8px}
.deal-card-sale{font-family:var(--m);font-size:16px;font-weight:700;color:var(--gn)}
.deal-card-orig{font-family:var(--m);font-size:12px;color:var(--tx3);text-decoration:line-through}
.deal-card-save{font-size:10px;color:var(--gn);font-weight:600}

/* ═══ PRICING ALERTS SPLIT VIEW ═══ */
.alert-split{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:12px}
@media(max-width:800px){.alert-split{grid-template-columns:1fr}}
.alert-col{border-radius:10px;padding:14px 16px;max-height:600px;overflow-y:auto}
.alert-col.drops{background:rgba(212,32,48,.04);border:1px solid rgba(212,32,48,.15)}
.alert-col.increases{background:rgba(26,143,63,.04);border:1px solid rgba(26,143,63,.15)}
.alert-col-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;position:sticky;top:-14px;padding:14px 0 8px;z-index:1}
.alert-col.drops .alert-col-hdr{background:rgba(212,32,48,.04)}
.alert-col.increases .alert-col-hdr{background:rgba(26,143,63,.04)}
.alert-col-title{font-family:var(--m);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px}
.alert-col.drops .alert-col-title{color:var(--rd)}
.alert-col.increases .alert-col-title{color:var(--gn)}

function DetailedView({disp,data,onClose}){
  if(!disp)return null;
  var prods=data.products||[];
  var dispNames=disp.rawNames||[];
  
  // Count products per category for this dispensary
  var catCounts={};var totalSKUs=0;
  prods.forEach(function(p){
    var found=false;
    for(var i=0;i<dispNames.length;i++){
      if(p.dispensaries&&p.dispensaries[dispNames[i]]){found=true;break}
    }
    if(found){
      var cat=(p.category||"Other");
      catCounts[cat]=(catCounts[cat]||0)+1;
      totalSKUs++;
    }
  });
  
  var catEntries=Object.entries(catCounts).sort(function(a,b){return b[1]-a[1]});
  var maxCat=catEntries.length>0?catEntries[0][1]:1;
  var catColors={"Flower":"#2d8f3f","Vaporizers":"#6366f1","Edible":"#e8600a","Pre-Rolls":"#0891b2","Concentrate":"#7c3aed","Tincture":"#db2777","Topical":"#ea580c","CBD":"#059669","other":"#94a3b8"};
  
  // Calculate avg price per category
  var catAvgPrices={};
  prods.forEach(function(p){
    for(var i=0;i<dispNames.length;i++){
      var pr=p.dispensaries&&p.dispensaries[dispNames[i]];
      if(pr){
        var cat=(p.category||"Other");
        if(!catAvgPrices[cat])catAvgPrices[cat]={sum:0,count:0};
        catAvgPrices[cat].sum+=pr;catAvgPrices[cat].count++;
        break;
      }
    }
  });
  
  return React.createElement("div",{className:"modal-overlay",onClick:function(e){if(e.target===e.currentTarget)onClose()}},
    React.createElement("div",{className:"modal"},
      React.createElement("div",{className:"modal-hdr"},
        React.createElement("h2",null,disp.name),
        React.createElement("button",{className:"modal-close",onClick:onClose},"✕")
      ),
      React.createElement("div",{className:"modal-body"},
        // Stats row
        React.createElement("div",{className:"modal-stat-row"},
          React.createElement("div",{className:"modal-stat"},
            React.createElement("div",{className:"ms-val"},totalSKUs.toLocaleString()),
            React.createElement("div",{className:"ms-lbl"},"Total SKUs")
          ),
          React.createElement("div",{className:"modal-stat"},
            React.createElement("div",{className:"ms-val"},catEntries.length),
            React.createElement("div",{className:"ms-lbl"},"Categories")
          ),
          React.createElement("div",{className:"modal-stat"},
            React.createElement("div",{className:"ms-val"},disp.city),
            React.createElement("div",{className:"ms-lbl"},"Location")
          )
        ),
        // Category breakdown bars
        React.createElement("div",{className:"modal-section"},
          React.createElement("h3",null,"SKU Breakdown by Category"),
          catEntries.map(function(e){
            var cat=e[0],count=e[1];
            var pct=Math.round((count/maxCat)*100);
            var color=catColors[cat]||catColors["other"];
            var avgP=catAvgPrices[cat]?Math.round(catAvgPrices[cat].sum/catAvgPrices[cat].count*100)/100:0;
            return React.createElement("div",{key:cat,className:"cat-bar-row"},
              React.createElement("span",{className:"cat-bar-label"},cat),
              React.createElement("div",{className:"cat-bar-track"},
                React.createElement("div",{className:"cat-bar-fill",style:{width:pct+"%",background:color}},
                  count>10?React.createElement("span",null,count):null
                )
              ),
              React.createElement("span",{className:"cat-bar-count"},count),
              React.createElement("span",{style:{fontFamily:'var(--m)',fontSize:10,color:'var(--tx3)',minWidth:55,textAlign:'right'}},avgP?"~$"+avgP.toFixed(0):"")
            );
          })

        // Week-over-week trend placeholder
        React.createElement("div",{className:"modal-section"},

function ProductDetail({product}){
  if(!product)return null;
  var entries=Object.entries(product.dispensaries||{}).sort((a,b)=>a[1]-b[1]);
  var prices=entries.map(e=>e[1]);
  var minP=Math.min(...prices);var maxP=Math.max(...prices);

    <h3>{product.name}</h3>
    <div className="detail-brand">{product.brand} · {product.category} · {product.weight}</div>
    {entries.map(([disp,price])=>{
      var you=isAff(disp);var cls="dr-price";
      if(price===minP&&entries.length>1)cls+=" cheapest";
      else if(price===maxP&&entries.length>1)cls+=" priciest";
      return<div key={disp} className={"detail-row"+(you?" you-row":"")}>
        <span className="dr-name">{you?"★ ":""}{cleanD(disp)}</span>
        <span className={cls}>${price.toFixed(2)}{price===minP&&entries.length>1?<span className="df up"> LOWEST</span>:null}{price===maxP&&entries.length>1&&price!==minP?<span className="df dn"> HIGHEST</span>:null}</span>
      </div>
    })}
  </div>;
}

function DispPanel({data,sel,setSel,toggleFav}){
  const prods=data.products||[];const allD=useMemo(()=>getDisps(prods),[prods]);
  const counts=useMemo(()=>{const c={};allD.forEach(d=>c[d]=0);prods.forEach(p=>Object.keys(p.dispensaries||{}).forEach(d=>{if(c[d]!==undefined)c[d]++}));return c},[prods,allD]);
  
  // Deduplicated counts per base group (count unique product names across med+rec)
  const groupCounts=useMemo(()=>{
    const byBase=new Map();
    allD.forEach(d=>{const b=getBase(d);if(!byBase.has(b))byBase.set(b,[]);byBase.get(b).push(d)});
    const gc={};
    byBase.forEach((entries,base)=>{
      const names=new Set();
      prods.forEach(p=>{entries.forEach(d=>{if(p.dispensaries&&p.dispensaries[d])names.add((p.name||"").toLowerCase())})});
      gc[base]=names.size;
    });
    return gc;
  },[prods,allD]);
  
  // Group dispensaries by base name, detect med/rec variants
  const grouped=useMemo(()=>{
    const byBase=new Map();
    allD.forEach(d=>{
      const base=getBase(d);
      if(!byBase.has(base))byBase.set(base,{base:base,entries:[],hasMed:false,hasRec:false,isYou:false});
      const g=byBase.get(base);g.entries.push(d);
      if(isAff(d))g.isYou=true;
      if(/\(Med\)/i.test(d))g.hasMed=true;
      else if(/\(Rec\)/i.test(d))g.hasRec=true;
    });
    return[...byBase.values()].sort((a,b)=>a.base.localeCompare(b.base));
  },[allD]);
  
  const togEntry=useCallback(d=>{setSel(p=>{const n=new Set(p);n.has(d)?n.delete(d):n.add(d);return n})},[]);
  const togGroup=useCallback(g=>{setSel(p=>{const n=new Set(p);const allOn=g.entries.every(d=>n.has(d));g.entries.forEach(d=>{allOn?n.delete(d):n.add(d)});return n})},[]);
  
  return<div className="pnl"><div className="row" style={{justifyContent:'space-between',marginBottom:10}}><span className="pnl-t" style={{margin:0}}>Compare dispensaries</span>
      <div className="row"><button className="btn" onClick={()=>setSel(new Set(allD))}>All</button><button className="btn" onClick={()=>setSel(new Set(allD.filter(isAff)))}>Mine</button><button className="btn" onClick={()=>setSel(new Set())}>Clear</button></div></div>
    <div className="pnl-d">Select dispensaries to compare. Click ★ to mark as your dispensary.</div>
    <div className="dsel">{grouped.map(g=>{
      const anyOn=g.entries.some(d=>sel.has(d));
      const you=g.isYou;
      const hasBoth=g.hasMed&&g.hasRec;
      const medD=g.entries.find(d=>/\(Med\)/i.test(d));
      const recD=g.entries.find(d=>/\(Rec\)/i.test(d));
      const plainD=g.entries.find(d=>!/\(Med\)|\(Rec\)/i.test(d));
      const totalCount=groupCounts[g.base]||0;
      
      return<div key={g.base} className={"dsel-item"+(anyOn?" on":"")+(you?" you":"")}>
        <div className="dsel-left" onClick={()=>togGroup(g)} style={{flex:1,cursor:'pointer'}}>
          <div className="dsel-dot"/><span className="dsel-name">{g.base}</span>
        </div>
        <div className="row" style={{gap:4}}>
          {hasBoth?<>
            <button onClick={e=>{e.stopPropagation();togEntry(medD)}} style={{padding:'3px 8px',borderRadius:4,fontSize:9,fontWeight:700,fontFamily:'var(--m)',cursor:'pointer',border:'1px solid',letterSpacing:'.5px',
              background:sel.has(medD)?'var(--cy)':'transparent',color:sel.has(medD)?'#fff':'var(--tx3)',borderColor:sel.has(medD)?'var(--cy)':'var(--bd)',transition:'all .15s'}}>MED</button>
            <button onClick={e=>{e.stopPropagation();togEntry(recD)}} style={{padding:'3px 8px',borderRadius:4,fontSize:9,fontWeight:700,fontFamily:'var(--m)',cursor:'pointer',border:'1px solid',letterSpacing:'.5px',
              background:sel.has(recD)?'var(--cy)':'transparent',color:sel.has(recD)?'#fff':'var(--tx3)',borderColor:sel.has(recD)?'var(--cy)':'var(--bd)',transition:'all .15s'}}>REC</button>
          </>:null}
          {!hasBoth&&g.hasMed&&medD?<button onClick={e=>{e.stopPropagation();togEntry(medD)}} style={{padding:'3px 8px',borderRadius:4,fontSize:9,fontWeight:700,fontFamily:'var(--m)',cursor:'pointer',border:'1px solid',letterSpacing:'.5px',
            background:sel.has(medD)?'var(--cy)':'transparent',color:sel.has(medD)?'#fff':'var(--tx3)',borderColor:sel.has(medD)?'var(--cy)':'var(--bd)',transition:'all .15s'}}>MED ONLY</button>:null}
          {!hasBoth&&g.hasRec&&recD?<button onClick={e=>{e.stopPropagation();togEntry(recD)}} style={{padding:'3px 8px',borderRadius:4,fontSize:9,fontWeight:700,fontFamily:'var(--m)',cursor:'pointer',border:'1px solid',letterSpacing:'.5px',
            background:sel.has(recD)?'var(--cy)':'transparent',color:sel.has(recD)?'#fff':'var(--tx3)',borderColor:sel.has(recD)?'var(--cy)':'var(--bd)',transition:'all .15s'}}>REC ONLY</button>:null}
          <span className="dsel-count">{totalCount.toLocaleString()}</span>
          <span onClick={e=>{e.stopPropagation();g.entries.forEach(d=>toggleFav(d))}} style={{cursor:'pointer',fontSize:16,color:you?'var(--cy)':'var(--tx3)',transition:'color .15s',lineHeight:1}} title={you?'Remove from my dispensaries':'Mark as my dispensary'}>{you?'★':'☆'}</span>
        </div>
      </div>
    })}</div></div>;
}

  const rows=useMemo(()=>{let it=prods;if(cat!=="All")it=it.filter(p=>p.category===cat);if(q.trim()){const s=q.toLowerCase();it=it.filter(p=>(p.name||"").toLowerCase().includes(s)||(p.brand||"").toLowerCase().includes(s))}return it.filter(p=>{const n=Object.keys(p.dispensaries||{}).filter(x=>sel.has(x)).length;return comp?n>=2:n>=1})},[prods,q,sel,cat,comp]);
  const doExport=()=>{const hdr=["Product","Brand","Category",...cols.map(cleanD)];const d=rows.map(p=>[p.name,p.brand,p.category,...cols.map(c=>p.dispensaries?.[c]||"")]);const ws=XLSX.utils.aoa_to_sheet([hdr,...d]);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"ATHENA");XLSX.writeFile(wb,"athena_export.xlsx")};
  return<div className="tw"><div className="inf"><span>{rows.length.toLocaleString()} product{rows.length!==1?"s":""}</span><div className="row" style={{gap:10}}><label style={{fontSize:10,color:'var(--tx2)',cursor:'pointer',display:'flex',alignItems:'center',gap:4}}><input type="checkbox" checked={comp} onChange={e=>setComp(e.target.checked)}/>Comparable only</label><button className="btn pri" onClick={doExport}>Export Excel</button></div></div>
    {!rows.length?<div className="empty"><h3>No matches</h3></div>:<div className="ts"><table><thead><tr><th style={{minWidth:160}}>Product</th><th>Brand</th><th>Cat</th>{cols.map(d=><th key={d} className={isAff(d)?"yc":""}>{isAff(d)?"★ ":""}{cleanD(d)}</th>)}</tr></thead>
      <tbody>{rows.slice(0,500).map((p,i)=>{const yp=getYP(p,affC);return<tr key={i}><td className="pn">{p.name}</td><td className="dm">{p.brand}</td><td className="dm">{p.category}</td>
        {cols.map(d=>{const pr=p.dispensaries?.[d];if(!pr)return<td key={d} className="pr"></td>;const pm=p.promos?.[d];let c="pr";const y=isAff(d);if(y)c+=" yp";else if(yp&&pr>yp)c+=" hi";else if(yp&&pr<yp)c+=" lo";let df=null;if(!y&&yp&&yp>0){const pct=Math.round((pr-yp)/yp*100);if(pct>0)df=<span className="df up">+{pct}%</span>;else if(pct<0)df=<span className="df dn">{pct}%</span>}return<td key={d} className={c}>${pr.toFixed(2)}{pm?<span style={{fontSize:9,color:'var(--am)',marginLeft:3}}>(promo ${pm.toFixed(2)})</span>:null}{df}</td>})}</tr>})}</tbody></table></div>}</div>;
}

var HL_BUCKETS = [
  { section: "Flower", buckets: [
    { label: "3.5g Flower", cat: "flower", match: function(w){ return /\b3\.5\s*g/i.test(w) } },
    { label: "7g Flower", cat: "flower", match: function(w){ return /\b7\s*g/i.test(w) && !/\b3\.5/i.test(w) && !/\b14/i.test(w) && !/\b28/i.test(w) } },
    { label: "14g Flower", cat: "flower", match: function(w){ return /\b14\s*g/i.test(w) } },
    { label: "28g Flower", cat: "flower", match: function(w){ return /\b28\s*g/i.test(w) || /\b1\s*oz/i.test(w) } },
  ]},
  { section: "Vapes", buckets: [
    { label: "0.3g Vape", cat: "vaporizers", match: function(w){ return /\b0?\.3\s*g/i.test(w) || /\b300\s*mg/i.test(w) } },
    { label: "0.5g Vape", cat: "vaporizers", match: function(w){ return /\b0?\.5\s*g/i.test(w) || /\b500\s*mg/i.test(w) } },
    { label: "1g Vape", cat: "vaporizers", match: function(w){ return /\b1\s*g\b/i.test(w) && !/\b0\./i.test(w) } },
  ]},

    { label: "Single Pre-Roll (0.5-1g)", cat: "pre-rolls", match: function(w){ return (/\b[01]?\.\d+\s*g/i.test(w) || /\b1\s*g\b/i.test(w)) && !/pk|pack|ct\b/i.test(w) } },
    { label: "Pre-Roll 3pk", cat: "pre-rolls", match: function(w){ return /\b3\s*(?:pk|pack|ct)\b/i.test(w) } },
    { label: "Pre-Roll 5pk", cat: "pre-rolls", match: function(w){ return /\b5\s*(?:pk|pack|ct)\b/i.test(w) } },
    { label: "Pre-Roll 7pk", cat: "pre-rolls", match: function(w){ return /\b7\s*(?:pk|pack|ct)\b/i.test(w) } },

function HighLowTab({data,favsVer,toggleFav,sel,setSel}){
  var[radius,setRadius]=useState(10);
  var prods=data.products||[];

  var analysis=useMemo(function(){
    var results=[];
    var dealsMap={};(data.deals||[]).forEach(function(d){var k=d.product+"|"+d.dispensary;if(!dealsMap[k]||d.discounted<dealsMap[k])dealsMap[k]=d.discounted});
    HL_BUCKETS.forEach(function(section){
      var sectionResults={section:section.section,buckets:[]};
      section.buckets.forEach(function(bucket){
        var matches=[];
        prods.forEach(function(p){
          var pCat=(p.category||"").toLowerCase();
          if(pCat!==bucket.cat)return;
          var wl=(p.weight_label||"")+" "+(p.name||"");
          if(!bucket.match(wl))return;
          Object.entries(p.dispensaries||{}).forEach(function(e){
            var disp=e[0],price=e[1];
            if(sel.size>0&&!sel.has(disp))return;
            var dealPrice=dealsMap[p.name+"|"+disp]||null;
            matches.push({name:p.name,brand:p.brand,disp:disp,price:price,dealPrice:dealPrice});
          });
        });
        if(matches.length===0){sectionResults.buckets.push({label:bucket.label,count:0,low:null,high:null,dealLow:null,dealHigh:null});return}
        matches.sort(function(a,b){return a.price-b.price});
        var low=matches[0];var high=matches[matches.length-1];
        // Find lowest/highest after deals
        var withDeals=matches.filter(function(m){return m.dealPrice&&m.dealPrice<m.price});
        var dealLow=withDeals.length>0?withDeals.sort(function(a,b){return a.dealPrice-b.dealPrice})[0]:null;
        var dealHigh=withDeals.length>0?withDeals.sort(function(a,b){return b.dealPrice-a.dealPrice})[0]:null;
        var uniq=new Set();matches.forEach(function(m){uniq.add(m.name)});
        sectionResults.buckets.push({label:bucket.label,count:uniq.size,totalListings:matches.length,
          low:{price:low.price,name:low.name,brand:low.brand,disp:low.disp},
          high:{price:high.price,name:high.name,brand:high.brand,disp:high.disp},
          dealLow:dealLow?{price:dealLow.dealPrice,name:dealLow.name,disp:dealLow.disp}:null,
          dealHigh:dealHigh?{price:dealHigh.dealPrice,name:dealHigh.name,disp:dealHigh.disp}:null});
      });
      results.push(sectionResults);
    });
    return results;
  },[prods,sel,data]);

  var doExport=function(){
    var rows=[["Section","Size","Products","Lowest Price","Lowest Product","Lowest Dispensary","Highest Price","Highest Product","Highest Dispensary"]];
    analysis.forEach(function(s){s.buckets.forEach(function(b){
      if(b.count===0){rows.push([s.section,b.label,0,"","","","","",""]);return}
      rows.push([s.section,b.label,b.count,"$"+b.low.price.toFixed(2),b.low.name,cleanD(b.low.disp),"$"+b.high.price.toFixed(2),b.high.name,cleanD(b.high.disp)]);
    })});
    var ws=XLSX.utils.aoa_to_sheet(rows);var wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"Highs Lows");
    ws["!cols"]=[{wch:12},{wch:18},{wch:8},{wch:12},{wch:35},{wch:25},{wch:12},{wch:35},{wch:25}];
    XLSX.writeFile(wb,"athena_highs_lows.xlsx");
  };

  return<><div className="g2"><MapPanel data={data} sel={sel} setSel={setSel} radius={radius} setRadius={setRadius}/><DispPanel data={data} sel={sel} setSel={setSel} toggleFav={toggleFav}/></div>
    <div className="pnl" style={{marginTop:12}}>
      <div className="row" style={{justifyContent:'space-between',marginBottom:10}}>
        <span className="pnl-t" style={{margin:0}}>Price Highs & Lows{sel.size>0?" ("+sel.size+" dispensaries)":""}</span>
        <button className="btn pri" onClick={doExport}>Export Excel</button>
      </div>
      <div className="pnl-d">{sel.size>0?"Showing highest and lowest prices across "+sel.size+" selected dispensaries.":"Showing prices across all dispensaries. Select specific ones above to compare."}</div>
      {analysis.map(function(s){return<div key={s.section} className="hl-section">
        <div className="hl-section-title">{s.section}</div>
        <div className="hl-grid">{s.buckets.map(function(b){return<div key={b.label} className="hl-card">
          <div className="hl-card-title">{b.label}<span className="hl-count">{b.count>0?b.count+" products":""}</span></div>
          {b.count===0?<div className="hl-empty">No products found{sel.size>0?" at selected dispensaries":""}</div>:<>
            <div className="hl-row">
              <div className="hl-label">Lowest</div>
              <div className="hl-val">
                <div className="hl-price lo">{"$"+b.low.price.toFixed(2)}</div>
                <div className="hl-disp" style={{fontWeight:500,color:'var(--tx)',fontSize:10,maxWidth:180}} title={b.low.name}>{b.low.name}</div>
                <div className="hl-disp">{cleanD(b.low.disp)}</div>
              </div>
            </div>
            {b.dealLow&&b.dealLow.price<b.low.price?<div className="hl-row">
              <div className="hl-label" style={{fontSize:9}}>Lowest w/ Deal</div>
              <div className="hl-val">
                <div className="hl-price lo" style={{fontSize:13}}>{"$"+b.dealLow.price.toFixed(2)}</div>
                <div className="hl-disp" style={{fontWeight:500,color:'var(--tx)',fontSize:10,maxWidth:180}} title={b.dealLow.name}>{b.dealLow.name}</div>
                <div className="hl-disp">{cleanD(b.dealLow.disp)}</div>
              </div>
            </div>:null}
            <div className="hl-row">
              <div className="hl-label">Highest</div>
              <div className="hl-val">
                <div className="hl-price hi">{"$"+b.high.price.toFixed(2)}</div>
                <div className="hl-disp" style={{fontWeight:500,color:'var(--tx)',fontSize:10,maxWidth:180}} title={b.high.name}>{b.high.name}</div>
                <div className="hl-disp">{cleanD(b.high.disp)}</div>
              </div>
            </div>
            <div className="hl-row" style={{borderBottom:'none'}}>
              <div className="hl-label">Spread</div>
              <div className="hl-val">
                <div className="hl-price" style={{color:'var(--cy)',fontSize:12}}>{"$"+(b.high.price-b.low.price).toFixed(2)}</div>
              </div>
            </div>
          </>}
        </div>})}</div>
      </div>})}
    </div></>;
}

/* ═══════════════════════════════════════
   PRICING ALERTS TAB — Split View
   Left (red): Price drops   Right (green): Price increases
   ═══════════════════════════════════════ */
function AlertsTab({data,favsVer,toggleFav,sel,setSel}){
  var[alertCat,setAlertCat]=useState("All");
  var[radius,setRadius]=useState(10);
  var deals=(data.deals||[]).filter(function(d){return(d.category||"").toLowerCase()!=="accessories"});
  
  var alertCats=useMemo(function(){var s=new Set();deals.forEach(function(d){s.add(d.category||"Other")});return["All",...[...s].sort()]},[deals]);
  
  // Filter deals by selected dispensaries
  var filteredDeals=useMemo(function(){
    if(sel.size===0)return deals;
    return deals.filter(function(x){return sel.has(x.dispensary)});
  },[deals,sel]);
  
  var drops=useMemo(function(){
    var filtered=alertCat==="All"?filteredDeals:filteredDeals.filter(function(d){return d.category===alertCat});
    return filtered.filter(function(d){return d.discounted<d.original}).sort(function(a,b){return a.pct_off-b.pct_off}).reverse()
  },[filteredDeals,alertCat]);
  
  var increases=useMemo(function(){
    var prods=data.products||[];
    var items=[];
    prods.forEach(function(p){
      if(alertCat!=="All"&&p.category!==alertCat)return;
      Object.entries(p.dispensaries||{}).forEach(function(e){
        var disp=e[0],price=e[1];
        if(sel.size>0&&!sel.has(disp))return;
        var promo=p.promos&&p.promos[disp];
        if(promo&&promo>price){
          items.push({product:p.name,brand:p.brand,dispensary:disp,category:p.category,original:price,current:promo,pct:Math.round((promo-price)/price*100)});
        }
      });
    });
    return items.sort(function(a,b){return b.pct-a.pct})
  },[data,alertCat,sel]);
  
  var totalDrops=drops.length;
  var totalIncreases=increases.length;
  
  var doExport=function(){
    var rows=[["Type","Product","Brand","Dispensary","Category","Previous Price","New Price","% Change"]];
    drops.forEach(function(d){rows.push(["DECREASE",d.product,d.brand,cleanD(d.dispensary),d.category,"$"+d.original.toFixed(2),"$"+d.discounted.toFixed(2),"-"+d.pct_off+"%"])});
    increases.forEach(function(d){rows.push(["INCREASE",d.product,d.brand,cleanD(d.dispensary),d.category,"$"+d.original.toFixed(2),"$"+d.current.toFixed(2),"+"+d.pct+"%"])});
    var ws=XLSX.utils.aoa_to_sheet(rows);var wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"Price Movements");
    ws["!cols"]=[{wch:10},{wch:40},{wch:20},{wch:30},{wch:15},{wch:14},{wch:14},{wch:10}];
    XLSX.writeFile(wb,"athena_price_movements.xlsx")
  };
  
  return<><div className="g2"><MapPanel data={data} sel={sel} setSel={setSel} radius={radius} setRadius={setRadius}/><DispPanel data={data} sel={sel} setSel={setSel} toggleFav={toggleFav}/></div>
    <div className="pnl" style={{marginTop:12}}>
      <div className="row" style={{justifyContent:'space-between',marginBottom:10}}>
        <span className="pnl-t" style={{margin:0}}>Price Movements{sel.size>0?" ("+sel.size+" dispensaries)":""}</span>
        <button className="btn pri" onClick={doExport}>Export Report</button>
      </div>
      <div className="pnl-d">Track price changes across {sel.size>0?"selected":"all"} dispensaries. Price drops on the left, increases on the right.</div>
      <div className="stats" style={{marginBottom:12}}>
        <div className="st"><div className="st-l">Price Drops</div><div className="st-v rd">{totalDrops.toLocaleString()}</div></div>
        <div className="st"><div className="st-l">Price Increases</div><div className="st-v gn">{totalIncreases.toLocaleString()}</div></div>
        <div className="st"><div className="st-l">Net Movement</div><div className={"st-v "+(totalDrops>totalIncreases?"rd":"gn")}>{totalDrops>totalIncreases?"↓ More drops":"↑ More increases"}</div></div>
      </div>
      <div className="alert-cats">{alertCats.map(function(c){return<div key={c} className={"alert-cat "+(alertCat===c?"on":"")} onClick={function(){setAlertCat(c)}}>{c}</div>})}</div>
      <div className="alert-split">
        <div className="alert-col drops">
          <div className="alert-col-hdr"><span className="alert-col-title">▼ Price Drops</span><span className="alert-col-count">{totalDrops.toLocaleString()}</span></div>
          {drops.length===0?<div className="alert-empty">No price drops{alertCat!=="All"?" in "+alertCat:""}{sel.size===0?". Select dispensaries above to filter.":""}</div>:
          drops.slice(0,200).map(function(d,i){return<div key={i} className="alert-item"><div className="alert-item-top"><span className="alert-item-name">{d.product}</span><span className="alert-item-pct">{"-"+d.pct_off+"%"}</span></div><div className="alert-item-bottom"><span className="alert-item-disp">{cleanD(d.dispensary)}</span><div className="alert-price-flow"><span className="alert-price-old">{"$"+d.original.toFixed(2)}</span><span className="alert-price-arrow">→</span><span className="alert-price-new">{"$"+d.discounted.toFixed(2)}</span></div></div></div>})}
        </div>
        <div className="alert-col increases">
          <div className="alert-col-hdr"><span className="alert-col-title">▲ Price Increases</span><span className="alert-col-count">{totalIncreases.toLocaleString()}</span></div>
          {increases.length===0?<div className="alert-empty"><div style={{marginBottom:8}}>Price increase tracking activates after multiple scrape runs.</div><div style={{fontSize:10,color:'var(--tx3)',fontFamily:'var(--m)',letterSpacing:'.5px'}}>ATHENA compares each scrape to detect upward price movements.</div></div>:
          increases.slice(0,200).map(function(d,i){return<div key={i} className="alert-item"><div className="alert-item-top"><span className="alert-item-name">{d.product}</span><span className="alert-item-pct">{"+"+d.pct+"%"}</span></div><div className="alert-item-bottom"><span className="alert-item-disp">{cleanD(d.dispensary)}</span><div className="alert-price-flow"><span className="alert-price-old">{"$"+d.original.toFixed(2)}</span><span className="alert-price-arrow">→</span><span className="alert-price-new">{"$"+d.current.toFixed(2)}</span></div></div></div>})}
        </div>
      </div>
    </div></>;
}

function normName(n){
  var s=(n||"").toLowerCase();
  // Remove parenthetical info like (H), (S), (I), (3.5g)
  s=s.replace(/\([^)]*\)/g,"");
  // Remove weight/size labels
  s=s.replace(/\b\d+\.?\d*\s*(?:g|mg|ml|oz|pk|pack|ct)\b/gi,"");
  // Remove THC/CBD values
  s=s.replace(/\b[tchdTCHD]+\s*\d+\.?\d*\s*%?/g,"");
  s=s.replace(/\d+\.?\d*\s*%/g,"");
  // Remove NDC/SKU codes (5+ digit numbers) but keep short numbers that might be strain names
  s=s.replace(/\b\d{5,}\b/g,"");
  // Remove common product type words
  s=s.replace(/\b(whole|small|ground|flower|premium|reserve|mini|minis|pre|pack|prepack|cartridge|cart|vape|roll|rolls|concentrate|gummy|gummies|edible|tincture|topical|capsule|capsules|tablet|tablets|med|rec|adult|use|disposable|infused|shorties|fatboy|blunt|budz|lil)\b/gi,"");
  // Remove brand names that appear in product names
  s=s.replace(/\b(ctpharma|theraplant|curaleaf|advanced grow labs|agl|affinity|affinity grow|brix|rythm|select|savvy|good green|dogwalkers|encore|camino|wana|zone|shaka|awssom|find|springtime|soundview)\b/gi,"");
  // Remove single characters and pipe separators
  s=s.replace(/\b[a-z]\b/g,"");
  s=s.replace(/[-_|/]+/g," ");
  s=s.replace(/\s+/g," ").trim();
  var words=s.split(" ").filter(function(w){return w.length>1});
  words.sort();
  return words.join(" ");
}

function GapsTab({data,favsVer,toggleFav,sel,setSel}){
  const prods=data.products||[];const allDisps=getDisps(prods);const affC=allDisps.filter(isAff);
  const[gapChain,setGapChain]=useState("");const[openLocs,setOpenLocs]=useState(new Set());
  const[radius,setRadius]=useState(10);

  const gaps=useMemo(()=>{if(affC.length===0&&sel.size===0)return[];
    // "Home" = starred dispensaries. "Competitors" = selected non-starred dispensaries
    var homeD=affC.length>0?affC:[...sel].slice(0,2);
    var compD=[...sel].filter(d=>!homeD.includes(d));
    if(compD.length===0)compD=allDisps.filter(d=>!homeD.includes(d));
    const homeProducts=new Set();prods.forEach(p=>{homeD.forEach(a=>{if(p.dispensaries&&p.dispensaries[a])homeProducts.add(normName(p.name))})});
    const byComp={};prods.forEach(p=>{const pnorm=normName(p.name);if(homeProducts.has(pnorm))return;if((p.category||"").toLowerCase()==="accessories")return;Object.keys(p.dispensaries||{}).forEach(d=>{if(homeD.includes(d))return;if(sel.size>0&&!sel.has(d))return;if(!byComp[d])byComp[d]=[];byComp[d].push({name:p.name,brand:p.brand,category:p.category,price:p.dispensaries[d]})})});
    const byChain={};Object.entries(byComp).forEach(([dn,items])=>{const chain=getChain(dn);if(!byChain[chain])byChain[chain]={locations:{},total:0};byChain[chain].locations[dn]={count:items.length,items:items.sort((a,b)=>a.category.localeCompare(b.category))};byChain[chain].total+=items.length});
    return Object.entries(byChain).sort((a,b)=>b[1].total-a[1].total).map(([chain,info])=>({chain,total:info.total,locations:Object.entries(info.locations).sort((a,b)=>b[1].count-a[1].count)}))},[prods,affC,sel]);
  const shown=gapChain?gaps.filter(g=>g.chain===gapChain):gaps;const totalGaps=gaps.reduce((s,g)=>s+g.total,0);
  const doExport=()=>{const rows=[["Chain","Dispensary","Product","Brand","Category","Their Price"]];shown.forEach(g=>{g.locations.forEach(([dn,info])=>{info.items.forEach(p=>{rows.push([g.chain,cleanD(dn),p.name,p.brand,p.category,"$"+p.price.toFixed(2)])})})});const ws=XLSX.utils.aoa_to_sheet(rows);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"Product Gaps");ws["!cols"]=[{wch:20},{wch:30},{wch:40},{wch:20},{wch:15},{wch:12}];XLSX.writeFile(wb,"athena_product_gaps.xlsx")};

  return<><div className="g2"><MapPanel data={data} sel={sel} setSel={setSel} radius={radius} setRadius={setRadius}/><DispPanel data={data} sel={sel} setSel={setSel} toggleFav={toggleFav}/></div>
    <div className="pnl" style={{marginTop:12}}><div className="row" style={{justifyContent:'space-between',marginBottom:10}}><span className="pnl-t" style={{margin:0}}>Product gaps ({totalGaps.toLocaleString()} products{affC.length>0?" your stores don't carry":" not at selected stores"})</span><button className="btn pri" onClick={doExport}>Export Excel</button></div>
    <div className="pnl-d">{affC.length>0?"Products sold by selected competitors that are not on any of your starred menus. Star ★ your dispensaries first, then select competitors to compare.":"Select dispensaries above to find product gaps between them."}</div>
    {totalGaps===0?<div className="empty"><h3>{affC.length===0?"Star your dispensaries first":"No product gaps found"}</h3><p style={{fontSize:12}}>{affC.length===0?"Click ★ on your dispensaries in the panel above, then select competitors to compare against.":"The selected dispensaries carry the same products as your stores."}</p></div>:
    <><div style={{marginBottom:12}}><select style={{width:'100%',background:'var(--bg2)',border:'1px solid var(--bd)',color:'var(--tx)',fontFamily:'var(--f)',fontSize:13,padding:'9px 14px',borderRadius:7,outline:'none'}} value={gapChain} onChange={e=>setGapChain(e.target.value)}><option value="">All chains ({gaps.length})</option>{gaps.map(g=><option key={g.chain} value={g.chain}>{g.chain} ({g.total} gaps)</option>)}</select></div>
    {shown.map(g=><div key={g.chain} style={{marginBottom:16}}><div className="dsel-grp">{g.chain} ({g.total} gaps)</div>
      {g.locations.map(([dn,info])=>{const isO=openLocs.has(dn);return<div key={dn} style={{borderBottom:'1px solid rgba(0,0,0,.06)'}}><div onClick={()=>setOpenLocs(p=>{const n=new Set(p);n.has(dn)?n.delete(dn):n.add(dn);return n})} className="dsel-item" style={{padding:'8px 12px'}}><div className="dsel-left"><span style={{color:'var(--tx3)',fontSize:10,transform:isO?'rotate(90deg)':'rotate(0)',display:'inline-block',transition:'transform .2s'}}>►</span><span className="dsel-name">{cleanD(dn)}</span></div><span className="dsel-count">{info.count} gaps</span></div>
          {isO&&<div style={{padding:'4px 12px 8px 28px'}}><table style={{fontSize:12}}><thead><tr><th>Product</th><th>Brand</th><th>Category</th><th>Price</th></tr></thead><tbody>{info.items.slice(0,80).map((p,i)=><tr key={i}><td className="pn">{p.name}</td><td className="dm">{p.brand}</td><td className="dm">{p.category}</td><td className="pr">${p.price.toFixed(2)}</td></tr>)}</tbody></table></div>}</div>})}</div>)}</>}</div></>;
}

function DealsTab({data,favsVer,toggleFav,sel,setSel}){
  var[radius,setRadius]=useState(10);
  var[dq,setDq]=useState("");
  var[sortBy,setSortBy]=useState("pct");
  var storePromos=data.store_promos||[];
  var deals=(data.deals||[]).filter(function(d){return(d.category||"").toLowerCase()!=="accessories"});
  
  // Filter by selected dispensaries
  var filtered=useMemo(function(){
    var d=deals;
    if(sel.size>0)d=d.filter(function(x){return sel.has(x.dispensary)});
    if(dq.trim()){var s=dq.toLowerCase();d=d.filter(function(x){return(x.product||"").toLowerCase().includes(s)||(x.dispensary||"").toLowerCase().includes(s)||(x.brand||"").toLowerCase().includes(s)||(x.category||"").toLowerCase().includes(s)})}
    if(sortBy==="pct")d=[...d].sort(function(a,b){return b.pct_off-a.pct_off});
    else if(sortBy==="save")d=[...d].sort(function(a,b){return(b.original-b.discounted)-(a.original-a.discounted)});
    else d=[...d].sort(function(a,b){return a.discounted-b.discounted});
    return d;
  },[deals,sel,dq,sortBy]);
  
  // Filter store promos by selected dispensaries
  var filteredPromos=useMemo(function(){
    if(!storePromos.length)return[];
    if(sel.size===0)return storePromos;
    return storePromos.filter(function(p){return sel.has(p.dispensary)});
  },[storePromos,sel]);
  
  // Summary stats
  var totalSavings=filtered.reduce(function(s,d){return s+(d.original-d.discounted)},0);
  var bestDeal=filtered.length>0?filtered.reduce(function(best,d){return d.pct_off>best.pct_off?d:best},filtered[0]):null;
  var dispsWithDeals=new Set();filtered.forEach(function(d){dispsWithDeals.add(d.dispensary)});
  
  var doExport=function(){
    var rows=[["Dispensary","Product","Brand","Category","Sale Price","Original","% Off","Savings"]];
    filtered.forEach(function(d){rows.push([cleanD(d.dispensary),d.product,d.brand,d.category,"$"+d.discounted.toFixed(2),"$"+d.original.toFixed(2),d.pct_off+"%","$"+(d.original-d.discounted).toFixed(2)])});
    var ws=XLSX.utils.aoa_to_sheet(rows);var wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"Deals");
    ws["!cols"]=[{wch:25},{wch:40},{wch:20},{wch:12},{wch:12},{wch:12},{wch:8},{wch:10}];
    XLSX.writeFile(wb,"athena_deals.xlsx");
  };
  
  return<><div className="g2"><MapPanel data={data} sel={sel} setSel={setSel} radius={radius} setRadius={setRadius}/><DispPanel data={data} sel={sel} setSel={setSel} toggleFav={toggleFav}/></div>
  
    {/* Store-Wide Promotions */}
    <div className="pnl" style={{marginTop:12}}>
      <div className="pnl-t">Store-Wide Promotions</div>
      {filteredPromos.length>0?
        <div className="deal-grid">{filteredPromos.map(function(p,i){return<div key={i} className="deal-promo">
          <div className="deal-promo-title">{p.title}</div>
          <div className="deal-promo-desc">{p.description}</div>
          <div style={{marginTop:6,fontSize:11,color:'var(--tx3)',fontFamily:'var(--m)'}}>{cleanD(p.dispensary)}{p.conditions?" · "+p.conditions:""}</div>
        </div>})}</div>
      :<div className="deal-promo">
        <div className="deal-promo-title">Coming Soon</div>
        <div className="deal-promo-desc">Store-wide promotions like "20% off Curaleaf brand" or "Buy 4 eighths, get 30% off" will appear here once deal scraping is activated. These are the banner deals you see on each dispensary's Specials page — not individual product discounts.</div>
      </div>}
    </div>
    
    {/* Product-Level Deals */}
    <div className="pnl" style={{marginTop:12}}>
      <div className="row" style={{justifyContent:'space-between',marginBottom:10}}>
        <span className="pnl-t" style={{margin:0}}>Products On Sale ({filtered.length.toLocaleString()})</span>
        <div className="row">
          <button className={"btn "+(sortBy==="pct"?"pri":"")} onClick={function(){setSortBy("pct")}}>Biggest %</button>
          <button className={"btn "+(sortBy==="save"?"pri":"")} onClick={function(){setSortBy("save")}}>Most Saved</button>
          <button className={"btn "+(sortBy==="price"?"pri":"")} onClick={function(){setSortBy("price")}}>Lowest Price</button>
          <button className="btn pri" onClick={doExport}>Export</button>
        </div>
      </div>
      <div className="srch" style={{marginBottom:12}}><span className="srch-ic">{String.fromCharCode(8981)}</span><input type="search" placeholder="Search products, brands, dispensaries..." value={dq} onChange={function(e){setDq(e.target.value)}}/></div>
      
      <div className="stats" style={{marginBottom:12}}>
        <div className="st"><div className="st-l">Deals Found</div><div className="st-v">{filtered.length.toLocaleString()}</div></div>
        <div className="st"><div className="st-l">Dispensaries</div><div className="st-v">{dispsWithDeals.size}</div></div>
        <div className="st"><div className="st-l">Total Savings</div><div className="st-v gn">{"$"+totalSavings.toFixed(0)}</div></div>
        <div className="st"><div className="st-l">Best Deal</div><div className="st-v gn">{bestDeal?bestDeal.pct_off+"%":"—"}</div></div>
      </div>
      
      <div className="pnl-d">{sel.size>0?"Showing deals at "+dispsWithDeals.size+" selected dispensaries. ":"Showing all deals. Select dispensaries above to filter. "}Sort by biggest discount, most money saved, or lowest sale price.</div>
      
      {filtered.length===0?<div className="empty"><h3>No deals found</h3><p style={{fontSize:12}}>{sel.size>0?"No active deals at selected dispensaries.":"No active deals in the current data."}</p></div>:
      <div className="deal-grid">{filtered.slice(0,200).map(function(d,i){
        return<div key={i} className="deal-card">
          <div className="deal-card-hdr">
            <div className="deal-card-disp">{cleanD(d.dispensary)}</div>
            <div className="deal-card-badge">{d.pct_off}% OFF</div>
          </div>
          <div className="deal-card-product">{d.product}</div>
          <div className="deal-card-brand">{d.brand} · {d.category}</div>
          <div className="deal-card-prices">
            <span className="deal-card-sale">{"$"+d.discounted.toFixed(2)}</span>
            <span className="deal-card-orig">{"$"+d.original.toFixed(2)}</span>
            <span className="deal-card-save">Save {"$"+(d.original-d.discounted).toFixed(2)}</span>
          </div>
        </div>
      })}</div>}
    </div></>;
}

function DispsTab({data,favsVer,toggleFav}){
  const[sort,setSort]=useState("count");const prods=data.products||[];const disps=data.dispensaries||{};
  const[detailDisp,setDetailDisp]=useState(null);const[dq,setDq]=useState("");
  const list=useMemo(()=>{const byBase={};Object.entries(disps).forEach(([name,info])=>{const base=getBase(name);if(!byBase[base])byBase[base]={city:info.city,isYou:isAff(name),names:[name],menus:[],productNames:new Set()};else{byBase[base].names.push(name);if(isAff(name))byBase[base].isYou=true}const menuType=(name.match(/\(([^)]+)\)$/)||[])[1];if(menuType&&!byBase[base].menus.includes(menuType))byBase[base].menus.push(menuType)});prods.forEach(p=>{Object.keys(p.dispensaries||{}).forEach(d=>{const base=getBase(d);if(byBase[base])byBase[base].productNames.add((p.name||"").toLowerCase())})});return Object.entries(byBase).map(function(e){var base=e[0],info=e[1];var label=info.menus.length>1?base+" ("+info.menus.join("/")+")":info.menus.length===1?base+" ("+info.menus[0]+")":base;return{name:label,count:info.productNames.size,city:info.city,isYou:info.isYou,rawNames:info.names}}).sort((a,b)=>sort==="count"?b.count-a.count:a.name.localeCompare(b.name))},[prods,disps,sort,favsVer]);
  const filtered=useMemo(()=>{if(!dq.trim())return list;var s=dq.toLowerCase();return list.filter(d=>d.name.toLowerCase().includes(s)||d.city.toLowerCase().includes(s))},[list,dq]);
  return<div className="pnl"><div className="row" style={{justifyContent:'space-between',marginBottom:12}}><span className="pnl-t" style={{margin:0}}>All dispensaries — SKU count ({list.length})</span>
    <div className="row"><button className={"btn "+(sort==="count"?"pri":"")} onClick={()=>setSort("count")}>By SKUs</button><button className={"btn "+(sort==="name"?"pri":"")} onClick={()=>setSort("name")}>By name</button></div></div>
    <div className="srch" style={{marginBottom:12}}><span className="srch-ic">{String.fromCharCode(8981)}</span><input type="search" placeholder="Search dispensaries..." value={dq} onChange={e=>setDq(e.target.value)}/></div>
    <div className="pnl-d" style={{marginBottom:8}}>Total unique SKUs per dispensary. Click ★ to mark as yours. {dq.trim()&&filtered.length<list.length?<span style={{color:'var(--cy)'}}>Showing {filtered.length} of {list.length}</span>:null}</div>
    <div className="dlist">{filtered.map(d=><div key={d.name} className={"dcard "+(d.isYou?"you":"")}><div style={{flex:1,minWidth:0}}><div className="dcard-n" title={d.name}>{d.name}</div><div className="dcard-c">{d.city}</div></div><div className="dcard-actions"><div className="dcard-v">{d.count.toLocaleString()}</div><button className="btn-detail" onClick={()=>setDetailDisp(d)}>Detailed View</button><span onClick={()=>{d.rawNames.forEach(n=>toggleFav(n))}} style={{cursor:'pointer',fontSize:18,color:d.isYou?'var(--cy)':'var(--tx3)',transition:'color .15s',lineHeight:1}} title={d.isYou?'Remove from mine':'Mark as mine'}>{d.isYou?'★':'☆'}</span></div></div>)}</div>
    {detailDisp&&React.createElement(DetailedView,{disp:detailDisp,data:data,onClose:function(){setDetailDisp(null)}})}
  </div>;
}
