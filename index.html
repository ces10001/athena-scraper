<style>
:root{--bg:#f5f6f8;--bg2:#ffffff;--sf:#ffffff;--sf2:#f0f1f3;--bd:rgba(0,0,0,.1);--bd2:rgba(0,0,0,.18);--tx:#1a1a1a;--tx2:#5a6370;--tx3:#a0a8b4;--cy:#e8600a;--cy2:#d45500;--cydim:rgba(232,96,10,.05);--gn:#1a8f3f;--rd:#d42030;--am:#e8600a;--f:'Outfit',sans-serif;--m:'IBM Plex Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--f);background:var(--bg);color:var(--tx);min-height:100vh}
::selection{background:var(--cy);color:#fff}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#eee}::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
.app{max-width:1520px;margin:0 auto;padding:14px 22px}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:12px}
.logo{display:flex;align-items:center;gap:14px}.logo img{width:58px;height:58px;object-fit:contain;animation:helmglow 3s ease-in-out infinite}@keyframes helmglow{0%,100%{filter:drop-shadow(0 0 6px rgba(232,96,10,.25))}50%{filter:drop-shadow(0 0 18px rgba(232,96,10,.6)) drop-shadow(0 0 30px rgba(232,96,10,.25))}}
.lt{display:flex;flex-direction:column}.lt h1{font-size:28px;font-weight:800;letter-spacing:4px;color:var(--cy2);line-height:1;text-shadow:none}.lt span{font-size:10px;letter-spacing:2px;color:var(--tx2);font-family:var(--m);margin-top:2px}
.meta{font-family:var(--m);font-size:10px;color:var(--tx2);text-align:right;line-height:1.7}
.glow{height:1px;background:linear-gradient(90deg,transparent,var(--cy),transparent);margin:10px 0;opacity:.2}
.tabs{display:flex;gap:2px;margin-bottom:14px;background:var(--sf);border-radius:8px;padding:3px;border:1px solid var(--bd);overflow-x:auto}
.tab{padding:11px 22px;border-radius:6px;font-size:15px;font-weight:600;cursor:pointer;color:var(--tx2);transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--tx)}.tab.on{background:rgba(232,96,10,.08);color:var(--cy);border-bottom:2px solid var(--cy)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:14px}
.st{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:12px 14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.st-l{font-family:var(--m);font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--tx2);margin-bottom:3px}
.st-v{font-family:var(--m);font-size:26px;font-weight:600;color:var(--cy)}.st-v.gn{color:var(--gn)}.st-v.am{color:var(--am)}
.pnl{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:14px 16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.pnl-t{font-family:var(--m);font-size:13px;text-transform:uppercase;letter-spacing:1.2px;color:var(--tx2);margin-bottom:10px}
.pnl-d{font-size:13px;color:var(--tx2);margin-bottom:10px;line-height:1.4}
.promo-tag{font-size:9px;color:var(--am);margin-left:3px}
.map-w{height:320px;border-radius:8px;overflow:hidden;border:1px solid var(--bd)}
.leaflet-container{background:#e8e8e8!important}

.leaflet-control-zoom a{background:#fff!important;color:var(--cy)!important;border-color:#ddd!important}
.leaflet-popup-content-wrapper{background:#fff!important;color:var(--tx)!important;border:1px solid #ddd!important;border-radius:8px!important;box-shadow:0 2px 8px rgba(0,0,0,.1)!important}
.leaflet-popup-tip{background:#fff!important}
.leaflet-popup-content{font-family:var(--f)!important;font-size:12px!important;margin:8px 12px!important}
.srch{position:relative}.srch input{width:100%;background:var(--bg2);border:1px solid var(--bd);color:var(--tx);font-family:var(--f);font-size:13px;padding:9px 14px 9px 36px;border-radius:7px;outline:none}
.srch input:focus{border-color:var(--cy)}.srch input::placeholder{color:var(--tx3)}
.srch-ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:14px;pointer-events:none}

.btn:hover{border-color:var(--cy);color:var(--cy)}.btn.pri{background:rgba(232,96,10,.08);border-color:var(--cy);color:var(--cy)}
.cats{display:flex;gap:3px;margin-bottom:10px;flex-wrap:wrap}
.ct{padding:7px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:var(--tx2);border:1px solid transparent;transition:all .15s}
.ct:hover{color:var(--tx);background:var(--sf)}.ct.on{background:var(--cydim);color:var(--cy);border-color:rgba(0,215,235,.2)}
.tw{background:var(--sf);border:1px solid var(--bd);border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.ts{overflow-x:auto;max-height:580px;overflow-y:auto}
.inf{padding:9px 14px;font-family:var(--m);font-size:10px;color:var(--tx2);border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px;align-items:center}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--bg2);padding:9px 10px;text-align:left;font-family:var(--m);font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--tx2);font-weight:600;border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:2;white-space:nowrap}

tbody tr{border-bottom:1px solid rgba(0,0,0,.06)}tbody tr:hover{background:rgba(232,96,10,.03)}
td{padding:7px 10px;white-space:nowrap}td.pn{font-weight:500;color:var(--tx);max-width:240px;white-space:normal;word-break:break-word;font-size:13px}
td.dm{color:var(--tx2);font-size:12px}td.pr{font-family:var(--m);font-weight:600;font-size:13px}
td.pr.yp{color:var(--cy);background:rgba(232,96,10,.04);font-weight:700}td.pr.hi{color:var(--gn)}td.pr.lo{color:var(--rd)}
.df{display:inline-block;font-size:8px;padding:1px 4px;border-radius:3px;margin-left:3px;font-weight:600;font-family:var(--m)}

.badge.gn{background:rgba(26,143,63,.1);color:var(--gn)}.badge.rd{background:rgba(212,32,48,.1);color:var(--rd)}
.badge.am{background:rgba(232,96,10,.1);color:var(--am)}.badge.cy{background:rgba(232,96,10,.08);color:var(--cy)}
.dlist{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px}

.dcard.you{border-color:rgba(232,96,10,.3);background:rgba(232,96,10,.04)}
.dcard-n{font-size:12px;font-weight:500;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dcard-c{font-size:10px;color:var(--tx2);margin-top:2px}.dcard-v{font-family:var(--m);font-size:18px;font-weight:600;color:var(--cy)}
.bar-w{height:16px;background:#f0f1f3;border-radius:4px;overflow:hidden}.bar-f{height:100%;border-radius:4px}

.dsel-left{display:flex;align-items:center;gap:8px}
.dsel-dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--tx3);flex-shrink:0;transition:all .15s}
.dsel-item.on .dsel-dot{background:var(--cy);border-color:var(--cy);box-shadow:0 0 4px rgba(232,96,10,.3)}

.dsel-count{font-family:var(--m);font-size:11px;color:var(--tx2)}
.dsel-grp{font-size:11px;font-weight:600;color:var(--tx2);padding:10px 12px 4px;text-transform:uppercase;letter-spacing:1px;border-top:1px solid rgba(0,0,0,.08)}

<body><div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useMemo,useCallback,useRef}=React;
const COORDS={"New Haven":[41.308,-72.928],"Bridgeport":[41.179,-73.189],"Orange":[41.278,-73.026],"Branford":[41.280,-72.815],"Hamden":[41.396,-72.897],"Derby":[41.327,-73.089],"Stratford":[41.185,-73.133],"Naugatuck":[41.486,-73.051],"Meriden":[41.538,-72.807],"Stamford":[41.053,-73.539],"Newington":[41.698,-72.723],"Waterbury":[41.558,-73.037],"Seymour":[41.397,-73.084],"Hartford":[41.764,-72.685],"Groton":[41.350,-72.078],"Milford":[41.222,-73.057],"Bristol":[41.672,-72.949],"Manchester":[41.776,-72.521],"Willimantic":[41.711,-72.208],"Norwalk":[41.118,-73.408],"Old Saybrook":[41.292,-72.376],"West Hartford":[41.762,-72.742],"Canton":[41.841,-72.898],"South Norwalk":[41.095,-73.419],"New Britain":[41.661,-72.779],"East Hartford":[41.782,-72.612],"Danbury":[41.395,-73.454],"Torrington":[41.800,-73.121],"Shelton":[41.316,-73.093],"Wallingford":[41.457,-72.823],"Vernon":[41.836,-72.459],"North Haven":[41.391,-72.860],"West Haven":[41.271,-72.947],"Middletown":[41.563,-72.651],"New London":[41.356,-72.100],"Enfield":[41.976,-72.592],"Killingly":[41.838,-71.873],"Montville":[41.478,-72.151],"Plainville":[41.674,-72.858],"Colchester":[41.576,-72.332],"Norwich":[41.524,-72.076]};
function hashStr(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return h}
function isAff(n){return(n||"").toLowerCase().includes("affinity")}
function cleanD(n){return(n||"").replace(/Dispensary\s*-?\s*/g,"").replace(/ - /g," ")}
function getBase(n){return(n||"").replace(/\s*\((?:Med|Rec)\)\s*$/,"").replace(/Dispensary\s*-?\s*/g,"").replace(/ - /g," ").trim()}
function getChain(n){var b=getBase(n);var m=b.match(/^(\S+(?:\s+\S+)?)/);return m?m[1]:"Other"}
const DM={"Affinity NH (Dutchie Rec)":"Affinity Dispensary - New Haven (Rec)","Affinity NH (Dutchie Med)":"Affinity Dispensary - New Haven (Med)"};
function mergeD(n){return DM[n]||n.replace("(Dutchie Rec)","(Rec)").replace("(Dutchie Med)","(Med)")}
function fmt$(v){return"$"+Math.round(v).toLocaleString()}
function getDisps(p){var s=new Set();p.forEach(function(x){Object.keys(x.dispensaries||{}).forEach(function(d){s.add(d)})});return Array.from(s).sort(function(a,b){if(isAff(a)&&!isAff(b))return-1;if(!isAff(a)&&isAff(b))return 1;return a.localeCompare(b)})}
function getYP(p,ac){for(var i=0;i<ac.length;i++){if(p.dispensaries&&p.dispensaries[ac[i]])return p.dispensaries[ac[i]]}return null}

function App(){
  var[data,setData]=useState(null);var[err,setErr]=useState(null);var[tab,setTab]=useState("intel");
  var[q,setQ]=useState("");var[sel,setSel]=useState(new Set());var[cat,setCat]=useState("All");var[comp,setComp]=useState(true);var[radius,setRadius]=useState(10);
  useEffect(function(){
    fetch("dashboard_data.json?t="+Date.now()).then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json()}).then(function(d){
      if(d.products)d.products.forEach(function(p){var nd={};Object.entries(p.dispensaries||{}).forEach(function(e){nd[mergeD(e[0])]=e[1]});p.dispensaries=nd});
      if(d.dispensaries){var nd={};Object.entries(d.dispensaries).forEach(function(e){nd[mergeD(e[0])]=e[1]});d.dispensaries=nd}
      if(d.stats&&d.stats.dispensary_counts){var nc={};Object.entries(d.stats.dispensary_counts).forEach(function(e){var mk=mergeD(e[0]);nc[mk]=(nc[mk]||0)+e[1]});d.stats.dispensary_counts=nc}
      // Count unique locations (Med+Rec = 1 dispensary)
      if(d.dispensaries){var bases=new Set();Object.keys(d.dispensaries).forEach(function(k){bases.add(getBase(k))});d.stats.unique_locations=bases.size}
      // Filter out accessories and hardware brands globally
      var isAccessory=function(x){return(x.category||"").toLowerCase()==="accessories"||(x.brand||"").toUpperCase()==="PULSAR"};
      if(d.products)d.products=d.products.filter(function(p){return!isAccessory(p)});
      if(d.deals)d.deals=d.deals.filter(function(x){return!isAccessory(x)});
      if(d.velocity)d.velocity=d.velocity.filter(function(x){return!isAccessory(x)});
      if(d.stock_alerts)d.stock_alerts=d.stock_alerts.filter(function(x){return!isAccessory(x)});
      setData(d);var all=getDisps(d.products||[]);setSel(new Set(all.filter(isAff)));
    }).catch(function(e){setErr(e.message)});
  },[]);
  if(err)return React.createElement("div",{className:"app"},React.createElement(Hdr,null),React.createElement("div",{className:"empty"},React.createElement("h3",null,"Could not load data"),React.createElement("p",{style:{fontSize:12}},err)));
  if(!data)return React.createElement("div",{className:"app"},React.createElement("div",{className:"ld"},React.createElement("div",{className:"sp"}),React.createElement("span",{style:{color:'var(--tx2)',fontSize:12,fontFamily:'var(--m)'}},"ATHENA initializing...")));
  var tabs=[["intel","Intel"],["alerts","Pricing Alerts"],["gaps","Product Gaps"],["velocity","Sales Velocity"],["market","Market Position"],["stock","Stock Alerts"],["deals","Deals"],["disps","Dispensary Total Products"]];
  return React.createElement("div",{className:"app"},
    React.createElement(Hdr,{d:data}),
    React.createElement("div",{className:"tabs"},tabs.map(function(t){return React.createElement("div",{key:t[0],className:"tab "+(tab===t[0]?"on":""),onClick:function(){setTab(t[0])}},t[1])})),
    tab==="intel"&&React.createElement(IntelTab,{data:data,q:q,setQ:setQ,sel:sel,setSel:setSel,cat:cat,setCat:setCat,comp:comp,setComp:setComp,radius:radius,setRadius:setRadius}),
    tab==="alerts"&&React.createElement(AlertsTab,{data:data}),
    tab==="gaps"&&React.createElement(GapsTab,{data:data}),
    tab==="velocity"&&React.createElement(VelocityTab,{data:data}),
    tab==="market"&&React.createElement(MarketTab,{data:data}),
    tab==="stock"&&React.createElement(StockTab,{data:data}),
    tab==="deals"&&React.createElement(DealsTab,{data:data}),
    tab==="disps"&&React.createElement(DispsTab,{data:data})
  );
}

function Hdr({d}){
  const t=d?.scraped_at?new Date(d.scraped_at).toLocaleString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"numeric",minute:"2-digit"}):"";
  return<div className="hdr"><div className="logo"><img src={window.HELMET_IMG} alt=""/><div className="lt"><h1>ATHENA</h1></div></div>
    <div className="meta">{d&&<>{t&&<div>Updated: {t}</div>}<div>{d.stats?.unique_locations||d.stats?.dispensary_count||0} dispensaries | {(d.stats?.total_active||0).toLocaleString()} products</div></>}</div></div>;
}

function IntelTab({data,q,setQ,sel,setSel,cat,setCat,comp,setComp,radius,setRadius}){
  return<><div className="stats">{[["Active SKUs",data.stats?.total_active||0,"","Total products tracked across all CT dispensaries"],["Dispensaries",data.stats?.unique_locations||data.stats?.dispensary_count||0,"","Unique dispensary locations being monitored"],["Comparable",data.stats?.comparable||0,"","Products found at 2+ dispensaries for price comparison"],["Deals",data.stats?.deals||0,"am","Active promotions and discounts across all dispensaries"]].map(([l,v,c,desc])=><div key={l} className="st"><div className="st-l">{l}</div><div className={"st-v "+(c||"")}>{(v||0).toLocaleString()}</div><div style={{fontSize:11,color:'var(--tx2)',marginTop:4,lineHeight:1.3}}>{desc}</div></div>)}</div>
    <div className="glow"/>
    <div className="g2"><MapPanel data={data} sel={sel} setSel={setSel} radius={radius} setRadius={setRadius}/><DispPanel data={data} sel={sel} setSel={setSel}/></div>
    <div className="pnl"><div className="pnl-t">Search products</div><div className="pnl-d">Find any product by name, brand, or strain across all dispensaries.</div><div className="srch"><span className="srch-ic">{String.fromCharCode(8981)}</span><input type="search" placeholder="Product name, brand, or strain..." value={q} onChange={e=>setQ(e.target.value)}/></div></div>
    <CatTabs data={data} cat={cat} setCat={setCat}/>
    <Tbl data={data} q={q} sel={sel} cat={cat} comp={comp} setComp={setComp}/></>;
}

function MapPanel({data,sel,setSel,radius,setRadius}){
  const ref=useRef(null),mRef=useRef(null),mkRef=useRef([]),circRef=useRef(null);
  const[center,setCenter]=useState(null);const[cLabel,setCLabel]=useState("Click map or dispensary to set center");
  useEffect(()=>{if(!ref.current||mRef.current)return;const m=L.map(ref.current,{zoomControl:true,attributionControl:false}).setView([41.35,-72.9],9);L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png',{maxZoom:18,className:'dark-base'}).addTo(m);L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png',{maxZoom:18,pane:'overlayPane'}).addTo(m);m.on('click',e=>{setCenter([e.latlng.lat,e.latlng.lng]);setCLabel(e.latlng.lat.toFixed(3)+", "+e.latlng.lng.toFixed(3))});mRef.current=m},[]);
  useEffect(()=>{
    const m=mRef.current;if(!m||!center)return;
    if(circRef.current)m.removeLayer(circRef.current);
    var radiusM=radius*1609.34;
    circRef.current=L.circle(center,{radius:radiusM,color:'#e8600a',weight:1.5,opacity:.5,fillColor:'#e8600a',fillOpacity:.06,dashArray:'6 4'}).addTo(m);
    // Auto-select dispensaries within radius
    if(data&&data.dispensaries){
      var inRadius=new Set();
      var cll=L.latLng(center[0],center[1]);
      Object.entries(data.dispensaries).forEach(function(e){
        var dn=e[0],info=e[1];
        var c=COORDS[info.city];if(!c)return;
        var h=hashStr(dn);var lat=c[0]+((h%100)-50)*.00008;var lon=c[1]+(((h>>8)%100)-50)*.00008;
        var dist=cll.distanceTo(L.latLng(lat,lon));
        if(dist<=radiusM)inRadius.add(dn);
      });
      if(inRadius.size>0)setSel(inRadius);
    }
  },[radius,center]);
  useEffect(()=>{const m=mRef.current;if(!m||!data)return;mkRef.current.forEach(mk=>m.removeLayer(mk));mkRef.current=[];const disps=data.dispensaries||{};const counts=data.stats?.dispensary_counts||{};
    Object.entries(disps).forEach(([name,info])=>{const c=COORDS[info.city];if(!c)return;const h=hashStr(name);const lat=c[0]+((h%100)-50)*.00008;const lon=c[1]+(((h>>8)%100)-50)*.00008;const isA=isAff(name);const isS=sel.has(name);const sz=isA?14:isS?8:5;const col=isA?"#00f0ff":isS?"#ff8c00":"#1e3d48";
      const icon=L.divIcon({className:'',html:'<div style="width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:'+col+';box-shadow:0 0 '+(isA?14:isS?6:0)+'px '+col+';opacity:'+(isS?1:.35)+';border:'+(isA?2:1)+'px solid rgba(255,255,255,'+(isA?.3:.08)+')"></div>',iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]});
      const mk=L.marker([lat,lon],{icon}).addTo(m);mk.on('click',()=>{setCenter([lat,lon]);setCLabel(cleanD(name))});mk.bindPopup('<b style="color:#00f0ff">'+name+'</b><br><span style="color:#5a8a95">'+info.city+' - '+(counts[name]||0)+' products</span>');mkRef.current.push(mk)})
  },[data,sel]);
  return<div className="pnl"><div className="pnl-t">Connecticut dispensary map</div><div className="pnl-d">Click any point or dispensary to draw a radius circle around it.</div><div className="map-w" ref={ref}></div>
    <div className="radius-ctrl"><label>{center?"Radius from "+cLabel+":":cLabel}</label><input type="range" min="1" max="60" value={radius} onChange={e=>setRadius(+e.target.value)}/><div className="rv">{radius} mi</div>
      {center&&<button className="btn" style={{fontSize:8,padding:'3px 8px'}} onClick={()=>{setCenter(null);if(circRef.current&&mRef.current){mRef.current.removeLayer(circRef.current);circRef.current=null}setCLabel("Click map or dispensary to set center")}}>Clear</button>}
    </div></div>;
}

function DispPanel({data,sel,setSel}){
  const prods=data.products||[];
  const allD=useMemo(()=>getDisps(prods),[prods]);
  const counts=useMemo(()=>{const c={};allD.forEach(d=>c[d]=0);prods.forEach(p=>Object.keys(p.dispensaries||{}).forEach(d=>{if(c[d]!==undefined)c[d]++}));return c},[prods,allD]);
  const tog=useCallback(d=>{setSel(p=>{const n=new Set(p);n.has(d)?n.delete(d):n.add(d);return n})},[]);

  return<div className="pnl">
    <div className="row" style={{justifyContent:'space-between',marginBottom:10}}>
      <span className="pnl-t" style={{margin:0}}>Compare dispensaries</span>
      <div className="row">
        <button className="btn" onClick={()=>setSel(new Set(allD))}>All</button>
        <button className="btn" onClick={()=>setSel(new Set(allD.filter(isAff)))}>Mine</button>
        <button className="btn" onClick={()=>setSel(new Set())}>Clear All</button>
      </div>
    </div>
    <div className="pnl-d">Select dispensaries to compare side-by-side in the price table below.</div>
    <div className="dsel">
      {allD.map(d=>{
        const on=sel.has(d);const you=isAff(d);
        return<div key={d} className={"dsel-item"+(on?" on":"")+(you?" you":"")} onClick={()=>tog(d)}>
          <div className="dsel-left"><div className="dsel-dot"/><span className="dsel-name">{cleanD(d)}</span></div>
          <span className="dsel-count">{(counts[d]||0).toLocaleString()}</span>
        </div>
      })}
    </div>
  </div>;
}

function CatTabs({data,cat,setCat}){
  const cats=useMemo(()=>{const s=new Set();(data.products||[]).forEach(p=>s.add(p.category||"Other"));return["All",...[...s].sort()]},[data]);
  return<div className="cats">{cats.map(c=><div key={c} className={"ct "+(cat===c?"on":"")} onClick={()=>setCat(c)}>{c}</div>)}</div>;
}

function Tbl({data,q,sel,cat,comp,setComp}){
  const prods=data.products||[];const cols=useMemo(()=>[...sel].sort((a,b)=>{if(isAff(a)&&!isAff(b))return-1;if(!isAff(a)&&isAff(b))return 1;return a.localeCompare(b)}),[sel]);const affC=cols.filter(isAff);
  const rows=useMemo(()=>{let it=prods;if(cat!=="All")it=it.filter(p=>p.category===cat);if(q.trim()){const s=q.toLowerCase();it=it.filter(p=>(p.name||"").toLowerCase().includes(s)||(p.brand||"").toLowerCase().includes(s))}return it.filter(p=>{const n=Object.keys(p.dispensaries||{}).filter(x=>sel.has(x)).length;return comp?n>=2:n>=1})},[prods,q,sel,cat,comp]);
  const doExport=()=>{const hdr=["Product","Brand","Category",...cols.map(cleanD)];const d=rows.map(p=>[p.name,p.brand,p.category,...cols.map(c=>p.dispensaries?.[c]||"")]);const ws=XLSX.utils.aoa_to_sheet([hdr,...d]);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"ATHENA");XLSX.writeFile(wb,"athena_export.xlsx")};

function normName(n){
  var s=(n||"").toLowerCase();
  s=s.replace(/\([^)]*\)/g,"");
  s=s.replace(/\b\d+\.?\d*\s*(?:g|mg|ml|oz)\b/gi,"");
  s=s.replace(/\b\d+\s*pk\b/gi,"");
  s=s.replace(/\b[tchdTCHD]+\s*\d+\.?\d*\s*%?/g,"");
  s=s.replace(/\d+\.?\d*\s*%/g,"");
  s=s.replace(/\b\d+\.?\d*\b/g,"");
  s=s.replace(/\b(whole|flower|premium|reserve|mini|minis|pre|pack|prepack|cartridge|cart|vape|roll|rolls|concentrate|gummy|gummies|edible|tincture|topical|capsule|capsules|tablet|tablets|med|rec|adult|use)\b/gi,"");
  s=s.replace(/\b[a-z]\b/g,"");
  s=s.replace(/\b(ctpharma|theraplant|curaleaf|advanced grow labs|agl)\b/gi,"");
  s=s.replace(/[-_|/]+/g," ");
  s=s.replace(/\s+/g," ").trim();
  var words=s.split(" ").filter(function(w){return w.length>1});
  words.sort();
  return words.join(" ");
}

function GapsTab({data}){
  const prods=data.products||[];const disps=getDisps(prods);const affC=disps.filter(isAff);
  const[gapChain,setGapChain]=useState("");
  const gaps=useMemo(()=>{
    const affProducts=new Set();
    prods.forEach(p=>{affC.forEach(a=>{if(p.dispensaries&&p.dispensaries[a]){affProducts.add(normName(p.name))}})});
    const byComp={};
    prods.forEach(p=>{
      const pnorm=normName(p.name);
      if(affProducts.has(pnorm))return;
      if((p.category||"").toLowerCase()==="accessories")return;
      Object.keys(p.dispensaries||{}).forEach(d=>{
        if(isAff(d))return;
        if(!byComp[d])byComp[d]=[];
        byComp[d].push({name:p.name,brand:p.brand,category:p.category,price:p.dispensaries[d]});
      });
    });
    // Group by chain

    Object.entries(byComp).forEach(([dn,items])=>{
      const chain=getChain(dn);

      byChain[chain].locations[dn]={count:items.length,items:items.sort((a,b)=>a.category.localeCompare(b.category))};
      byChain[chain].total+=items.length;

  return<div className="pnl">

      <option value="">All chains ({gaps.length})</option>
      {gaps.map(g=><option key={g.chain} value={g.chain}>{g.chain} ({g.total} gaps)</option>)}
    </select></div>
    {shown.map(g=><div key={g.chain} style={{marginBottom:16}}>
      <div className="dsel-grp">{g.chain} ({g.total} products you're missing)</div>
      {g.locations.map(([dn,info])=>{const isO=openLocs.has(dn);
        return<div key={dn} style={{borderBottom:'1px solid rgba(0,215,235,.06)'}}>
          <div onClick={()=>setOpenLocs(p=>{const n=new Set(p);n.has(dn)?n.delete(dn):n.add(dn);return n})} className="dsel-item" style={{padding:'8px 12px'}}>

        <td className="pr" style={{color:a.stock_qty!==null&&a.stock_qty<=5?'var(--rd)':a.stock_qty!==null&&a.stock_qty<=15?'var(--am)':'var(--tx2)'}}>{a.stock_qty!==null?a.stock_qty:""}</td>
        <td className="pr" style={{color:a.days_until_out!==null&&a.days_until_out<=3?'var(--rd)':'var(--tx2)'}}>{a.days_until_out!==null?a.days_until_out+" days":""}</td>
        <td className="pr">{a.oos_last_28||""}</td><td><span className={"badge "+(a.alert==="critical"?"rd":"am")}>{a.alert}</span></td></tr>)}</tbody></table></div></div>}</div>;
}

function DealsTab({data}){
  const[dq,setDq]=useState("");const[openD,setOpenD]=useState(new Set());const deals=(data.deals||[]).filter(d=>(d.category||"").toLowerCase()!=="accessories");
  const filtered=useMemo(()=>{if(!dq.trim())return deals;const s=dq.toLowerCase();return deals.filter(x=>(x.product||"").toLowerCase().includes(s)||(x.dispensary||"").toLowerCase().includes(s)||(x.brand||"").toLowerCase().includes(s))},[deals,dq]);
  const grouped=useMemo(()=>{
    const byChain={};
    filtered.forEach(d=>{const chain=getChain(d.dispensary);if(!byChain[chain])byChain[chain]={disps:{}};const dn=d.dispensary;if(!byChain[chain].disps[dn])byChain[chain].disps[dn]=[];byChain[chain].disps[dn].push(d)});
    return Object.entries(byChain).sort((a,b)=>{const ac=Object.values(a[1].disps).flat().length;const bc=Object.values(b[1].disps).flat().length;return bc-ac}).map(([chain,info])=>({chain,locations:Object.entries(info.disps).sort((a,b)=>b[1].length-a[1].length)}));
  },[filtered]);
  return<div className="pnl"><div className="row" style={{justifyContent:'space-between',marginBottom:10}}><span className="pnl-t" style={{margin:0}}>Active deals ({filtered.length.toLocaleString()})</span><div className="row"><button className="btn" onClick={()=>setOpenD(new Set(filtered.map(d=>d.dispensary)))}>Expand all</button><button className="btn" onClick={()=>setOpenD(new Set())}>Collapse</button></div></div>
    <div className="srch" style={{marginBottom:12}}><span className="srch-ic">{String.fromCharCode(8981)}</span><input type="search" placeholder="Search deals..." value={dq} onChange={e=>setDq(e.target.value)}/></div>
    <div className="pnl-d">Current promotions and discounts grouped by dispensary chain. Expand any location to see their active deals.</div>
    {grouped.map(g=><div key={g.chain} style={{marginBottom:16}}>
      <div className="dsel-grp">{g.chain} ({g.locations.reduce((s,l)=>s+l[1].length,0)} deals)</div>
      {g.locations.map(([disp,dls])=>{const isO=openD.has(disp);const best=Math.max(...dls.map(d=>d.pct_off));
        return<div key={disp} style={{borderBottom:'1px solid rgba(0,215,235,.06)'}}>
          <div onClick={()=>setOpenD(p=>{const n=new Set(p);n.has(disp)?n.delete(disp):n.add(disp);return n})} className="dsel-item" style={{padding:'8px 12px'}}>
            <div className="dsel-left"><span style={{color:'var(--tx3)',fontSize:10,transform:isO?'rotate(90deg)':'rotate(0)',display:'inline-block',transition:'transform .2s'}}>{String.fromCharCode(9654)}</span><span className="dsel-name" style={{color:isAff(disp)?'var(--cy2)':'var(--tx)'}}>{cleanD(disp)}</span></div>
            <div className="row"><span className="badge gn">up to {best}%</span><span className="dsel-count">{dls.length}</span></div></div>
          {isO&&<div style={{padding:'4px 12px 8px 28px',display:'flex',flexDirection:'column',gap:3}}>{dls.map((d,i)=><div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'3px 0',fontSize:12}}>
            <div style={{flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}><span style={{color:'var(--tx)'}}>{d.product}</span> <span style={{color:'var(--tx2)',fontSize:10}}>{d.brand}</span></div>
            <div style={{flexShrink:0,marginLeft:10,fontFamily:'var(--m)'}}><span style={{color:'var(--gn)',fontWeight:700}}>{d.pct_off}%</span> <span style={{color:'var(--tx2)',fontSize:10}}>${d.discounted}</span> <span style={{color:'var(--tx3)',fontSize:9,textDecoration:'line-through'}}>${d.original}</span></div></div>)}</div>}
        </div>})}
    </div>)}
  </div>;
}

function DispsTab({data}){
  const[sort,setSort]=useState("count");const prods=data.products||[];const disps=data.dispensaries||{};
  const list=useMemo(()=>{
    const byBase={};
    // Count unique products per base dispensary by tracking product names
    Object.entries(disps).forEach(([name,info])=>{
      const base=getBase(name);
      if(!byBase[base])byBase[base]={city:info.city,isYou:isAff(name),menus:[],productNames:new Set()};
      const menuType=(name.match(/\(([^)]+)\)$/)||[])[1];
      if(menuType&&!byBase[base].menus.includes(menuType))byBase[base].menus.push(menuType);
    });
    // Walk products to count unique items per base dispensary
    prods.forEach(p=>{
      Object.keys(p.dispensaries||{}).forEach(d=>{
        const base=getBase(d);
        if(byBase[base]){byBase[base].productNames.add((p.name||"").toLowerCase())}
      });
    });
    return Object.entries(byBase).map(function(e){
      var base=e[0],info=e[1];
      var label=info.menus.length>1?base+" ("+info.menus.join("/")+")":info.menus.length===1?base+" ("+info.menus[0]+")":base;
      return{name:label,count:info.productNames.size,city:info.city,isYou:info.isYou};
    }).sort((a,b)=>sort==="count"?b.count-a.count:a.name.localeCompare(b.name));
  },[prods,disps,sort]);
  return<div className="pnl"><div className="row" style={{justifyContent:'space-between',marginBottom:12}}><span className="pnl-t" style={{margin:0}}>All dispensaries ({list.length})</span>
    <div className="row"><button className={"btn "+(sort==="count"?"pri":"")} onClick={()=>setSort("count")}>By products</button><button className={"btn "+(sort==="name"?"pri":"")} onClick={()=>setSort("name")}>By name</button></div></div>
    <div className="pnl-d">Total unique products per dispensary. Med and Rec menus combined with overlapping products counted once.</div>
    <div className="dlist">{list.map(d=><div key={d.name} className={"dcard "+(d.isYou?"you":"")}><div><div className="dcard-n" title={d.name}>{d.isYou?String.fromCharCode(9733)+" ":""}{d.name}</div><div className="dcard-c">{d.city}</div></div><div className="dcard-v">{d.count.toLocaleString()}</div></div>)}</div></div>;
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
