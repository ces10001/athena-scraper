function normName(n){var s=(n||"").toLowerCase();s=s.replace(/\([^)]*\)/g,"");s=s.replace(/\b\d+\.?\d*\s*(?:g|mg|ml|oz)\b/gi,"");s=s.replace(/\b\d+\s*pk\b/gi,"");s=s.replace(/\b[tchdTCHD]+\s*\d+\.?\d*\s*%?/g,"");s=s.replace(/\d+\.?\d*\s*%/g,"");s=s.replace(/\b\d+\.?\d*\b/g,"");s=s.replace(/\b(whole|flower|premium|reserve|mini|minis|pre|pack|prepack|cartridge|cart|vape|roll|rolls|concentrate|gummy|gummies|edible|tincture|topical|capsule|capsules|tablet|tablets|med|rec|adult|use)\b/gi,"");s=s.replace(/\b[a-z]\b/g,"");s=s.replace(/\b(ctpharma|theraplant|curaleaf|advanced grow labs|agl)\b/gi,"");s=s.replace(/[-_|/]+/g," ");s=s.replace(/\s+/g," ").trim();var words=s.split(" ").filter(function(w){return w.length>1});words.sort();return words.join(" ")}

function DealsTab({data}){
  const[dq,setDq]=useState("");const[openD,setOpenD]=useState(new Set());const deals=(data.deals||[]).filter(d=>(d.category||"").toLowerCase()!=="accessories");
  const filtered=useMemo(()=>{if(!dq.trim())return deals;const s=dq.toLowerCase();return deals.filter(x=>(x.product||"").toLowerCase().includes(s)||(x.dispensary||"").toLowerCase().includes(s)||(x.brand||"").toLowerCase().includes(s))},[deals,dq]);
  const grouped=useMemo(()=>{const byChain={};filtered.forEach(d=>{const chain=getChain(d.dispensary);if(!byChain[chain])byChain[chain]={disps:{}};const dn=d.dispensary;if(!byChain[chain].disps[dn])byChain[chain].disps[dn]=[];byChain[chain].disps[dn].push(d)});return Object.entries(byChain).sort((a,b)=>{const ac=Object.values(a[1].disps).flat().length;const bc=Object.values(b[1].disps).flat().length;return bc-ac}).map(([chain,info])=>({chain,locations:Object.entries(info.disps).sort((a,b)=>b[1].length-a[1].length)}))},[filtered]);
  return<div className="pnl"><div className="row" style={{justifyContent:'space-between',marginBottom:10}}><span className="pnl-t" style={{margin:0}}>Active deals ({filtered.length.toLocaleString()})</span><div className="row"><button className="btn" onClick={()=>setOpenD(new Set(filtered.map(d=>d.dispensary)))}>Expand all</button><button className="btn" onClick={()=>setOpenD(new Set())}>Collapse</button></div></div>
    <div className="srch" style={{marginBottom:12}}><span className="srch-ic">{String.fromCharCode(8981)}</span><input type="search" placeholder="Search deals..." value={dq} onChange={e=>setDq(e.target.value)}/></div>
    <div className="pnl-d">Current promotions and discounts grouped by dispensary chain.</div>
    {grouped.map(g=><div key={g.chain} style={{marginBottom:16}}><div className="dsel-grp">{g.chain} ({g.locations.reduce((s,l)=>s+l[1].length,0)} deals)</div>
      {g.locations.map(([disp,dls])=>{const isO=openD.has(disp);const best=Math.max(...dls.map(d=>d.pct_off));return<div key={disp} style={{borderBottom:'1px solid rgba(0,215,235,.06)'}}><div onClick={()=>setOpenD(p=>{const n=new Set(p);n.has(disp)?n.delete(disp):n.add(disp);return n})} className="dsel-item" style={{padding:'8px 12px'}}><div className="dsel-left"><span style={{color:'var(--tx3)',fontSize:10,transform:isO?'rotate(90deg)':'rotate(0)',display:'inline-block',transition:'transform .2s'}}>{String.fromCharCode(9654)}</span><span className="dsel-name" style={{color:isAff(disp)?'var(--cy2)':'var(--tx)'}}>{cleanD(disp)}</span></div>
            <div className="row"><span className="badge gn">up to {best}%</span><span className="dsel-count">{dls.length}</span></div></div>
          {isO&&<div style={{padding:'4px 12px 8px 28px',display:'flex',flexDirection:'column',gap:3}}>{dls.map((d,i)=><div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'3px 0',fontSize:12}}><div style={{flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}><span style={{color:'var(--tx)'}}>{d.product}</span> <span style={{color:'var(--tx2)',fontSize:10}}>{d.brand}</span></div>
            <div style={{flexShrink:0,marginLeft:10,fontFamily:'var(--m)'}}><span style={{color:'var(--gn)',fontWeight:700}}>{d.pct_off}%</span> <span style={{color:'var(--tx2)',fontSize:10}}>${d.discounted}</span> <span style={{color:'var(--tx3)',fontSize:9,textDecoration:'line-through'}}>${d.original}</span></div></div>)}</div>}</div>})}</div>)}</div>;
}

function DispsTab({data}){
  const[sort,setSort]=useState("count");const prods=data.products||[];const disps=data.dispensaries||{};
  const list=useMemo(()=>{const byBase={};Object.entries(disps).forEach(([name,info])=>{const base=getBase(name);if(!byBase[base])byBase[base]={city:info.city,isYou:isAff(name),menus:[],productNames:new Set()};const menuType=(name.match(/\(([^)]+)\)$/)||[])[1];if(menuType&&!byBase[base].menus.includes(menuType))byBase[base].menus.push(menuType)});prods.forEach(p=>{Object.keys(p.dispensaries||{}).forEach(d=>{const base=getBase(d);if(byBase[base])byBase[base].productNames.add((p.name||"").toLowerCase())})});return Object.entries(byBase).map(function(e){var base=e[0],info=e[1];var label=info.menus.length>1?base+" ("+info.menus.join("/")+")":info.menus.length===1?base+" ("+info.menus[0]+")":base;return{name:label,count:info.productNames.size,city:info.city,isYou:info.isYou}}).sort((a,b)=>sort==="count"?b.count-a.count:a.name.localeCompare(b.name))},[prods,disps,sort]);
  return<div className="pnl"><div className="row" style={{justifyContent:'space-between',marginBottom:12}}><span className="pnl-t" style={{margin:0}}>All dispensaries ({list.length})</span>
    <div className="row"><button className={"btn "+(sort==="count"?"pri":"")} onClick={()=>setSort("count")}>By products</button><button className={"btn "+(sort==="name"?"pri":"")} onClick={()=>setSort("name")}>By name</button></div></div>
    <div className="pnl-d">Total unique products per dispensary.</div>
    <div className="dlist">{list.map(d=><div key={d.name} className={"dcard "+(d.isYou?"you":"")}><div><div className="dcard-n" title={d.name}>{d.isYou?String.fromCharCode(9733)+" ":""}{d.name}</div><div className="dcard-c">{d.city}</div></div><div className="dcard-v">{d.count.toLocaleString()}</div></div>)}</div></div>;
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
