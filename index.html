<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATHENA — CT Cannabis Pricing Intel</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0c0f;
    --surface: #12151a;
    --surface2: #1a1e25;
    --border: #2a2f38;
    --text: #e8eaed;
    --text2: #8b919a;
    --accent: #00d4aa;
    --accent2: #00b894;
    --red: #ff6b6b;
    --yellow: #ffd93d;
    --blue: #4dabf7;
  }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    padding: 24px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--surface);
  }

  header h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--accent);
  }

  header h1 span { color: var(--text2); font-weight: 300; letter-spacing: 1px; font-size: 14px; margin-left: 12px; }

  #last-updated { font-size: 12px; color: var(--text2); font-family: 'JetBrains Mono', monospace; }

  .stats-bar {
    display: flex;
    gap: 24px;
    padding: 16px 32px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }

  .stat {
    text-align: center;
    min-width: 120px;
  }

  .stat-value {
    font-size: 28px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
  }

  .stat-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 2px; margin-top: 2px; }

  .controls {
    display: flex;
    gap: 12px;
    padding: 16px 32px;
    flex-wrap: wrap;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }

  .controls select, .controls input {
    padding: 8px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    outline: none;
  }

  .controls select:focus, .controls input:focus { border-color: var(--accent); }
  .controls input { flex: 1; min-width: 200px; }

  .tab-bar {
    display: flex;
    gap: 0;
    padding: 0 32px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .tab {
    padding: 12px 20px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text2);
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  main { padding: 24px 32px; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead th {
    text-align: left;
    padding: 10px 12px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text2);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }

  thead th:hover { color: var(--accent); }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  tbody tr:hover { background: var(--surface2); }

  td {
    padding: 10px 12px;
    vertical-align: middle;
  }

  .price { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: var(--accent); }
  .price-per-g { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text2); }
  .thc { font-family: 'JetBrains Mono', monospace; color: var(--yellow); }
  .brand { font-weight: 600; }
  .dispensary-tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    white-space: nowrap;
  }

  .deal-badge {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 3px;
    background: rgba(255,107,107,0.15);
    color: var(--red);
    font-weight: 600;
  }

  .category-pill {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    white-space: nowrap;
  }

  .empty-state {
    text-align: center;
    padding: 80px 32px;
    color: var(--text2);
  }

  .empty-state h2 { font-size: 24px; margin-bottom: 12px; color: var(--text); }
  .empty-state p { max-width: 500px; margin: 0 auto; line-height: 1.6; }
  .empty-state code {
    display: block;
    background: var(--surface2);
    padding: 16px;
    border-radius: 8px;
    margin-top: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--accent);
  }

  #loading {
    text-align: center;
    padding: 60px;
    color: var(--text2);
    font-size: 16px;
  }

  #loading .spinner {
    display: inline-block;
    width: 24px;
    height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .comparison-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }

  .comparison-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }

  .comparison-card h3 {
    font-size: 14px;
    margin-bottom: 8px;
    color: var(--accent);
  }

  .comparison-card .store-price {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
  }

  .comparison-card .store-price:last-child { border: none; }
  .comparison-card .cheapest { color: var(--accent); font-weight: 600; }

  @media (max-width: 768px) {
    header, .stats-bar, .controls, main { padding-left: 16px; padding-right: 16px; }
    .stats-bar { gap: 16px; }
    table { font-size: 12px; }
  }
</style>
</head>
<body>

<header>
  <h1>ATHENA <span>CT Cannabis Pricing Intel</span></h1>
  <div id="last-updated">Loading...</div>
</header>

<div class="stats-bar" id="stats-bar">
  <div class="stat"><div class="stat-value" id="s-dispensaries">—</div><div class="stat-label">Dispensaries</div></div>
  <div class="stat"><div class="stat-value" id="s-products">—</div><div class="stat-label">Products</div></div>
  <div class="stat"><div class="stat-value" id="s-avg-flower">—</div><div class="stat-label">Avg Flower $/g</div></div>
  <div class="stat"><div class="stat-value" id="s-deals">—</div><div class="stat-label">Active Deals</div></div>
  <div class="stat"><div class="stat-value" id="s-brands">—</div><div class="stat-label">Brands</div></div>
</div>

<div class="tab-bar">
  <div class="tab active" data-tab="products">All Products</div>
  <div class="tab" data-tab="compare">Price Compare</div>
  <div class="tab" data-tab="deals">Deals</div>
</div>

<div class="controls">
  <select id="filter-dispensary"><option value="">All Dispensaries</option></select>
  <select id="filter-category"><option value="">All Categories</option></select>
  <select id="filter-strain"><option value="">All Strains</option></select>
  <input type="text" id="filter-search" placeholder="Search products or brands...">
  <select id="sort-by">
    <option value="name">Sort: Name</option>
    <option value="price-low">Price: Low → High</option>
    <option value="price-high">Price: High → Low</option>
    <option value="thc-high">THC: High → Low</option>
    <option value="per-gram">$/gram: Low → High</option>
  </select>
</div>

<main>
  <div id="loading"><div class="spinner"></div><br>Loading dispensary data...</div>
  <div id="content" style="display:none;"></div>
</main>

<script>
// =============================================
// ATHENA DASHBOARD
// =============================================
let ALL_PRODUCTS = [];
let DISPENSARY_NAMES = [];
let currentTab = 'products';

// Load data from the data/results/ directory
async function loadData() {
  try {
    // Try to load manifest first
    let dispensaryFiles = [];
    try {
      const manifestRes = await fetch('data/manifest.json');
      if (manifestRes.ok) {
        const manifest = await manifestRes.json();
        dispensaryFiles = manifest.dispensaries || [];
        document.getElementById('last-updated').textContent = 'Updated: ' + new Date(manifest.lastUpdated).toLocaleString();
      }
    } catch {
      // No manifest — try to load known files
      console.log('No manifest found, trying direct file load...');
    }

    // If no manifest, try loading from known dispensary slugs
    if (dispensaryFiles.length === 0) {
      dispensaryFiles = [
        'high-profile---canton',
        'shangri-la---norwalk--main-ave-',
        'still-river-wellness',
      ];
    }

    // Fetch each dispensary's product data
    for (const slug of dispensaryFiles) {
      try {
        const res = await fetch(`data/results/${slug}.json`);
        if (res.ok) {
          const products = await res.json();
          // Tag each product with the dispensary name from the slug
          const dispName = slug.replace(/-+/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
          DISPENSARY_NAMES.push(dispName);
          for (const p of products) {
            p._dispensary = dispName;
            ALL_PRODUCTS.push(p);
          }
        }
      } catch { /* skip failed loads */ }
    }

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';

    if (ALL_PRODUCTS.length === 0) {
      showEmptyState();
      return;
    }

    populateFilters();
    updateStats();
    render();
  } catch (err) {
    document.getElementById('loading').innerHTML = `<p style="color:var(--red)">Error loading data: ${err.message}</p>`;
  }
}

function showEmptyState() {
  document.getElementById('content').innerHTML = `
    <div class="empty-state">
      <h2>No Data Yet</h2>
      <p>The scraper hasn't run yet. Push this repo to GitHub and trigger the Action, or run locally:</p>
      <code>npm install && npm run scrape</code>
      <p style="margin-top:16px;">Once scraped, product JSON files will appear in <strong>data/results/</strong> and this dashboard will display them automatically.</p>
    </div>
  `;
}

function populateFilters() {
  const cats = [...new Set(ALL_PRODUCTS.map(p => p.category).filter(Boolean))].sort();
  const strains = [...new Set(ALL_PRODUCTS.map(p => p.strain_type).filter(Boolean))].sort();
  const disps = [...new Set(DISPENSARY_NAMES)].sort();

  const catSel = document.getElementById('filter-category');
  cats.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; catSel.appendChild(o); });

  const strSel = document.getElementById('filter-strain');
  strains.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; strSel.appendChild(o); });

  const dspSel = document.getElementById('filter-dispensary');
  disps.forEach(d => { const o = document.createElement('option'); o.value = d; o.textContent = d; dspSel.appendChild(o); });
}

function updateStats() {
  const disps = new Set(ALL_PRODUCTS.map(p => p._dispensary));
  const brands = new Set(ALL_PRODUCTS.map(p => p.brand).filter(Boolean));
  const deals = ALL_PRODUCTS.filter(p => p.on_sale || p.deal_description);
  const flower = ALL_PRODUCTS.filter(p => p.category === 'flower' && p.unit_price_per_gram);
  const avgPG = flower.length > 0
    ? (flower.reduce((s, p) => s + p.unit_price_per_gram, 0) / flower.length / 100).toFixed(2)
    : '—';

  document.getElementById('s-dispensaries').textContent = disps.size;
  document.getElementById('s-products').textContent = ALL_PRODUCTS.length.toLocaleString();
  document.getElementById('s-avg-flower').textContent = '$' + avgPG;
  document.getElementById('s-deals').textContent = deals.length;
  document.getElementById('s-brands').textContent = brands.size;
}

function getFiltered() {
  const disp = document.getElementById('filter-dispensary').value;
  const cat = document.getElementById('filter-category').value;
  const strain = document.getElementById('filter-strain').value;
  const search = document.getElementById('filter-search').value.toLowerCase();
  const sort = document.getElementById('sort-by').value;

  let filtered = ALL_PRODUCTS.filter(p => {
    if (disp && p._dispensary !== disp) return false;
    if (cat && p.category !== cat) return false;
    if (strain && p.strain_type !== strain) return false;
    if (search && !(p.name || '').toLowerCase().includes(search) && !(p.brand || '').toLowerCase().includes(search)) return false;
    if (currentTab === 'deals' && !p.on_sale && !p.deal_description) return false;
    return true;
  });

  filtered.sort((a, b) => {
    switch (sort) {
      case 'price-low': return (a.price_cents || 9999999) - (b.price_cents || 9999999);
      case 'price-high': return (b.price_cents || 0) - (a.price_cents || 0);
      case 'thc-high': return (b.thc_pct || 0) - (a.thc_pct || 0);
      case 'per-gram': return (a.unit_price_per_gram || 9999999) - (b.unit_price_per_gram || 9999999);
      default: return (a.name || '').localeCompare(b.name || '');
    }
  });

  return filtered;
}

function render() {
  const content = document.getElementById('content');

  if (currentTab === 'compare') {
    renderCompare(content);
    return;
  }

  const products = getFiltered();

  if (products.length === 0) {
    content.innerHTML = '<div class="empty-state"><h2>No products match filters</h2></div>';
    return;
  }

  let html = `<table><thead><tr>
    <th>Product</th>
    <th>Brand</th>
    <th>Category</th>
    <th>Strain</th>
    <th>Price</th>
    <th>Weight</th>
    <th>$/g</th>
    <th>THC%</th>
    <th>Dispensary</th>
    <th>Deal</th>
  </tr></thead><tbody>`;

  for (const p of products.slice(0, 500)) {
    const price = p.price_cents ? '$' + (p.price_cents / 100).toFixed(2) : '—';
    const origPrice = p.original_price_cents ? '$' + (p.original_price_cents / 100).toFixed(2) : '';
    const perG = p.unit_price_per_gram ? '$' + (p.unit_price_per_gram / 100).toFixed(2) : '—';
    const thc = p.thc_pct ? p.thc_pct.toFixed(1) + '%' : '—';
    const deal = p.deal_description || (p.on_sale ? 'SALE' : '');

    html += `<tr>
      <td>${esc(p.name)}</td>
      <td class="brand">${esc(p.brand || '')}</td>
      <td><span class="category-pill">${esc(p.category || '')}</span></td>
      <td>${esc(p.strain_type || '')}</td>
      <td class="price">${price}${origPrice ? ' <s style="color:var(--text2);font-size:11px">' + origPrice + '</s>' : ''}</td>
      <td>${esc(p.weight_label || '')}</td>
      <td class="price-per-g">${perG}</td>
      <td class="thc">${thc}</td>
      <td><span class="dispensary-tag">${esc(p._dispensary || '')}</span></td>
      <td>${deal ? '<span class="deal-badge">' + esc(deal) + '</span>' : ''}</td>
    </tr>`;
  }

  html += `</tbody></table>`;
  if (products.length > 500) html += `<p style="text-align:center;padding:16px;color:var(--text2)">Showing 500 of ${products.length} products</p>`;
  content.innerHTML = html;
}

function renderCompare(content) {
  // Group products by name+brand across dispensaries
  const groups = {};
  for (const p of ALL_PRODUCTS) {
    if (!p.price_cents) continue;
    const key = (p.brand + ' ' + p.name).trim().substring(0, 60);
    if (!groups[key]) groups[key] = [];
    groups[key].push(p);
  }

  // Only show products available at 2+ dispensaries
  const multiStore = Object.entries(groups)
    .filter(([, prods]) => {
      const disps = new Set(prods.map(p => p._dispensary));
      return disps.size >= 2;
    })
    .sort(([a], [b]) => a.localeCompare(b));

  if (multiStore.length === 0) {
    content.innerHTML = '<div class="empty-state"><h2>No cross-dispensary comparisons yet</h2><p>Price comparison requires the same product to appear at 2+ dispensaries. Add more dispensaries to see comparisons.</p></div>';
    return;
  }

  let html = '<div class="comparison-grid">';
  for (const [name, prods] of multiStore.slice(0, 50)) {
    const sorted = prods.sort((a, b) => a.price_cents - b.price_cents);
    const cheapestDisp = sorted[0]._dispensary;

    html += `<div class="comparison-card"><h3>${esc(name)}</h3>`;
    for (const p of sorted) {
      const isCheapest = p._dispensary === cheapestDisp;
      html += `<div class="store-price ${isCheapest ? 'cheapest' : ''}">
        <span>${esc(p._dispensary)}</span>
        <span class="price">$${(p.price_cents / 100).toFixed(2)} ${p.weight_label || ''}</span>
      </div>`;
    }
    html += '</div>';
  }
  html += '</div>';
  content.innerHTML = html;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

// ── Event listeners ──
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.tab;
    render();
  });
});

['filter-dispensary', 'filter-category', 'filter-strain', 'sort-by'].forEach(id => {
  document.getElementById(id).addEventListener('change', render);
});

document.getElementById('filter-search').addEventListener('input', render);

// ── Init ──
loadData();
</script>
</body>
</html>
