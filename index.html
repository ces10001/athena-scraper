<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATHENA — Competitive Intel</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
:root{--bg:#f5f6f8;--bg2:#ffffff;--sf:#ffffff;--sf2:#f0f1f3;--bd:rgba(0,0,0,.1);--bd2:rgba(0,0,0,.18);--tx:#1a1a1a;--tx2:#5a6370;--tx3:#a0a8b4;--cy:#e8600a;--cy2:#d45500;--cydim:rgba(232,96,10,.05);--gn:#1a8f3f;--rd:#d42030;--am:#e8600a;--f:'Outfit',sans-serif;--m:'IBM Plex Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--f);background:var(--bg);color:var(--tx);min-height:100vh}
::selection{background:var(--cy);color:#fff}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#eee}::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
.app{max-width:1520px;margin:0 auto;padding:14px 22px}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:12px}
.vid-carousel{position:relative;width:100%;height:240px;overflow:hidden;border-radius:8px;margin-bottom:10px;background:#0a0a0a}
.vid-carousel video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 1.2s ease}
.vid-carousel video.active{opacity:1}

.vid-logo{position:absolute;top:12px;left:14px;z-index:2;display:flex;align-items:center;gap:12px;pointer-events:none}
@media(max-width:640px){.vid-carousel{height:160px}.vid-logo{top:8px;left:10px}.vid-logo img{width:28px!important;height:28px!important}.vid-logo div div:first-child{font-size:18px!important}}
.ftr{text-align:center;padding:16px 0 8px;font-family:var(--m);font-size:10px;color:var(--tx3);letter-spacing:1px}
.logo{display:flex;align-items:center;gap:14px}
.lt{display:flex;align-items:center;gap:14px}.lt h1{font-size:28px;font-weight:800;letter-spacing:4px;color:var(--cy2);line-height:1}.lt span{font-size:11px;letter-spacing:2px;color:var(--tx2);font-family:var(--m);margin-top:2px}
.glow{height:1px;background:linear-gradient(90deg,transparent,var(--cy),transparent);margin:10px 0;opacity:.2}
.tabs{display:flex;gap:2px;margin-bottom:14px;background:var(--sf);border-radius:8px;padding:3px;border:2.5px solid rgba(20,20,20,0.7);overflow-x:auto}
.tab{padding:12px 24px;border-radius:6px;font-size:18px;font-weight:600;cursor:pointer;color:var(--tx2);transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--tx)}.tab.on{background:rgba(232,96,10,.08);color:var(--cy);border-bottom:2px solid var(--cy)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:14px}
.st{background:var(--sf);border:2.5px solid rgba(20,20,20,0.7);border-radius:8px;padding:12px 14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.st-l{font-family:var(--m);font-size:12px;text-transform:uppercase;letter-spacing:1.2px;color:var(--tx2);margin-bottom:3px}
.st-v{font-family:var(--m);font-size:26px;font-weight:600;color:var(--cy)}.st-v.gn{color:var(--gn)}.st-v.am{color:var(--am)}.st-v.rd{color:var(--rd)}
.pnl{background:var(--sf);border:2.5px solid rgba(20,20,20,0.7);border-radius:10px;padding:14px 16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.pnl-t{font-family:var(--m);font-size:15px;text-transform:uppercase;letter-spacing:1.2px;color:var(--tx2);margin-bottom:10px}
.pnl-d{font-size:16px;color:#1a1a1a;background:rgba(232,96,10,0.12);border:2.5px solid rgba(30,20,10,0.7);padding:10px 14px;margin-bottom:12px;line-height:1.5;border-radius:4px}
.map-w{height:320px;border-radius:8px;overflow:hidden;border:1px solid var(--bd)}
.leaflet-container{background:#e8e8e8!important}
.leaflet-control-zoom a{background:#fff!important;color:var(--cy)!important;border-color:#ddd!important}
.leaflet-popup-content-wrapper{background:#fff!important;color:var(--tx)!important;border:1px solid #ddd!important;border-radius:8px!important;box-shadow:0 2px 8px rgba(0,0,0,.1)!important}
.leaflet-popup-tip{background:#fff!important}
.leaflet-popup-content{font-family:var(--f)!important;font-size:12px!important;margin:8px 12px!important}
.srch{position:relative}.srch input{width:100%;background:var(--bg2);border:1px solid var(--bd);color:var(--tx);font-family:var(--f);font-size:15px;padding:11px 14px 11px 38px;border-radius:7px;outline:none}
.srch input:focus{border-color:var(--cy)}.srch input::placeholder{color:var(--tx3)}
.srch-ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:15px;pointer-events:none}
.btn{padding:7px 15px;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:var(--bg2);color:var(--tx2);font-family:var(--f);transition:all .15s;text-transform:uppercase}
.btn:hover{border-color:var(--cy);color:var(--cy)}.btn.pri{background:rgba(232,96,10,.08);border-color:var(--cy);color:var(--cy)}
.cats{display:flex;gap:3px;margin-bottom:10px;flex-wrap:wrap}
.ct{padding:9px 20px;border-radius:6px;font-size:15px;font-weight:600;cursor:pointer;background:transparent;color:var(--tx2);border:1px solid transparent;transition:all .15s}
.ct:hover{color:var(--tx);background:var(--sf)}.ct.on{background:var(--cydim);color:var(--cy);border-color:rgba(232,96,10,.2)}
.tw{background:var(--sf);border:1px solid var(--bd);border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.ts{overflow-x:auto;max-height:580px;overflow-y:auto;border:2.5px solid rgba(20,20,20,0.7);border-radius:8px}
.inf{padding:11px 14px;font-family:var(--m);font-size:13px;color:var(--tx2);border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px;align-items:center}
table{width:100%;border-collapse:collapse;font-size:15px}
thead th{background:var(--bg2);padding:11px 12px;text-align:left;font-family:var(--m);font-size:12px;text-transform:uppercase;letter-spacing:.7px;color:var(--tx2);font-weight:600;border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:2;white-space:nowrap}
thead th.yc{color:var(--cy);background:rgba(232,96,10,.04)}
tbody tr{border-bottom:1px solid rgba(0,0,0,.06)}tbody tr:hover{background:rgba(232,96,10,.03)}
td{padding:9px 12px;white-space:nowrap}td.pn{font-weight:500;color:var(--tx);max-width:280px;white-space:normal;word-break:break-word;font-size:15px}
td.dm{color:var(--tx2);font-size:14px}td.pr{font-family:var(--m);font-weight:600;font-size:15px}
td.pr.yp{color:var(--cy);background:rgba(232,96,10,.04);font-weight:700}td.pr.hi{color:var(--gn)}td.pr.lo{color:var(--rd)}
.df{display:inline-block;font-size:11px;padding:2px 6px;border-radius:3px;margin-left:4px;font-weight:600;font-family:var(--m)}
.df.up{background:rgba(26,143,63,.1);color:var(--gn)}.df.dn{background:rgba(212,32,48,.1);color:var(--rd)}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600;font-family:var(--m)}
.badge.gn{background:rgba(26,143,63,.1);color:var(--gn)}.badge.rd{background:rgba(212,32,48,.1);color:var(--rd)}
.badge.am{background:rgba(232,96,10,.1);color:var(--am)}.badge.cy{background:rgba(232,96,10,.08);color:var(--cy)}
.dlist{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px}
.dcard{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 3px rgba(0,0,0,.06);gap:8px}
.dcard.you{border-color:rgba(232,96,10,.3);background:rgba(232,96,10,.04)}
.dcard-n{font-size:14px;font-weight:500;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dcard-c{font-size:12px;color:var(--tx2);margin-top:2px}.dcard-v{font-family:var(--m);font-size:20px;font-weight:600;color:var(--cy)}
.empty{padding:40px 20px;text-align:center;color:var(--tx2)}.empty h3{font-size:17px;margin-bottom:5px;color:var(--tx);font-weight:500}
.ld{display:flex;align-items:center;justify-content:center;padding:80px 20px;flex-direction:column;gap:12px}
.sp{width:28px;height:28px;border:2px solid #ddd;border-top-color:var(--cy);border-radius:50%;animation:s .7s linear infinite}@keyframes s{to{transform:rotate(360deg)}}
.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.radius-ctrl{display:flex;align-items:center;gap:10px;padding:8px 0}
.radius-ctrl input[type=range]{flex:1;accent-color:var(--cy)}.radius-ctrl label{font-family:var(--m);font-size:11px;color:var(--tx2);white-space:nowrap}
.radius-ctrl .rv{font-family:var(--m);font-size:12px;color:var(--cy);font-weight:600;min-width:50px;text-align:right}
.dsel{max-height:340px;overflow-y:auto}
.dsel-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid rgba(0,0,0,.06);cursor:pointer;transition:background .1s}
.dsel-item:hover{background:rgba(232,96,10,.04)}
.dsel-item.on{background:rgba(232,96,10,.06)}
.dsel-item.you{border-left:3px solid var(--cy)}
.dsel-left{display:flex;align-items:center;gap:8px}
.dsel-dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--tx3);flex-shrink:0;transition:all .15s}
.dsel-item.on .dsel-dot{background:var(--cy);border-color:var(--cy);box-shadow:0 0 4px rgba(232,96,10,.3)}
.dsel-name{font-size:15px;font-weight:500;color:var(--tx)}
.dsel-item.you .dsel-name{color:var(--cy2)}
.dsel-count{font-family:var(--m);font-size:11px;color:var(--tx2)}
.dsel-grp{font-size:11px;font-weight:600;color:var(--tx2);padding:10px 12px 4px;text-transform:uppercase;letter-spacing:1px;border-top:1px solid rgba(0,0,0,.08)}
.detail-card{background:var(--sf);border:2px solid var(--cy);border-radius:10px;padding:16px;margin-bottom:14px;box-shadow:0 4px 20px rgba(232,96,10,.1)}
.detail-card h3{font-size:14px;font-weight:600;color:var(--cy2);margin-bottom:8px}
.detail-card .detail-brand{font-size:11px;color:var(--tx2);margin-bottom:10px;font-family:var(--m)}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;border-bottom:1px solid rgba(0,0,0,.06);font-size:13px}
.detail-row:last-child{border-bottom:none}
.detail-row.you-row{background:rgba(232,96,10,.06);border-left:3px solid var(--cy)}
.detail-row .dr-name{font-weight:500;flex:1}
.detail-row .dr-price{font-family:var(--m);font-weight:600;min-width:70px;text-align:right}
.detail-row .dr-price.cheapest{color:var(--gn)}.detail-row .dr-price.priciest{color:var(--rd)}
@media(max-width:900px){.g2{grid-template-columns:1fr}}
@media(max-width:640px){.hdr{flex-direction:column;align-items:flex-start}.stats{grid-template-columns:repeat(2,1fr)}.tabs{flex-wrap:wrap}}

/* ═══ TERMINAL BOOT SEQUENCE ═══ */
.boot{background:#0d0d0d;position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;justify-content:center;padding:40px 60px;font-family:'IBM Plex Mono',monospace;overflow:hidden}
.boot::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);pointer-events:none;z-index:1}
.boot-logo{font-size:42px;font-weight:700;letter-spacing:16px;color:#e8600a;margin-bottom:8px;opacity:0;animation:bootIn .4s ease forwards}
.boot-sub{font-size:11px;letter-spacing:4px;color:#5a4a3a;margin-bottom:32px;opacity:0;animation:bootIn .4s ease .2s forwards}
.boot-line{font-size:12px;color:#3a6a3a;margin:3px 0;opacity:0;animation:bootIn .3s ease forwards;display:flex;align-items:center;gap:8px}
.boot-line.ok{color:#1a8f3f}.boot-line.warn{color:#e8600a}.boot-line.info{color:#5a6370}
.boot-line .bl-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.boot-line .bl-val{color:#e8600a;font-weight:600}
.boot-bar{margin-top:20px;height:2px;background:#1a1a1a;border-radius:1px;overflow:hidden;opacity:0;animation:bootIn .3s ease 1.5s forwards}
.boot-bar-fill{height:100%;background:linear-gradient(90deg,#e8600a,#ff9a40);width:0;animation:barFill 1.2s ease 1.7s forwards;border-radius:1px}
.boot-ready{font-size:13px;color:#e8600a;margin-top:16px;opacity:0;animation:bootIn .4s ease 2.8s forwards;font-weight:600;letter-spacing:2px}
@keyframes bootIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes barFill{to{width:100%}}
.boot.done{opacity:0;transition:opacity .5s ease;pointer-events:none}

/* ═══ SKELETON SHIMMER ═══ */
.skel{position:relative;overflow:hidden;background:#e8e8ec;border-radius:4px}
.skel::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.6),transparent);animation:shimmer 1.4s ease infinite}
@keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
.skel-row{display:flex;gap:10px;padding:8px 14px;border-bottom:1px solid rgba(0,0,0,.04)}
.skel-row .skel{height:14px}
.skel-card{border-radius:8px;padding:14px;border:1px solid var(--bd);background:var(--bg2)}
.skel-card .skel{margin-bottom:8px}
.skel-card .skel:last-child{margin-bottom:0}

/* ═══ DETAILED VIEW MODAL ═══ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--sf);border-radius:14px;max-width:720px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);border:2.5px solid rgba(20,20,20,0.7);animation:modalIn .25s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;border-bottom:1px solid var(--bd)}
.modal-hdr h2{font-size:18px;font-weight:700;color:var(--tx);margin:0}
.modal-hdr .modal-close{width:32px;height:32px;border-radius:8px;border:1px solid var(--bd);background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--tx2);transition:all .15s}
.modal-hdr .modal-close:hover{border-color:var(--rd);color:var(--rd);background:rgba(212,32,48,.05)}
.modal-body{padding:22px}
.modal-stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.modal-stat{background:var(--bg);border-radius:8px;padding:12px;text-align:center;border:1px solid var(--bd)}
.modal-stat .ms-val{font-family:var(--m);font-size:24px;font-weight:700;color:var(--cy)}
.modal-stat .ms-lbl{font-family:var(--m);font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--tx2);margin-top:2px}
.modal-section{margin-bottom:20px}
.modal-section h3{font-family:var(--m);font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--tx2);margin-bottom:12px}
.cat-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.cat-bar-label{font-size:12px;font-weight:600;color:var(--tx);min-width:90px;text-align:right}
.cat-bar-track{flex:1;height:24px;background:var(--bg);border-radius:4px;overflow:hidden;border:1px solid var(--bd)}
.cat-bar-fill{height:100%;border-radius:3px;transition:width .6s ease;display:flex;align-items:center;padding:0 8px}
.cat-bar-fill span{font-family:var(--m);font-size:10px;font-weight:600;color:#fff;white-space:nowrap}
.cat-bar-count{font-family:var(--m);font-size:12px;color:var(--tx2);min-width:30px}
.trend-placeholder{background:var(--bg);border:1px dashed var(--bd2);border-radius:8px;padding:24px;text-align:center}
.trend-placeholder .tp-icon{font-size:28px;margin-bottom:8px;opacity:.4}
.trend-placeholder p{font-size:12px;color:var(--tx2);line-height:1.5}
.trend-placeholder .tp-label{font-family:var(--m);font-size:10px;color:var(--tx3);letter-spacing:1px;text-transform:uppercase;margin-top:8px}
.dcard-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}
.btn-detail{padding:5px 10px;border-radius:5px;font-size:9px;font-weight:700;cursor:pointer;border:none;background:var(--cy);color:#000;font-family:var(--m);transition:all .15s;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.btn-detail:hover{background:var(--cy2);color:#fff}

/* ═══ HIGHS/LOWS TAB ═══ */
.hl-section{margin-bottom:16px}
.hl-section-title{font-family:var(--m);font-size:14px;text-transform:uppercase;letter-spacing:1.5px;color:var(--tx);font-weight:700;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--cy)}
.hl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
.hl-card{background:var(--bg2);border:2.5px solid rgba(20,20,20,0.7);border-radius:8px;padding:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.hl-card-title{font-family:var(--m);font-size:12px;font-weight:700;color:var(--tx);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.hl-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(0,0,0,.05)}
.hl-row:last-child{border-bottom:none}
.hl-label{font-size:11px;color:var(--tx2);font-family:var(--m);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.hl-val{display:flex;flex-direction:column;align-items:flex-end}
.hl-price{font-family:var(--m);font-size:14px;font-weight:700}
.hl-price.lo{color:var(--gn)}.hl-price.hi{color:var(--rd)}
.hl-disp{font-size:9px;color:var(--tx3);max-width:180px;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hl-empty{font-size:11px;color:var(--tx3);text-align:center;padding:12px 8px}
.hl-count{font-family:var(--m);font-size:10px;color:var(--tx3);margin-left:6px}

/* ═══ DEALS TAB ═══ */
.deal-promo{background:linear-gradient(135deg,rgba(232,96,10,.06),rgba(232,96,10,.02));border:1px solid rgba(232,96,10,.15);border-radius:10px;padding:16px;margin-bottom:12px}
.deal-promo-title{font-family:var(--m);font-size:16px;font-weight:700;color:var(--cy2);margin-bottom:4px}
.deal-promo-desc{font-size:14px;color:var(--tx2);line-height:1.5}
.deal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px;margin-top:12px}
.deal-card{background:var(--bg2);border:2.5px solid rgba(20,20,20,0.7);border-radius:8px;padding:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.deal-card-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.deal-card-disp{font-family:var(--m);font-size:11px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px}
.deal-card-badge{font-family:var(--m);font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;background:rgba(26,143,63,.1);color:var(--gn)}
.deal-card-product{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:4px;line-height:1.3}
.deal-card-brand{font-size:10px;color:var(--tx3);margin-bottom:6px}
.deal-card-prices{display:flex;align-items:center;gap:8px}
.deal-card-sale{font-family:var(--m);font-size:16px;font-weight:700;color:var(--gn)}
.deal-card-orig{font-family:var(--m);font-size:12px;color:var(--tx3);text-decoration:line-through}
.deal-card-save{font-size:10px;color:var(--gn);font-weight:600}

/* ═══ PRICING ALERTS SPLIT VIEW ═══ */
.alert-split{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:12px}
@media(max-width:800px){.alert-split{grid-template-columns:1fr}}
.alert-col{border-radius:10px;padding:14px 16px;max-height:600px;overflow-y:auto;border:2.5px solid rgba(20,20,20,0.7)}
.alert-col.drops{background:rgba(212,32,48,.04);border:1px solid rgba(212,32,48,.15)}
.alert-col.increases{background:rgba(26,143,63,.04);border:1px solid rgba(26,143,63,.15)}
.alert-col-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;position:sticky;top:-14px;padding:14px 0 8px;z-index:1}
.alert-col.drops .alert-col-hdr{background:rgba(212,32,48,.04)}
.alert-col.increases .alert-col-hdr{background:rgba(26,143,63,.04)}
.alert-col-title{font-family:var(--m);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px}
.alert-col.drops .alert-col-title{color:var(--rd)}
.alert-col.increases .alert-col-title{color:var(--gn)}
.alert-col-count{font-family:var(--m);font-size:11px;padding:3px 8px;border-radius:4px;font-weight:600}
.alert-col.drops .alert-col-count{background:rgba(212,32,48,.1);color:var(--rd)}
.alert-col.increases .alert-col-count{background:rgba(26,143,63,.1);color:var(--gn)}
.alert-item{padding:8px 10px;border-bottom:1px solid rgba(0,0,0,.06);display:flex;flex-direction:column;gap:3px}
.alert-item:last-child{border-bottom:none}
.alert-item-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.alert-item-name{font-size:12px;font-weight:600;color:var(--tx);flex:1;line-height:1.3}
.alert-item-pct{font-family:var(--m);font-size:11px;font-weight:700;padding:2px 6px;border-radius:4px;white-space:nowrap}
.alert-col.drops .alert-item-pct{background:rgba(212,32,48,.1);color:var(--rd)}
.alert-col.increases .alert-item-pct{background:rgba(26,143,63,.1);color:var(--gn)}
.alert-item-bottom{display:flex;align-items:center;gap:6px;font-family:var(--m);font-size:11px}
.alert-item-disp{color:var(--tx3);font-size:10px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.alert-price-flow{display:flex;align-items:center;gap:4px}
.alert-price-old{color:var(--tx3);text-decoration:line-through}
.alert-price-arrow{color:var(--tx3);font-size:9px}
.alert-col.drops .alert-price-new{color:var(--rd);font-weight:700}
.alert-col.increases .alert-price-new{color:var(--gn);font-weight:700}
.alert-cats{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:12px}
.alert-cat{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:var(--tx2);border:1px solid transparent;transition:all .15s}
.alert-cat:hover{color:var(--tx);background:var(--sf)}.alert-cat.on{background:var(--cydim);color:var(--cy);border-color:rgba(232,96,10,.2)}
.alert-empty{text-align:center;padding:30px 16px;color:var(--tx3);font-size:12px}

</style>

    });

  },[prods,allD]);
  
  function getChain(base){
    var parts=base.split(' - ');

  }
  
  const grouped=useMemo(()=>{

  const togEntry=useCallback(d=>{setSel(p=>{const n=new Set(p);n.has(d)?n.delete(d):n.add(d);return n})},[]);

function CatTabs({data,cat,setCat,sel,comp}){
  const catCounts=useMemo(()=>{
    var counts={};var prods=data.products||[];
    prods.forEach(p=>{
      var c=p.category||"Other";
      if(c.toLowerCase()==="gift cards")return;
      var n=Object.keys(p.dispensaries||{}).filter(x=>sel.has(x)).length;
      if(comp?n>=2:n>=1){counts[c]=(counts[c]||0)+1;counts["All"]=(counts["All"]||0)+1}
    });
    return counts;
  },[data,sel,comp]);
  const cats=useMemo(()=>{const s=new Set();(data.products||[]).forEach(p=>{var c=p.category||"Other";if(c.toLowerCase()!=="gift cards")s.add(c)});return["All",...[...s].sort()]},[data]);
  return<div className="cats">{cats.map(c=><div key={c} className={"ct "+(cat===c?"on":"")} onClick={()=>setCat(c)}>{c}{catCounts[c]?" ("+catCounts[c]+")":""}</div>)}</div>;
}

function Tbl({data,q,sel,cat,comp,setComp,favsVer}){
  const prods=data.products||[];const cols=useMemo(()=>[...sel].sort((a,b)=>{if(isAff(a)&&!isAff(b))return-1;if(!isAff(a)&&isAff(b))return 1;return a.localeCompare(b)}),[sel,favsVer]);const affC=cols.filter(isAff);
  const rows=useMemo(()=>{let it=prods.filter(p=>(p.category||"").toLowerCase()!=="gift cards");if(cat!=="All")it=it.filter(p=>p.category===cat);if(q.trim()){const s=q.toLowerCase();it=it.filter(p=>(p.name||"").toLowerCase().includes(s)||(p.brand||"").toLowerCase().includes(s))}return it.filter(p=>{const n=Object.keys(p.dispensaries||{}).filter(x=>sel.has(x)).length;return comp?n>=2:n>=1})},[prods,q,sel,cat,comp]);
  
  // Get menu type (Med/Rec) from dispensary name
  function getMenuType(d){if(/\(Med\)/i.test(d))return"med";if(/\(Rec\)/i.test(d))return"rec";return"any"}
  // Get YOUR price + promo matching the same menu type as the competitor column
  function getYPForCol(p,compDisp){
    var compType=getMenuType(compDisp);
    for(var i=0;i<affC.length;i++){
      var affType=getMenuType(affC[i]);
      if((compType==="any"||affType==="any"||compType===affType)&&p.dispensaries&&p.dispensaries[affC[i]]){
        var yourPrice=p.dispensaries[affC[i]];
        var yourPromo=p.promos&&p.promos[affC[i]]&&p.promos[affC[i]]<yourPrice?p.promos[affC[i]]:null;
        return{price:yourPrice,promo:yourPromo};
      }
    }
    for(var i=0;i<affC.length;i++){
      if(p.dispensaries&&p.dispensaries[affC[i]]){
        var yourPrice=p.dispensaries[affC[i]];
        var yourPromo=p.promos&&p.promos[affC[i]]&&p.promos[affC[i]]<yourPrice?p.promos[affC[i]]:null;
        return{price:yourPrice,promo:yourPromo};
      }
    }
    return null;
  }
  
  return<div className="tw"><div className="inf"><span>{rows.length.toLocaleString()} product{rows.length!==1?"s":""}</span><div className="row" style={{gap:10}}><label style={{fontSize:12,color:'var(--tx2)',cursor:'pointer',display:'flex',alignItems:'center',gap:4}}><input type="checkbox" checked={comp} onChange={e=>setComp(e.target.checked)}/>Comparable only (at 2+ stores)</label></div></div>
    {!rows.length?<div className="empty"><h3>No matches</h3></div>:<div className="ts"><table><thead><tr><th style={{minWidth:160}}>Product</th><th>Brand</th><th>Cat</th>{cols.map(d=><th key={d} className={isAff(d)?"yc":""}>{isAff(d)?"★ ":""}{cleanD(d)}</th>)}</tr></thead>
      <tbody>{rows.slice(0,500).map((p,i)=>{return<tr key={i}><td className="pn">{p.name}</td><td className="dm">{p.brand}</td><td className="dm">{p.category}</td>
        {cols.map(d=>{const pr=p.dispensaries?.[d];if(!pr)return<td key={d} className="pr"></td>;const pm=p.promos?.[d];let c="pr";const y=isAff(d);const ypObj=y?null:getYPForCol(p,d);const yp=ypObj?ypObj.price:null;const ypPromo=ypObj?ypObj.promo:null;if(y)c+=" yp";else if(yp&&pr>yp)c+=" hi";else if(yp&&pr<yp)c+=" lo";
        if(y){
          return<td key={d} className={c}><div>${pr.toFixed(2)}</div>{pm&&pm<pr?<div style={{fontSize:12,color:'var(--am)',marginTop:2}}>${pm.toFixed(2)} <span style={{fontStyle:'italic'}}>(Promo)</span></div>:null}</td>
        }
        let regDf=null;
        if(yp&&yp>0){const pct=Math.round((pr-yp)/yp*100);if(pct>0)regDf=<span className="df up">+{pct}%</span>;else if(pct<0)regDf=<span className="df dn">{pct}%</span>}
        let promoLine=null;
        const homeBase=ypPromo&&ypPromo<yp?ypPromo:yp;
        if(pm&&pm<pr&&homeBase&&homeBase>0){
          const promoPct=Math.round((pm-homeBase)/homeBase*100);
          promoLine=<div style={{fontSize:12,color:'var(--am)',marginTop:2}}>${pm.toFixed(2)} <span style={{fontStyle:'italic'}}>(Promo)</span> <span className="df dn" style={{background:'rgba(232,96,10,.1)',color:'var(--am)'}}>{promoPct}%</span></div>
        } else if(!pm&&ypPromo&&ypPromo<yp&&yp>0){
          const vsPct=Math.round((pr-ypPromo)/ypPromo*100);
          promoLine=<div style={{marginTop:2}}><span className="df up" style={{background:'rgba(232,96,10,.1)',color:'var(--am)'}}>{vsPct>0?"+":""}{vsPct}%</span></div>
        } else if(pm&&pm<pr&&(!yp||yp<=0)){
          promoLine=<div style={{fontSize:12,color:'var(--am)',marginTop:2}}>${pm.toFixed(2)} <span style={{fontStyle:'italic'}}>(Promo)</span></div>
        }
        return<td key={d} className={c}><div>${pr.toFixed(2)} {regDf}</div>{promoLine}</td>})}</tr>})}</tbody></table></div>}</div>;
}

];

function HighLowTab({data,favsVer,toggleFav,sel,setSel}){
  var[radius,setRadius]=useState(10);
  var prods=data.products||[];

  var analysis=useMemo(function(){
    var results=[];
    var dealsMap={};(data.deals||[]).forEach(function(d){var k=d.product+"|"+d.dispensary;if(!dealsMap[k]||d.discounted<dealsMap[k])dealsMap[k]=d.discounted});
    var affSet=new Set();Object.keys(data.dispensaries||{}).forEach(function(d){if(isAff(d))affSet.add(d)});
    HL_BUCKETS.forEach(function(section){
      var sectionResults={section:section.section,buckets:[]};
      section.buckets.forEach(function(bucket){
        var matches=[];
        prods.forEach(function(p){
          var pCat=(p.category||"").toLowerCase();
          if(pCat!==bucket.cat)return;
          var wl=(p.weight_label||"")+" "+(p.name||"");
          if(!bucket.match(wl))return;
          Object.entries(p.dispensaries||{}).forEach(function(e){
            var disp=e[0],price=e[1];
            if(sel.size>0&&!sel.has(disp))return;
            var dealPrice=dealsMap[p.name+"|"+disp]||null;
            matches.push({name:p.name,brand:p.brand,disp:disp,price:price,dealPrice:dealPrice,isHome:affSet.has(disp)});
          });
        });
        if(matches.length===0){sectionResults.buckets.push({label:bucket.label,count:0,byDisp:[]});return}
        var byDisp={};
        matches.forEach(function(m){

          if(m.price>byDisp[m.disp].high.price)byDisp[m.disp].high=m;
        });
        var dispList=Object.values(byDisp).sort(function(a,b){return a.isHome?-1:b.isHome?1:a.low.price-b.low.price});
        var uniq=new Set();matches.forEach(function(m){uniq.add(m.name)});
        sectionResults.buckets.push({label:bucket.label,count:uniq.size,totalListings:matches.length,byDisp:dispList});
      });

    });
    return results;
  },[prods,sel,data,favsVer]);

      <div className="pnl-d">{sel.size>0?"Comparing the cheapest and most expensive prices for each product size across "+sel.size+" selected dispensaries. ★ starred stores display % price differences against competitors. Deal prices shown separately when a promotion makes a product cheaper.":"Select dispensaries above to compare, or view market-wide highs and lows across all stores. Each card shows the lowest price, highest price, and the spread between them."}</div>
      {analysis.map(function(s){return<div key={s.section} className="hl-section">
        <div className="hl-section-title">{s.section}</div>
        <div className="hl-grid">{s.buckets.map(function(b){
          var homeDisp=b.byDisp&&b.byDisp.find(function(d){return d.isHome});
          var homeLP=homeDisp?homeDisp.low.price:null;

          return<div key={b.label} className="hl-card">

            <tbody>{b.byDisp.map(function(dd){

}

/* ═══════════════════════════════════════
   PRODUCT GAPS TAB (with map)
   ═══════════════════════════════════════ */
function normName(n){
  var s=(n||"").toLowerCase();
  // Remove parenthetical info like (H), (S), (I), (3.5g)
  s=s.replace(/\([^)]*\)/g,"");
  // Remove weight/size labels
  s=s.replace(/\b\d+\.?\d*\s*(?:g|mg|ml|oz|pk|pack|ct)\b/gi,"");
  // Remove THC/CBD values
  s=s.replace(/\b[tchdTCHD]+\s*\d+\.?\d*\s*%?/g,"");
  s=s.replace(/\d+\.?\d*\s*%/g,"");
  // Remove NDC/SKU codes (5+ digit numbers)
  s=s.replace(/\b\d{5,}\b/g,"");
  // Remove common product type words
  s=s.replace(/\b(whole|small|ground|flower|premium|reserve|mini|minis|pre|pack|prepack|cartridge|cart|vape|roll|rolls|concentrate|gummy|gummies|edible|tincture|topical|capsule|capsules|tablet|tablets|med|rec|adult|use|disposable|infused|shorties|fatboy|blunt|budz|lil)\b/gi,"");
  // Remove concentrate/extract terms
  s=s.replace(/\b(bho|rso|rosin|live resin|resin|badder|sugar|sauce|shatter|diamonds|diamond|wax|hash|bubble|crumble|budder|oil|distillate|syringe|applicator)\b/gi,"");
  // Remove product format terms
  s=s.replace(/\b(bar|chocolate|gummies|gummy|mints|chews|lozenges|seltzer|soda|beverage|drink|drops|spray|cream|balm|lotion|patch|salve)\b/gi,"");
  // Remove brand names that appear in product names
  s=s.replace(/\b(ctpharma|theraplant|curaleaf|advanced grow labs|agl|affinity|affinity grow|brix|rythm|select|savvy|good green|dogwalkers|encore|camino|wana|zone|shaka|awwsom|awssom|find|springtime|soundview|comffy|amigos|lighthouse|rodeo|miss grass|let.s burn|nova|crisp)\b/gi,"");
  // Remove single characters ONLY if they are standalone strain indicators (H, S, I) not part of a name
  // Keep single chars that appear between other words (like "P" in "Gary P")
  s=s.replace(/\s+[hsi]\s+/gi," ").replace(/^[hsi]\s+/gi,"").replace(/\s+[hsi]$/gi,"");
  s=s.replace(/[-_|/]+/g," ");
  s=s.replace(/\s+/g," ").trim();
  var words=s.split(" ").filter(function(w){return w.length>0});
  words.sort();
  return words.join(" ");
}

// coreName: extracts just the core strain/product name (first 2-3 meaningful words)
// Used for fuzzy gap matching when normName doesn't find an exact match
function coreName(n){
  var s=(n||"").toLowerCase();
  s=s.replace(/\([^)]*\)/g,"");
  // Strip everything that's clearly not the strain name
  s=s.replace(/\b\d+\.?\d*\s*(?:g|mg|ml|oz|pk|pack|ct)\b/gi,"");
  s=s.replace(/\b[tchdTCHD]+\s*\d+\.?\d*\s*%?/g,"");
  s=s.replace(/\d+\.?\d*\s*%/g,"");
  s=s.replace(/\b\d{4,}\b/g,"");
  // Strip brands
  s=s.replace(/\b(ctpharma|theraplant|curaleaf|advanced grow labs|agl|affinity|affinity grow|brix|rythm|select|savvy|good green|dogwalkers|encore|camino|wana|zone|shaka|awwsom|awssom|find|springtime|soundview|comffy|amigos|lighthouse|rodeo|miss grass|let.s burn|nova|crisp|earl baker|coast|jams|loud|borealis)\b/gi,"");
  // Strip product types
  s=s.replace(/\b(whole|small|ground|flower|premium|reserve|mini|minis|pre|pack|prepack|cartridge|cart|vape|roll|rolls|concentrate|gummy|gummies|edible|tincture|topical|capsule|capsules|tablet|tablets|disposable|infused|shorties|fatboy|blunt|budz|lil|bho|rso|rosin|live|resin|badder|sugar|sauce|shatter|diamonds|diamond|wax|hash|bubble|crumble|budder|oil|distillate|syringe|bar|chocolate|mints|chews|seltzer|soda|beverage|drops|spray|cream|balm|lotion)\b/gi,"");
  // Strip strain indicators
  s=s.replace(/\s+[hsi]\s+/gi," ").replace(/^[hsi]\s+/gi,"").replace(/\s+[hsi]$/gi,"");
  s=s.replace(/[-_|/]+/g," ");
  s=s.replace(/\s+/g," ").trim();
  // Take first 3 meaningful words as core identity
  var words=s.split(" ").filter(function(w){return w.length>1});
  if(words.length>3)words=words.slice(0,3);
  words.sort();
  return words.join(" ");
}

function GapsTab({data,favsVer,toggleFav,sel,setSel}){
  const prods=data.products||[];const allDisps=getDisps(prods);const affC=allDisps.filter(isAff);
  const[gapChain,setGapChain]=useState("");const[openLocs,setOpenLocs]=useState(new Set());
  const[radius,setRadius]=useState(10);

  const gaps=useMemo(()=>{if(affC.length===0&&sel.size===0)return[];
    
    // Home = only your starred dispensaries
    var homeD=affC.length>0?affC:[...sel].slice(0,2);
    
    var compD=[...sel].filter(function(d){return!homeD.includes(d)});
    if(compD.length===0)compD=allDisps.filter(function(d){return!homeD.includes(d)});
    
    // Build home product index with MULTIPLE matching strategies
    var homeExact=new Set(); // exact normName matches
    var homeWords=new Set(); // individual significant words for fuzzy matching
    var homeSubstrings=[]; // full normalized names for substring matching
    
    prods.forEach(function(p){
      homeD.forEach(function(a){
        if(p.dispensaries&&p.dispensaries[a]){
          var nn=normName(p.name);
          homeExact.add(nn);
          homeSubstrings.push(nn);
          // Also add a "core name" — just the strain name without all the extras
          var core=coreName(p.name);
          if(core.length>2)homeExact.add(core);
        }
      });
    });
    
    // Check if a competitor product matches any home product
    function isMatch(compName){
      var nn=normName(compName);
      var cn=coreName(compName);
      
      // Strategy 1: Exact normName match
      if(homeExact.has(nn))return true;
      
      // Strategy 2: Core name match (most important words only)
      if(cn.length>2&&homeExact.has(cn))return true;
      
      // Strategy 3: Substring match — if competitor's norm is fully contained in any home norm (or vice versa)
      if(nn.length>3){
        for(var i=0;i<homeSubstrings.length;i++){
          var h=homeSubstrings[i];
          if(h.length>3&&(h.includes(nn)||nn.includes(h)))return true;
        }
      }
      
      return false;
    }
    
    var byComp={};
    prods.forEach(function(p){
      if(isMatch(p.name))return;
      if((p.category||"").toLowerCase()==="accessories")return;
      if((p.category||"").toLowerCase()==="gift cards")return;
      Object.keys(p.dispensaries||{}).forEach(function(d){
        if(homeD.includes(d))return;
        if(sel.size>0&&!sel.has(d))return;
        if(!byComp[d])byComp[d]=[];
        // Extract NDC from product name
        var ndcMatch=(p.name||"").match(/\b(\d{5})\b/)||
                     (p.name||"").match(/\b(C\d{7,})\b/)||
                     (p.name||"").match(/\b(\d{4,6})\b/);
        var ndc=ndcMatch?ndcMatch[1]:"";
        byComp[d].push({name:p.name,brand:p.brand,category:p.category,price:p.dispensaries[d],ndc:ndc});
      });
    });
    
    var byChain={};
    Object.entries(byComp).forEach(function(e){
      var dn=e[0],items=e[1];
      var chain=getChain(dn);
      if(!byChain[chain])byChain[chain]={locations:{},total:0};
      byChain[chain].locations[dn]={count:items.length,items:items.sort(function(a,b){return a.category.localeCompare(b.category)})};
      byChain[chain].total+=items.length;
    });
    
    return Object.entries(byChain).sort(function(a,b){return b[1].total-a[1].total}).map(function(e){
      return{chain:e[0],total:e[1].total,locations:Object.entries(e[1].locations).sort(function(a,b){return b[1].count-a[1].count})};
    });
  },[prods,affC,sel,favsVer]);
  
  const shown=gapChain?gaps.filter(g=>g.chain===gapChain):gaps;const totalGaps=gaps.reduce((s,g)=>s+g.total,0);

  return<><div className="g2"><MapPanel data={data} sel={sel} setSel={setSel} radius={radius} setRadius={setRadius}/><DispPanel data={data} sel={sel} setSel={setSel} toggleFav={toggleFav} favsVer={favsVer}/></div>
    <div className="pnl" style={{marginTop:12}}><div className="row" style={{justifyContent:'space-between',marginBottom:10}}><span className="pnl-t" style={{margin:0}}>Product gaps ({totalGaps.toLocaleString()} products{affC.length>0?" your stores don't carry":" not at selected stores"})</span></div>
    <div className="pnl-d">{affC.length>0?"Your starred ★ dispensaries are your home base. Select competitors above to see what they carry that you don't. Products are matched across different naming formats (e.g. 'Tap Out BHO' matches 'Tap Out').":"First, click ★ to star your dispensaries. Then select competitors to see what products they have that you're missing."}</div>
    {totalGaps===0?<div className="empty"><h3>{affC.length===0?"Star your dispensaries first":"No product gaps found"}</h3><p style={{fontSize:12}}>{affC.length===0?"Click ★ next to your dispensaries in the panel above, then select competitors to compare against.":"The selected dispensaries carry the same products as your stores."}</p></div>:
    <><div style={{marginBottom:12}}><select style={{width:'100%',background:'var(--bg2)',border:'1px solid var(--bd)',color:'var(--tx)',fontFamily:'var(--f)',fontSize:13,padding:'9px 14px',borderRadius:7,outline:'none'}} value={gapChain} onChange={e=>setGapChain(e.target.value)}><option value="">All chains ({gaps.length})</option>{gaps.map(g=><option key={g.chain} value={g.chain}>{g.chain} ({g.total} gaps)</option>)}</select></div>
    {shown.map(g=><div key={g.chain} style={{marginBottom:16}}><div className="dsel-grp">{g.chain} ({g.total} gaps)</div>
      {g.locations.map(([dn,info])=>{const isO=openLocs.has(dn);
        // Group items by brand then category
        var byBrand={};
        info.items.forEach(function(p){
          var b=p.brand||"Unknown";
          if(!byBrand[b])byBrand[b]={};
          var c=p.category||"Other";
          if(!byBrand[b][c])byBrand[b][c]=[];
          byBrand[b][c].push(p);
        });
        var brandEntries=Object.entries(byBrand).sort(function(a,b){
          var aCount=Object.values(a[1]).reduce(function(s,arr){return s+arr.length},0);

function DispsTab({data,favsVer,toggleFav}){
  const prods=data.products||[];const disps=data.dispensaries||{};
  const[detailDisp,setDetailDisp]=useState(null);const[dq,setDq]=useState("");
  const[openChains,setOpenChains]=useState(new Set());
  
  // Build per-store data
  const storeList=useMemo(()=>{
    const byBase={};
    Object.entries(disps).forEach(([name,info])=>{
      const base=getBase(name);
      if(!byBase[base])byBase[base]={city:info.city,isYou:isAff(name),names:[name],menus:[],productNames:new Set()};
      else{byBase[base].names.push(name);if(isAff(name))byBase[base].isYou=true}
      const menuType=(name.match(/\(([^)]+)\)$/)||[])[1];
      if(menuType&&!byBase[base].menus.includes(menuType))byBase[base].menus.push(menuType);
    });
    prods.forEach(p=>{if((p.category||"").toLowerCase()==="gift cards")return;Object.keys(p.dispensaries||{}).forEach(d=>{const base=getBase(d);if(byBase[base])byBase[base].productNames.add((p.name||"").toLowerCase())})});
    return Object.entries(byBase).map(function(e){
      var base=e[0],info=e[1];
      var label=info.menus.length>1?base+" ("+info.menus.join("/")+")":info.menus.length===1?base+" ("+info.menus[0]+")":base;
      return{name:label,base:base,count:info.productNames.size,city:info.city,isYou:info.isYou,rawNames:info.names,chain:getChain(info.names[0])}
    });
  },[prods,disps,favsVer]);
  
  // Group by chain
  const chains=useMemo(()=>{
    var byChain={};
    storeList.forEach(function(s){
      var ch=s.chain;
      if(!byChain[ch])byChain[ch]={chain:ch,stores:[],totalSKUs:0,isYou:false};
      byChain[ch].stores.push(s);
      byChain[ch].totalSKUs+=s.count;
      if(s.isYou)byChain[ch].isYou=true;
    });
    // Sort stores within chain by count desc
    Object.values(byChain).forEach(function(c){c.stores.sort(function(a,b){return b.count-a.count})});
    var arr=Object.values(byChain);
    // Your chains first, then by total SKUs
    arr.sort(function(a,b){
      if(a.isYou&&!b.isYou)return-1;if(!a.isYou&&b.isYou)return 1;
      return b.totalSKUs-a.totalSKUs;
    });
    return arr;
  },[storeList]);
  
  // Filter by search
  const filtered=useMemo(()=>{
    if(!dq.trim())return chains;
    var s=dq.toLowerCase();
    return chains.filter(function(c){
      return c.chain.toLowerCase().includes(s)||c.stores.some(function(st){return st.name.toLowerCase().includes(s)||st.city.toLowerCase().includes(s)});
    });
  },[chains,dq]);
  
  var totalStores=storeList.length;
  var toggleChain=function(ch){setOpenChains(function(p){var n=new Set(p);n.has(ch)?n.delete(ch):n.add(ch);return n})};
  
  return<div className="pnl"><div className="row" style={{justifyContent:'space-between',marginBottom:12}}>
    <span className="pnl-t" style={{margin:0}}>All Dispensaries — {totalStores} stores across {chains.length} brands</span>
    <div className="row"><button className="btn" onClick={function(){setOpenChains(new Set(chains.map(function(c){return c.chain})))}}>Expand All</button><button className="btn" onClick={function(){setOpenChains(new Set())}}>Collapse</button></div></div>
    <div className="srch" style={{marginBottom:12}}><span className="srch-ic">{String.fromCharCode(8981)}</span><input type="search" placeholder="Search by brand, store, or city..." value={dq} onChange={e=>setDq(e.target.value)}/></div>
    <div className="pnl-d" style={{marginBottom:12}}>Click a brand to expand and see individual locations. Click "Detailed View" to see category breakdown and compare with your starred dispensary. Click ★ to mark as yours.</div>
    
    {filtered.map(function(c){
      var isOpen=openChains.has(c.chain);
      return<div key={c.chain} style={{marginBottom:4}}>
        <div onClick={function(){toggleChain(c.chain)}} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 14px',background:c.isYou?'rgba(232,96,10,.06)':'var(--bg2)',border:'1px solid '+(c.isYou?'rgba(232,96,10,.2)':'var(--bd)'),borderRadius:isOpen?'8px 8px 0 0':'8px',cursor:'pointer',transition:'all .15s'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <span style={{color:'var(--tx3)',fontSize:10,transform:isOpen?'rotate(90deg)':'rotate(0)',display:'inline-block',transition:'transform .2s'}}>►</span>
            <span style={{fontFamily:'var(--m)',fontSize:13,fontWeight:700,color:c.isYou?'var(--cy2)':'var(--tx)'}}>{c.isYou?"★ ":""}{c.chain}</span>
            <span style={{fontSize:11,color:'var(--tx3)'}}>{c.stores.length} location{c.stores.length!==1?"s":""}</span>
          </div>
          <span style={{fontFamily:'var(--m)',fontSize:14,fontWeight:700,color:'var(--tx)'}}>{c.totalSKUs.toLocaleString()} <span style={{fontSize:10,fontWeight:400,color:'var(--tx3)'}}>SKUs</span></span>
        </div>
        {isOpen&&<div style={{border:'1px solid var(--bd)',borderTop:'none',borderRadius:'0 0 8px 8px',overflow:'hidden'}}>
          {c.stores.map(function(d){
            return<div key={d.name} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 14px 8px 34px',borderBottom:'1px solid rgba(0,0,0,.04)',background:d.isYou?'rgba(232,96,10,.03)':'transparent'}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:500,color:'var(--tx)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={d.name}>{d.name}</div>
                <div style={{fontSize:10,color:'var(--tx3)'}}>{d.city}</div>
              </div>
              <div className="dcard-actions">
                <div className="dcard-v">{d.count.toLocaleString()}</div>
                <button className="btn-detail" onClick={function(e){e.stopPropagation();setDetailDisp(d)}}>Detailed View</button>
                <span onClick={function(e){e.stopPropagation();d.rawNames.forEach(function(n){toggleFav(n)})}} style={{cursor:'pointer',fontSize:18,color:d.isYou?'var(--cy)':'var(--tx3)',transition:'color .15s',lineHeight:1}} title={d.isYou?'Remove from mine':'Mark as mine'}>{d.isYou?'★':'☆'}</span>
              </div>
            </div>
          })}
        </div>}
      </div>
    })}
    {detailDisp&&React.createElement(DetailedView,{disp:detailDisp,data:data,onClose:function(){setDetailDisp(null)}})}
  </div>;
}

function ReportTab({data,favsVer}){

  var st3=useState(null),report=st3[0],setReport=st3[1];
  var st4=useState(false),generating=st4[0],setGenerating=st4[1];

  function generateReport(){
    if(!homeDisp||!compDisp||homeDisp===compDisp)return;
    setGenerating(true);
    setTimeout(function(){
      var prods=data.products||[];var deals=data.store_promos||[];var priceMoves=data.deals||[];
      var hName=cleanD(homeDisp),cName=cleanD(compDisp);
      
      // 1. Matching products
      var matching=[];var homeOnly=[];var compOnly=[];
      prods.forEach(function(p){
        var hP=p.dispensaries&&p.dispensaries[homeDisp];
        var cP=p.dispensaries&&p.dispensaries[compDisp];
        var hPm=p.promos&&p.promos[homeDisp];
        var cPm=p.promos&&p.promos[compDisp];
        if(hP&&cP)matching.push({name:p.name,brand:p.brand,cat:p.category,homePrice:hP,compPrice:cP,homePromo:hPm&&hPm<hP?hPm:null,compPromo:cPm&&cPm<cP?cPm:null});
        else if(hP&&!cP)homeOnly.push({name:p.name,brand:p.brand,cat:p.category,price:hP,promo:hPm&&hPm<hP?hPm:null});
        else if(!hP&&cP)compOnly.push({name:p.name,brand:p.brand,cat:p.category,price:cP,promo:cPm&&cPm<cP?cPm:null});
      });
      
      // 2. By category stats
      var cats={};
      matching.forEach(function(m){
        if(!cats[m.cat])cats[m.cat]={count:0,homeTotal:0,compTotal:0,homeWins:0,compWins:0,ties:0,items:[]};
        var c=cats[m.cat];c.count++;c.homeTotal+=m.homePrice;c.compTotal+=m.compPrice;
        if(m.homePrice<m.compPrice)c.homeWins++;else if(m.compPrice<m.homePrice)c.compWins++;else c.ties++;
        c.items.push(m);
      });
      
      // 3. Highs/Lows per store
      var homeHigh=null,homeLow=null,compHigh=null,compLow=null;
      matching.forEach(function(m){
        if(!homeHigh||m.homePrice>homeHigh.homePrice)homeHigh=m;
        if(!homeLow||m.homePrice<homeLow.homePrice)homeLow=m;
        if(!compHigh||m.compPrice>compHigh.compPrice)compHigh=m;
        if(!compLow||m.compPrice<compLow.compPrice)compLow=m;
      });
      
      // 4. Price movements (product-level price drops/deals)
      var homeMoves=priceMoves.filter(function(a){return a.dispensary===homeDisp});
      var compMoves=priceMoves.filter(function(a){return a.dispensary===compDisp});
      
      // 5. Deals — match by chain name (strip location/med/rec)
      var homeChain=cleanD(homeDisp).replace(/\s*\((?:Med|Rec)\)/i,"").replace(/\s*-\s*.*/,"").trim();
      var compChain=cleanD(compDisp).replace(/\s*\((?:Med|Rec)\)/i,"").replace(/\s*-\s*.*/,"").trim();
      var homeDeals=deals.filter(function(d){
        var dn=(d.dispensary||"").replace(/\s*\((?:Med|Rec)\)/i,"").trim();
        return dn.toLowerCase().includes(homeChain.toLowerCase())||homeChain.toLowerCase().includes(dn.split(" - ")[0].toLowerCase().trim());
      });
      var compDeals=deals.filter(function(d){
        var dn=(d.dispensary||"").replace(/\s*\((?:Med|Rec)\)/i,"").trim();
        return dn.toLowerCase().includes(compChain.toLowerCase())||compChain.toLowerCase().includes(dn.split(" - ")[0].toLowerCase().trim());
      });
      
      // 6. SKU counts
      var homeSKUs={},compSKUs={},homeTot=0,compTot=0;
      prods.forEach(function(p){
        if(p.dispensaries&&p.dispensaries[homeDisp]){var c=p.category||"Other";homeSKUs[c]=(homeSKUs[c]||0)+1;homeTot++}
        if(p.dispensaries&&p.dispensaries[compDisp]){var c=p.category||"Other";compSKUs[c]=(compSKUs[c]||0)+1;compTot++}
      });
      
      // 7. Biggest price differences
      var diffs=matching.map(function(m){return{name:m.name,brand:m.brand,cat:m.cat,homePrice:m.homePrice,compPrice:m.compPrice,homePromo:m.homePromo,compPromo:m.compPromo,diff:m.homePrice-m.compPrice,pct:Math.round((m.homePrice-m.compPrice)/m.compPrice*100)}}).sort(function(a,b){return a.diff-b.diff});
      
      // 8. Price extremes by category then weight
      var catWeightBuckets={};
      matching.forEach(function(m){
        var cat=m.cat||"Other";
        if(!catWeightBuckets[cat])catWeightBuckets[cat]={};
        var w=m.name.match(/(?:^|[^%\d])(\d*\.?\d+)\s*g\b/i);
        var wKey="other";
        if(w){var wv=parseFloat(w[1]);if(wv<=0.5)wKey="0.5g";else if(wv<=1)wKey="1g";else if(wv<=3.5)wKey="3.5g";else if(wv<=7)wKey="7g";else if(wv<=14)wKey="14g";else wKey="28g"}
        if(!catWeightBuckets[cat][wKey])catWeightBuckets[cat][wKey]=[];
        catWeightBuckets[cat][wKey].push(m);
      });
      
      setReport({hName:hName,cName:cName,homeDisp:homeDisp,compDisp:compDisp,matching:matching,homeOnly:homeOnly,compOnly:compOnly,cats:cats,homeHigh:homeHigh,homeLow:homeLow,compHigh:compHigh,compLow:compLow,homeMoves:homeMoves,compMoves:compMoves,homeDeals:homeDeals,compDeals:compDeals,homeSKUs:homeSKUs,compSKUs:compSKUs,homeTot:homeTot,compTot:compTot,diffs:diffs,catWeightBuckets:catWeightBuckets,date:new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})});

    html2pdf().set(opt).from(el).save().then(function(){

  var allCats=Object.keys(report?report.cats:{}).sort();

    <div className="pnl" style={{marginBottom:16}}>
      <div className="pnl-t" style={{marginBottom:8}}>COMPETITIVE ANALYSIS REPORT</div>

    {report&&<>

        <div style={{borderBottom:'3px solid #e8600a',paddingBottom:16,marginBottom:24}}>
          <div style={{display:'flex',alignItems:'center',gap:14}}><img src={ATHENA_LOGO_MD} alt="ATHENA" style={{width:60,height:60,borderRadius:8}}/><div><div style={{fontSize:28,fontWeight:700,color:'#e8600a',letterSpacing:2}}>ATHENA</div></div></div>

        {/* EXECUTIVE SUMMARY */}
        <div style={{marginBottom:28,pageBreakInside:'avoid'}}>

          <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
            {[
              [report.hName,report.homeTot+" SKUs","#e8600a"],
              [report.cName,report.compTot+" SKUs","#555"],
              ["Comparable Products",report.matching.length+" matches","#1a8f3f"],

              <div style={{fontSize:20,fontWeight:700,color:'#1a1a1a',marginTop:4}}>{s[1]}</div>
            </div>})}
          </div>
        </div>

        {/* SKU BREAKDOWN */}
        <div style={{marginBottom:28,pageBreakInside:'avoid'}}>
          <div style={{fontSize:18,fontWeight:700,color:'#e8600a',borderBottom:'1px solid #ddd',paddingBottom:6,marginBottom:12,pageBreakAfter:'avoid'}}>SKU Breakdown by Category</div>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:14}}>
            <thead><tr style={{borderBottom:'2px solid #ddd'}}>
              <th style={{textAlign:'left',padding:'8px 10px',fontWeight:600}}>Category</th>
              <th style={{textAlign:'center',padding:'8px 10px',fontWeight:600,color:'#e8600a'}}>{report.hName}</th>
              <th style={{textAlign:'center',padding:'8px 10px',fontWeight:600}}>{report.cName}</th>
              <th style={{textAlign:'center',padding:'8px 10px',fontWeight:600}}>Comparable</th>
              <th style={{textAlign:'center',padding:'8px 10px',fontWeight:600,color:'#e8600a'}}>Avg {report.hName.split(" ")[0]}</th>
              <th style={{textAlign:'center',padding:'8px 10px',fontWeight:600}}>Avg {report.cName.split(" ")[0]}</th>
            </tr></thead>
            <tbody>{Object.entries(report.cats).sort(function(a,b){return b[1].count-a[1].count}).map(function(e){var cat=e[0],c=e[1];var avgH=c.homeTotal/c.count;var avgC=c.compTotal/c.count;var avgPct=Math.round((avgC-avgH)/avgH*100);return<tr key={cat} style={{borderBottom:'1px solid #eee'}}>
              <td style={{padding:'8px 10px',fontWeight:500}}>{cat}</td>
              <td style={{textAlign:'center',padding:'8px 10px'}}>{report.homeSKUs[cat]||0}</td>
              <td style={{textAlign:'center',padding:'8px 10px'}}>{report.compSKUs[cat]||0}</td>
              <td style={{textAlign:'center',padding:'8px 10px',fontWeight:600}}>{c.count}</td>

            </tr>})}<tr style={{borderTop:'2px solid #ddd',fontWeight:700}}>
              <td style={{padding:'8px 10px'}}>TOTAL</td>
              <td style={{textAlign:'center',padding:'8px 10px'}}>{report.homeTot}</td>
              <td style={{textAlign:'center',padding:'8px 10px'}}>{report.compTot}</td>
              <td style={{textAlign:'center',padding:'8px 10px'}}>{report.matching.length}</td>
              <td style={{textAlign:'center',padding:'8px 10px',color:'#e8600a'}}>${report.matching.length>0?(report.matching.reduce(function(s,m){return s+m.homePrice},0)/report.matching.length).toFixed(2):"—"}</td>
              <td style={{textAlign:'center',padding:'8px 10px'}}>{report.matching.length>0?function(){var ah=report.matching.reduce(function(s,m){return s+m.homePrice},0)/report.matching.length;var ac=report.matching.reduce(function(s,m){return s+m.compPrice},0)/report.matching.length;var tp=Math.round((ac-ah)/ah*100);return<span>${ac.toFixed(2)} <span style={{fontSize:12,fontWeight:700,color:tp>0?'#1a8f3f':'#d42030'}}>({tp>0?"+":""}{tp}%)</span></span>}():"—"}</td>
            </tr></tbody>
          </table>
        </div>

        {/* PRICE WINS BY CATEGORY */}

              <td style={{padding:'8px 10px',fontWeight:500}}>{cat}</td>

              <td style={{textAlign:'center',padding:'8px 10px',color:'#888'}}>{c.ties}</td>
              <td style={{textAlign:'center',padding:'8px 10px',color:'#d42030',fontWeight:600}}>{c.compWins}</td>
            </tr>})}</tbody>
          </table>
        </div>

        {/* BIGGEST PRICE ADVANTAGES (YOU'RE CHEAPER) */}
        <div style={{marginBottom:28,pageBreakInside:'avoid'}}>
          <div style={{fontSize:18,fontWeight:700,color:'#e8600a',borderBottom:'1px solid #ddd',paddingBottom:6,marginBottom:12,pageBreakAfter:'avoid'}}>Your Biggest Price Advantages</div>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
            <thead><tr style={{borderBottom:'2px solid #ddd'}}>
              <th style={{textAlign:'left',padding:'6px 8px'}}>Product</th><th style={{padding:'6px 8px'}}>Category</th>
              <th style={{padding:'6px 8px',color:'#e8600a'}}>Your Price</th><th style={{padding:'6px 8px'}}>Their Price</th><th style={{padding:'6px 8px'}}>Difference</th>
            </tr></thead>
            <tbody>{report.diffs.filter(function(d){return d.diff<0}).sort(function(a,b){var catOrder=['Flower','Pre-Rolls','Vaporizers','Edible','Concentrate','Tincture','Topical'];var ai=catOrder.indexOf(a.cat),bi=catOrder.indexOf(b.cat);if(ai!==bi)return(ai<0?99:ai)-(bi<0?99:bi);return a.diff-b.diff}).map(function(d,i){var compPct=Math.round((d.compPrice-d.homePrice)/d.homePrice*100);var bestHome=d.homePromo||d.homePrice;var bestComp=d.compPromo||d.compPrice;var promoPct=(d.homePromo||d.compPromo)?Math.round((bestComp-bestHome)/bestHome*100):null;return<tr key={i} style={{borderBottom:'1px solid #eee'}}>
              <td style={{padding:'6px 8px',maxWidth:200,wordBreak:'break-word',whiteSpace:'normal'}}>{d.name}</td>
              <td style={{padding:'6px 8px',textAlign:'center',fontSize:12}}>{d.cat}</td>
              <td style={{padding:'6px 8px',textAlign:'center',color:'#1a8f3f',fontWeight:600}}><div>${d.homePrice.toFixed(2)}</div>{d.homePromo?<div style={{fontSize:11,color:'var(--am)'}}>${d.homePromo.toFixed(2)} <em>(Promo)</em></div>:null}</td>
              <td style={{padding:'6px 8px',textAlign:'center'}}><div>${d.compPrice.toFixed(2)}</div>{d.compPromo?<div style={{fontSize:11,color:'var(--am)'}}>${d.compPromo.toFixed(2)} <em>(Promo)</em></div>:null}</td>
              <td style={{padding:'6px 8px',textAlign:'center',color:'#1a8f3f',fontWeight:700}}><div>+{compPct}%</div>{promoPct!==null?<div style={{fontSize:11,color:promoPct>0?'#1a8f3f':'#d42030'}}>{promoPct>0?"+":""}{promoPct}%</div>:null}</td>
            </tr>})}</tbody>
          </table>
        </div>

        {/* BIGGEST PRICE DISADVANTAGES */}
        <div style={{marginBottom:28,pageBreakInside:'avoid'}}>
          <div style={{fontSize:18,fontWeight:700,color:'#e8600a',borderBottom:'1px solid #ddd',paddingBottom:6,marginBottom:12,pageBreakAfter:'avoid'}}>Competitor's Price Advantages</div>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
            <thead><tr style={{borderBottom:'2px solid #ddd'}}>
              <th style={{textAlign:'left',padding:'6px 8px'}}>Product</th><th style={{padding:'6px 8px'}}>Category</th>
              <th style={{padding:'6px 8px',color:'#e8600a'}}>Your Price</th><th style={{padding:'6px 8px'}}>Their Price</th><th style={{padding:'6px 8px'}}>Difference</th>
            </tr></thead>
            <tbody>{report.diffs.filter(function(d){return d.diff>0}).sort(function(a,b){var catOrder=['Flower','Pre-Rolls','Vaporizers','Edible','Concentrate','Tincture','Topical'];var ai=catOrder.indexOf(a.cat),bi=catOrder.indexOf(b.cat);if(ai!==bi)return(ai<0?99:ai)-(bi<0?99:bi);return b.diff-a.diff}).map(function(d,i){var compPct=Math.round((d.compPrice-d.homePrice)/d.homePrice*100);var bestHome=d.homePromo||d.homePrice;var bestComp=d.compPromo||d.compPrice;var promoPct=(d.homePromo||d.compPromo)?Math.round((bestComp-bestHome)/bestHome*100):null;return<tr key={i} style={{borderBottom:'1px solid #eee'}}>
              <td style={{padding:'6px 8px',maxWidth:200,wordBreak:'break-word',whiteSpace:'normal'}}>{d.name}</td>
              <td style={{padding:'6px 8px',textAlign:'center',fontSize:12}}>{d.cat}</td>
              <td style={{padding:'6px 8px',textAlign:'center',color:'#d42030',fontWeight:600}}><div>${d.homePrice.toFixed(2)}</div>{d.homePromo?<div style={{fontSize:11,color:'var(--am)'}}>${d.homePromo.toFixed(2)} <em>(Promo)</em></div>:null}</td>
              <td style={{padding:'6px 8px',textAlign:'center'}}><div>${d.compPrice.toFixed(2)}</div>{d.compPromo?<div style={{fontSize:11,color:'var(--am)'}}>${d.compPromo.toFixed(2)} <em>(Promo)</em></div>:null}</td>
              <td style={{padding:'6px 8px',textAlign:'center',color:'#d42030',fontWeight:700}}><div>{compPct}%</div>{promoPct!==null?<div style={{fontSize:11,color:promoPct>0?'#1a8f3f':'#d42030'}}>{promoPct>0?"+":""}{promoPct}%</div>:null}</td>
            </tr>})}</tbody>
          </table>
        </div>

        {/* PRICE EXTREMES BY CATEGORY + WEIGHT */}
        <div style={{marginBottom:28,pageBreakInside:'avoid'}}>
          <div style={{fontSize:18,fontWeight:700,color:'#e8600a',borderBottom:'1px solid #ddd',paddingBottom:6,marginBottom:12,pageBreakAfter:'avoid'}}>Price Extremes by Category &amp; Size</div>
          {report.catWeightBuckets&&Object.entries(report.catWeightBuckets).sort(function(a,b){
            var order=["Flower","Pre-Rolls","Vaporizers","Edible","Concentrate","Tincture","Topical"];
            var ai=order.indexOf(a[0]),bi=order.indexOf(b[0]);
            return(ai<0?99:ai)-(bi<0?99:bi);
          }).map(function(catEntry){
            var catName=catEntry[0],weights=catEntry[1];
            var totalInCat=Object.values(weights).reduce(function(s,arr){return s+arr.length},0);
            return<div key={catName} style={{marginBottom:20,pageBreakInside:'avoid'}}>
              <div style={{fontSize:16,fontWeight:700,color:'#333',borderBottom:'2px solid #e8600a',paddingBottom:4,marginBottom:10,pageBreakAfter:'avoid'}}>{catName} ({totalInCat} comparable)</div>
              {Object.entries(weights).filter(function(e){return e[1].length>0&&e[0]!=="other"}).sort(function(a,b){
                var wOrder=["0.5g","1g","3.5g","7g","14g","28g","other"];
                return wOrder.indexOf(a[0])-wOrder.indexOf(b[0]);
              }).map(function(wEntry){
                var wLabel=wEntry[0],items=wEntry[1];
                var homeHighW=null,homeLowW=null,compHighW=null,compLowW=null;
                items.forEach(function(m){
                  if(!homeHighW||m.homePrice>homeHighW.homePrice)homeHighW=m;
                  if(!homeLowW||m.homePrice<homeLowW.homePrice)homeLowW=m;
                  if(!compHighW||m.compPrice>compHighW.compPrice)compHighW=m;
                  if(!compLowW||m.compPrice<compLowW.compPrice)compLowW=m;
                });
                return<div key={wLabel} style={{marginBottom:10,marginLeft:12,pageBreakInside:'avoid'}}>
                  <div style={{fontWeight:600,fontSize:13,color:'#666',marginBottom:4}}>{wLabel==="other"?"Other Sizes":wLabel} ({items.length})</div>
                  <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
                    <thead><tr style={{borderBottom:'1px solid #ddd'}}>
                      <th style={{textAlign:'left',padding:'4px 8px',width:'12%'}}></th>
                      <th style={{textAlign:'left',padding:'4px 8px',color:'#e8600a'}}>{report.hName}</th>
                      <th style={{textAlign:'center',padding:'4px 8px',color:'#e8600a',width:'10%'}}>Price</th>
                      <th style={{textAlign:'left',padding:'4px 8px'}}>{report.cName}</th>
                      <th style={{textAlign:'center',padding:'4px 8px',width:'10%'}}>Price</th>
                    </tr></thead>
                    <tbody>
                      <tr style={{borderBottom:'1px solid #f0f0f0'}}>
                        <td style={{padding:'4px 8px',fontWeight:600,color:'#d42030',fontSize:11}}>HIGHEST</td>

                        <td style={{padding:'4px 8px',textAlign:'center',fontWeight:700,color:'#d42030'}}>{homeHighW?<div>${homeHighW.homePrice.toFixed(2)}{homeHighW.homePromo?<div style={{fontSize:10,color:'#e8600a',fontWeight:600}}>${homeHighW.homePromo.toFixed(2)} <em>(Promo)</em></div>:null}</div>:"—"}</td>
                        <td style={{padding:'4px 8px',fontSize:12,maxWidth:160,wordBreak:'break-word',whiteSpace:'normal'}}>{compHighW?compHighW.name:"—"}</td>
                        <td style={{padding:'4px 8px',textAlign:'center',fontWeight:700,color:'#d42030'}}>{compHighW?<div>${compHighW.compPrice.toFixed(2)}{compHighW.compPromo?<div style={{fontSize:10,color:'#e8600a',fontWeight:600}}>${compHighW.compPromo.toFixed(2)} <em>(Promo)</em></div>:null}</div>:"—"}</td>
                      </tr>
                      <tr style={{borderBottom:'1px solid #f0f0f0'}}>
                        <td style={{padding:'4px 8px',fontWeight:600,color:'#1a8f3f',fontSize:11}}>LOWEST</td>
                        <td style={{padding:'4px 8px',fontSize:12,maxWidth:160,wordBreak:'break-word',whiteSpace:'normal'}}>{homeLowW?homeLowW.name:"—"}</td>
                        <td style={{padding:'4px 8px',textAlign:'center',fontWeight:700,color:'#1a8f3f'}}>{homeLowW?<div>${homeLowW.homePrice.toFixed(2)}{homeLowW.homePromo?<div style={{fontSize:10,color:'#e8600a',fontWeight:600}}>${homeLowW.homePromo.toFixed(2)} <em>(Promo)</em></div>:null}</div>:"—"}</td>
                        <td style={{padding:'4px 8px',fontSize:12,maxWidth:160,wordBreak:'break-word',whiteSpace:'normal'}}>{compLowW?compLowW.name:"—"}</td>
                        <td style={{padding:'4px 8px',textAlign:'center',fontWeight:700,color:'#1a8f3f'}}>{compLowW?<div>${compLowW.compPrice.toFixed(2)}{compLowW.compPromo?<div style={{fontSize:10,color:'#e8600a',fontWeight:600}}>${compLowW.compPromo.toFixed(2)} <em>(Promo)</em></div>:null}</div>:"—"}</td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              })}
            </div>
          })}
        </div>

        {/* PRODUCT GAPS */}
        <div style={{marginBottom:28,pageBreakInside:'avoid'}}>
          <div style={{fontSize:18,fontWeight:700,color:'#e8600a',borderBottom:'1px solid #ddd',paddingBottom:6,marginBottom:12,pageBreakAfter:'avoid'}}>Product Gaps</div>
          <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
            <div style={{flex:1,minWidth:250}}>
              <div style={{fontWeight:600,fontSize:14,color:'#d42030',marginBottom:6}}>They Carry, You Don't ({report.compOnly.length} products)</div>
              {report.compOnly.length===0?<div style={{color:'#888',fontSize:13}}>No gaps — you carry everything they do.</div>:
              React.createElement(GapTable,{items:report.compOnly,color:'#d42030'})}

            <div style={{flex:1,minWidth:250}}>
              <div style={{fontWeight:600,fontSize:14,color:'#1a8f3f',marginBottom:6}}>You Carry, They Don't ({report.homeOnly.length} products)</div>
              {report.homeOnly.length===0?<div style={{color:'#888',fontSize:13}}>They carry everything you do.</div>:

          <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
            {[[report.hName,report.homeDeals,"#e8600a"],[report.cName,report.compDeals,"#555"]].map(function(s){return<div key={s[0]} style={{flex:1,minWidth:250}}>
              <div style={{fontWeight:700,color:s[2],fontSize:15,marginBottom:8}}>{s[0]} ({s[1].length} deals)</div>
              {s[1].length===0?<div style={{color:'#888',fontSize:13}}>No active promotions.</div>:
              <div>{s[1].map(function(d,i){return<div key={i} style={{background:'#f8f8f8',borderRadius:6,padding:8,marginBottom:6,borderLeft:'3px solid '+s[2]}}>
                <div style={{fontSize:13,fontWeight:600}}>{d.title}</div>
                {d.description&&<div style={{fontSize:11,color:'#888',marginTop:2}}>{d.description}</div>}
              </div>})}</div>}
            </div>})}
          </div>
        </div>

        {/* PRICE MOVEMENTS */}
        <div style={{marginBottom:28,pageBreakInside:'avoid'}}>
          <div style={{fontSize:18,fontWeight:700,color:'#e8600a',borderBottom:'1px solid #ddd',paddingBottom:6,marginBottom:12,pageBreakAfter:'avoid'}}>Current Discounted Products</div>
          <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
            {[[report.hName,report.homeMoves,"#e8600a"],[report.cName,report.compMoves,"#555"]].map(function(s){
              var moves=s[1]||[];
              var sorted=moves.slice().sort(function(a,b){return(b.pct_off||0)-(a.pct_off||0)});
              return<div key={s[0]} style={{flex:1,minWidth:250}}>
                <div style={{fontWeight:700,color:s[2],fontSize:15,marginBottom:8}}>{s[0]} ({moves.length} discounted)</div>
                {moves.length===0?<div style={{color:'#888',fontSize:13}}>No active product discounts.</div>:
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                  <thead><tr style={{borderBottom:'1px solid #ddd'}}><th style={{textAlign:'left',padding:'4px 6px'}}>Product</th><th style={{padding:'4px 6px'}}>Was</th><th style={{padding:'4px 6px'}}>Now</th><th style={{padding:'4px 6px'}}>Off</th></tr></thead>
                  <tbody>{sorted.map(function(m,i){return<tr key={i} style={{borderBottom:'1px solid #f0f0f0'}}>
                    <td style={{padding:'4px 6px',maxWidth:160,wordBreak:'break-word',whiteSpace:'normal'}}>{m.product||m.name}</td>
                    <td style={{padding:'4px 6px',textAlign:'center',textDecoration:'line-through',color:'#888'}}>${(m.original||0).toFixed(2)}</td>
                    <td style={{padding:'4px 6px',textAlign:'center',fontWeight:600,color:'#1a8f3f'}}>${(m.discounted||0).toFixed(2)}</td>
                    <td style={{padding:'4px 6px',textAlign:'center',fontWeight:700,color:'#d42030'}}>{m.pct_off||0}%</td>
                  </tr>})}</tbody>
                </table>}
              </div>
            })}
          </div>
        </div>

        {/* FOOTER */}
        <div style={{borderTop:'2px solid #e8600a',paddingTop:12,marginTop:24,fontSize:11,color:'#888',display:'flex',justifyContent:'space-between'}}>
          <span style={{display:'flex',alignItems:'center',gap:6}}><img src={ATHENA_LOGO_SM} alt="" style={{width:16,height:16,borderRadius:3}}/>Generated by ATHENA Cannabis Pricing Intelligence</span>
          <span>{report.date}</span>
        </div>
      </div>
    </>}
  </div>;
}

</script></body></html>
