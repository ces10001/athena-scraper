name: ATHENA Nightly Scrape

on:
  schedule:
    - cron: '47 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run ATHENA scraper
        run: node src/scrape.mjs --verbose

      - name: Build dashboard data
        run: node src/build-dashboard.mjs

      - name: Commit results
        run: |
          git config user.name "ATHENA Bot"
          git config user.email "athena-bot@affinitydispensary.com"
          git add data/ dashboard_data.json
          git diff --staged --quiet || git commit -m "🔄 ATHENA scrape $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
