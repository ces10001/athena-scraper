name: ATHENA Nightly Scrape

on:
  schedule:
    - cron: '30 10 * * *'
    - cron: '0 16 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      filter:
        description: 'Store name filter (e.g. "Rise" or "Venu" or "BUDR"). Leave blank for all stores.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run ATHENA scraper
        run: |
          FILTER="${{ github.event.inputs.filter }}"
          if [ -n "$FILTER" ]; then
            echo "Filtering for: $FILTER"
            node src/scrape.mjs --name "$FILTER" --verbose
          else
            node src/scrape.mjs --verbose
          fi

      - name: Build dashboard data
        run: node src/build-dashboard.mjs

      - name: Commit results
        run: |
          git config user.name "ATHENA Bot"
          git config user.email "athena-bot@affinitydispensary.com"
          git add data/ dashboard_data.json
          git diff --staged --quiet || git commit -m "🔄 ATHENA scrape $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase
          git push
